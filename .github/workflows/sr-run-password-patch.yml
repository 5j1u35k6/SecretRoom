name: Run SecretRoom password patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sr-run-password-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python .github/scripts/sr_password_patch.py
      - run: node --check app.js && node --check admin.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js admin.js index.html .github/scripts/sr_password_patch.py .github/workflows/sr-run-password-patch.yml .github/workflows/sr-password-change-workflow.yml
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add member password change workflow"
            git push
          fi
