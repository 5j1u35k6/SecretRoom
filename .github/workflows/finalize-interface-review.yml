name: Finalize interface review

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/interface-review-followup
          fetch-depth: 0
      - run: python3 scripts/finalize_interface_review.py
      - run: |
          cp app.js /tmp/app.mjs
          cp admin.js /tmp/admin.mjs
          node --check /tmp/app.mjs
          node --check /tmp/admin.mjs
          python3 - <<'PY'
          from pathlib import Path
          text = Path('app.js').read_text(encoding='utf-8')
          card = text[text.index('function ensureCard(snapshot = lastSnapshot)'):text.index('function wrapPasswordSecurityMail()')]
          assert card.count('if (bound && isHome)') == 1
          assert card.index('if (bound && isHome)') < card.index('let card = existing')
          assert "text-sm`;" in text
          assert 'else dialog.click();' in text
          PY
      - run: |
          rm -f scripts/finalize_interface_review.py
          rm -f .github/workflows/finalize-interface-review.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize interface interaction fixes"
          git push origin HEAD:fix/interface-review-followup
