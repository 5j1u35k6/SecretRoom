name: Finalize Telegram Phase 2.2 frontend

on:
  push:
    branches: [fix/telegram-binding-truth-deeplink-onboarding]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ !contains(github.event.head_commit.message || github.event.pull_request.title, '[telegram-phase2-2-final]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/telegram-binding-truth-deeplink-onboarding
          fetch-depth: 0
      - run: python3 tools/telegram_phase2_2_followup.py
      - run: |
          node --check app.js
          grep -q "if (!hasActiveBinding(snapshot)) return;" app.js
          grep -q "telegram-bind' && hasActiveBinding(snapshot)" app.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js
          git commit -m "Finalize Telegram binding validation [telegram-phase2-2-final]"
          git push origin HEAD:fix/telegram-binding-truth-deeplink-onboarding
