name: Restore content interactions

on:
  push:
    branches:
      - agent/restore-content-reactions

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restore-content-reactions
          fetch-depth: 0

      - name: Restore likes and star ratings
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          js_path = Path('sr_club_complete.js')
          js = js_path.read_text(encoding='utf-8')
          js = js.replace('__SR_CLUB_COMPLETE_V3__', '__SR_CLUB_COMPLETE_V4__')

          marker = 'function applyEnhancements(){'
          if 'function restoreContentInteractions(){' not in js:
              interaction = r'''function restoreContentInteractions(){if(window.state?.currentTab!=='feed')return;const intro=document.getElementById('sr-content-intro');const introText=intro?.querySelector('p');if(introText)introText.textContent='瀏覽會員投稿、主題內容與俱樂部精選。會員可以按讚、留言及進行 1–5 星內容評價。';const policy=intro?.querySelector('.sr-policy-strip span');if(policy)policy.textContent='按讚與評星只用於內容互動和瀏覽排序，不形成公開會員排行榜，也不影響會籍、黃金資格或任何權限。';const sortNote=document.querySelector('.sr-content-sort-note');if(sortNote)sortNote.textContent='按讚與 1–5 星評價已開放；互動只用於內容瀏覽，不形成公開會員排行榜。';const postIdFromButton=button=>{const source=button?.getAttribute('onclick')||'';const match=source.match(/toggleLikePost\(['\"]([^'\"]+)['\"]\)/);return match?.[1]||''};document.querySelectorAll('#feed-posts-list .sr-content-card').forEach(card=>{const likeButton=card.querySelector('button[onclick*="toggleLikePost"]');if(likeButton){const postId=postIdFromButton(likeButton);const post=(window.state?.posts||[]).find(item=>String(item.id)===String(postId));const count=Number(post?.likeCount??Object.keys(post?.likes||{}).length??0);const label=likeButton.querySelector('span');if(label){label.removeAttribute('data-sr-public-count');label.textContent=`${Number.isFinite(count)?count:0} 個讚`}likeButton.setAttribute('aria-label','按讚或取消按讚');likeButton.setAttribute('title','按讚只代表內容互動，不會形成會員排名')}const stars=card.querySelectorAll('i[onclick*="ratePost"]');if(stars.length){const group=stars[0].parentElement?.parentElement;const average=group?.querySelector('span');if(average){average.removeAttribute('data-sr-rating-average');average.style.display='inline-flex';average.title='此內容的平均星等'}const oldLabel=group?.querySelector('.sr-private-feedback-label');if(oldLabel)oldLabel.textContent='1–5 星內容評價';stars.forEach((star,index)=>{star.setAttribute('role','button');star.setAttribute('tabindex','0');star.setAttribute('aria-label',`給予 ${index+1} 星評價`);star.setAttribute('title',`給予 ${index+1} 星評價`);if(star.dataset.srInteractionKeyboard!=='1'){star.dataset.srInteractionKeyboard='1';star.addEventListener('keydown',event=>{if(event.key==='Enter'||event.key===' '){event.preventDefault();star.click()}})}})}})}'''
              if marker not in js:
                  raise SystemExit('applyEnhancements marker not found')
              js = js.replace(marker, interaction + marker, 1)

          call_marker = 'enhanceDashboardArchitecture();patchShareModal();'
          if 'enhanceDashboardArchitecture();restoreContentInteractions();patchShareModal();' not in js:
              if call_marker not in js:
                  raise SystemExit('enhancement call marker not found')
              js = js.replace(call_marker, 'enhanceDashboardArchitecture();restoreContentInteractions();patchShareModal();', 1)

          js_path.write_text(js, encoding='utf-8')

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')
          html = html.replace('20260720-club-complete-v3', '20260720-content-interactions-v4')
          html = html.replace('.sr-content-card [data-sr-rating-average]{display:none!important}', '.sr-content-card [data-sr-rating-average]{display:inline-flex!important}')
          index_path.write_text(html, encoding='utf-8')

          assert '__SR_CLUB_COMPLETE_V4__' in js
          assert 'function restoreContentInteractions(){' in js
          assert 'restoreContentInteractions();patchShareModal();' in js
          assert 'content-interactions-v4' in html
          PY

      - name: Validate JavaScript and HTML
        shell: bash
        run: |
          node --check sr_club_complete.js
          python - <<'PY'
          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path
          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids=[]
              def handle_starttag(self, tag, attrs):
                  self.ids.extend(value for key,value in attrs if key=='id')
          parser=Parser()
          parser.feed(Path('index.html').read_text(encoding='utf-8'))
          duplicate=[key for key,value in Counter(parser.ids).items() if value>1]
          if duplicate:
              raise SystemExit(f'duplicate ids: {duplicate}')
          PY

      - name: Commit final update
        shell: bash
        run: |
          rm -f _agent_tree_probe.txt .github/workflows/restore-content-interactions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sr_club_complete.js _agent_tree_probe.txt .github/workflows/restore-content-interactions.yml
          git commit -m "恢復內容按讚與評星互動"
          git push origin HEAD:agent/restore-content-reactions
