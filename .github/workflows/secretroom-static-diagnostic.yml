name: SecretRoom static diagnostic

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-static-diagnostic' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture

      - name: Run diagnostic and comment result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          report=/tmp/static-report.md
          echo '## 六檔整合靜態診斷' > "$report"
          echo >> "$report"
          failures=0
          check() {
            label="$1"; shift
            output=$("$@" 2>&1)
            code=$?
            if [ $code -eq 0 ]; then
              echo "- ✅ $label" >> "$report"
            else
              echo "- ❌ $label" >> "$report"
              echo '```text' >> "$report"
              printf '%s\n' "$output" >> "$report"
              echo '```' >> "$report"
              failures=$((failures+1))
            fi
          }

          check 'app.js 語法' node --check app.js
          check 'admin.js 語法' node --check admin.js
          check '前台三個主要檔案存在' bash -lc 'test -f index.html && test -f style.css && test -f app.js'
          check '後台三個主要檔案存在' bash -lc 'test -f portal_sr_x892.html && test -f admin.css && test -f admin.js'
          check 'admin.html 已移除' bash -lc 'test ! -e admin.html'
          check '頂層 sr_*.js 已清空' bash -lc 'test -z "$(find . -maxdepth 1 -name "sr_*.js" -print -quit)"'
          check 'index.html 只載入 app.js' bash -lc 'test "$(grep -c "src=\"app.js" index.html)" -eq 1'
          check '後台只載入 admin.js' bash -lc 'test "$(grep -c "src=\"admin.js" portal_sr_x892.html)" -eq 1'
          check 'HTML 無 sr_*.js 引用' bash -lc '! grep -Eq "src=\"sr_[^\"]+\\.js" index.html portal_sr_x892.html'
          check '無本地動態 JS import' bash -lc '! grep -Eq "import\\([\"'\"'\"]\\./[^\"'\"'\"]+\\.js" app.js admin.js'
          check '舊位階 renderer 已移除' bash -lc '! grep -q "Weekly Grade System" app.js admin.js'
          check '管理員登入沒有 applications 回退' bash -lc '! grep -q "applications'\"'\"', adminId" admin.js'
          check '管理員數量沒有舊 applications 計數' bash -lc '! grep -q "allApplications.filter(app => isAdminAccount" admin.js'
          check 'Rank v4 已整合' bash -lc 'grep -q "__SR_RANK_POLICY_V4__" app.js && grep -q "data:rankData, render" app.js'
          check '案件備註監聽器可解除' bash -lc 'grep -q "activeDrawerUnsubscribe=fs.onSnapshot" admin.js'
          check '前台排程器不是自我註冊' bash -lc '! sed -n "1,60p" app.js | grep -q "SRRuntime?.register(schedule)"'
          check '後台排程器不是自我註冊' bash -lc '! sed -n "1,60p" admin.js | grep -q "SRAdminRuntime?.register(schedule)"'

          echo >> "$report"
          echo "- 前台 MutationObserver：$(grep -c 'new MutationObserver' app.js || true)" >> "$report"
          echo "- 後台 MutationObserver：$(grep -c 'new MutationObserver' admin.js || true)" >> "$report"
          echo "- 診斷失敗項目：$failures" >> "$report"
          gh pr comment 1 --repo 5j1u35k6/SecretRoom --body-file "$report"
          exit $failures
