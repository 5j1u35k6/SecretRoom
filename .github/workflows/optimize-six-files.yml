name: Build six-file architecture

on:
  push:
    branches:
      - optimize/six-file-architecture

permissions:
  contents: write

jobs:
  consolidate:
    if: ${{ !contains(github.event.head_commit.message, '[six-file-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout optimization branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Consolidate frontend and admin assets
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          FRONTEND = [
              'sr_dom_stability.js',
              'sr_audio_control.js',
              'app.js',
              'sr_password_flow.js',
              'sr_ui_regression_fixes.js',
              'sr_rank_layout_v2.js',
              'sr_frontend_entry.js',
              'sr_phase2_directory_telegram.js',
              'sr_phase3_feed_safety.js',
              'sr_phase2_onboarding.js',
          ]
          ADMIN = [
              'sr_dom_stability.js',
              'admin.js',
              'sr_admin_tools.js',
              'sr_admin_phase2_roles.js',
              'sr_admin_phase2_case_list.js',
              'sr_admin_phase2_case_drawer.js',
              'sr_admin_phase2_notifications.js',
          ]

          for path in set(FRONTEND + ADMIN):
              if not Path(path).exists():
                  raise SystemExit(f'Missing source file: {path}')

          def source(path: str) -> str:
              text = Path(path).read_text(encoding='utf-8').replace('\r\n', '\n')
              if path == 'sr_admin_tools.js':
                  old = """      } catch (err) {\n        console.warn('管理員名單檢查失敗，交由原登入流程處理:', err);\n      }\n      return original.call(this, event);"""
                  new = """      } catch (err) {\n        console.error('管理員名單檢查失敗，為安全起見拒絕登入:', err);\n        event?.preventDefault?.();\n        event?.stopPropagation?.();\n        const message = '無法驗證管理員名單，為安全起見已拒絕登入。請確認網路後重試。';\n        const box = qs('admin-login-error');\n        if (box) { box.textContent = message; box.classList.remove('hidden'); }\n        window.showToast?.(message, 'error');\n        return;\n      }\n      return original.call(this, event);"""
                  if old not in text:
                      raise SystemExit('Expected admin fail-open block was not found')
                  text = text.replace(old, new)
              return text

          def wrap(path: str) -> str:
              return f"\n/* ===== Consolidated source: {path} ===== */\n;(() => {{\n{source(path)}\n}})();\n"

          frontend_bundle = """/* SecretRoom frontend consolidated runtime.\n * Generated from the previously separated runtime modules in their original execution order.\n * Keep feature sections isolated with IIFEs to preserve their former module scopes.\n */\n""" + ''.join(wrap(path) for path in FRONTEND)

          admin_bundle = """/* SecretRoom admin consolidated runtime.\n * Generated from the previously separated runtime modules in their original execution order.\n * Admin login is fail-closed when the explicit admins collection cannot be verified.\n */\n""" + ''.join(wrap(path) for path in ADMIN)

          Path('app.js').write_text(frontend_bundle, encoding='utf-8')
          Path('admin.js').write_text(admin_bundle, encoding='utf-8')

          index_path = Path('index.html')
          index_html = index_path.read_text(encoding='utf-8')
          inline_style = re.search(r'\n?<style>\s*(.*?)\s*</style>\n?', index_html, flags=re.S)
          if inline_style:
              css_path = Path('style.css')
              css = css_path.read_text(encoding='utf-8').rstrip()
              css += '\n\n/* Consolidated from index.html */\n' + inline_style.group(1).strip() + '\n'
              css_path.write_text(css, encoding='utf-8')
              index_html = index_html[:inline_style.start()] + '\n' + index_html[inline_style.end():]

          index_lines = []
          for line in index_html.splitlines():
              if re.search(r'<script[^>]+src="(?:app\.js|sr_[^"]+\.js)', line):
                  continue
              index_lines.append(line)
          index_html = '\n'.join(index_lines)
          index_html = index_html.replace('style.css?v=20260711-frontend-cache-v4', 'style.css?v=20260716-optimized-v1')
          index_html = index_html.replace('</body>', '<script type="module" src="app.js?v=20260716-optimized-v1"></script>\n</body>')
          index_path.write_text(index_html.rstrip() + '\n', encoding='utf-8')

          portal_path = Path('portal_sr_x892.html')
          portal_html = portal_path.read_text(encoding='utf-8')
          portal_lines = []
          for line in portal_html.splitlines():
              if re.search(r'<script[^>]+src="(?:admin\.js|sr_[^"]+\.js)', line):
                  continue
              portal_lines.append(line)
          portal_html = '\n'.join(portal_lines)
          portal_html = portal_html.replace('admin.css?v=20260709-admin-cache-v2', 'admin.css?v=20260716-optimized-v1')
          portal_html = portal_html.replace('</body>', '<script type="module" src="admin.js?v=20260716-optimized-v1"></script>\n</body>')
          portal_path.write_text(portal_html.rstrip() + '\n', encoding='utf-8')

          delete_paths = sorted((set(FRONTEND + ADMIN) - {'app.js', 'admin.js'})) + ['admin.html']
          for path in delete_paths:
              target = Path(path)
              if target.exists():
                  target.unlink()

          print('Frontend bundle bytes:', Path('app.js').stat().st_size)
          print('Admin bundle bytes:', Path('admin.js').stat().st_size)
          print('Deleted:', ', '.join(delete_paths))
          PY

      - name: Static verification
        shell: bash
        run: |
          node --check app.js
          node --check admin.js
          test -f index.html
          test -f style.css
          test -f app.js
          test -f portal_sr_x892.html
          test -f admin.css
          test -f admin.js
          ! grep -Eq 'src="sr_[^"]+\.js' index.html
          ! grep -Eq 'src="sr_[^"]+\.js' portal_sr_x892.html
          test "$(grep -c 'src="app.js' index.html)" -eq 1
          test "$(grep -c 'src="admin.js' portal_sr_x892.html)" -eq 1

      - name: Commit generated architecture
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Consolidate platform assets [six-file-generated]"
          git push origin HEAD:optimize/six-file-architecture
