name: Fix profile Telegram layout v2

on:
  pull_request:
    branches: [main]
  push:
    branches: [fix/profile-telegram-layout-v2]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message || github.event.pull_request.title, '[profile-telegram-layout-v2-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-telegram-layout-v2
          fetch-depth: 0
      - run: python3 tools/fix_profile_telegram_layout_v2.py
      - run: node --check app.js
      - run: |
          grep -q "grid grid-cols-2 gap-3 w-full mt-4" app.js
          grep -q "margin-right:3.75rem" app.js
          grep -q "app.js?v=20260717-profile-telegram-layout-v2" index.html
      - run: |
          rm -f tools/fix_profile_telegram_layout_v2.py
          rm -f .github/workflows/fix-profile-telegram-layout-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix profile Telegram layout [profile-telegram-layout-v2-generated]"
          git push origin HEAD:fix/profile-telegram-layout-v2
