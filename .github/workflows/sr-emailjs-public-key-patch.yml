name: SecretRoom EmailJS Public Key Patch

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sr-emailjs-public-key-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace EmailJS public key and remove patch workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          old_key = 'ZEp9d-hAeYdFujDZy'
          new_key = 'XggJY7iHQcZYYhNY7'
          for filename in ['app.js', 'admin.js']:
              path = Path(filename)
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              text = text.replace(old_key, new_key)
              path.write_text(text, encoding='utf-8')
          workflow = Path('.github/workflows/sr-emailjs-public-key-patch.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js admin.js .github/workflows/sr-emailjs-public-key-patch.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update EmailJS public key"
            git push
          fi
