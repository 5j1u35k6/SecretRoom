name: Apply profile service and post action layout

on:
  push:
    branches: [fix/profile-service-post-actions]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message || github.event.pull_request.title, '[profile-service-post-actions-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-service-post-actions
          fetch-depth: 0

      - name: Apply layout patch
        run: python3 scripts/apply_profile_service_post_actions.py

      - name: Validate runtime
        run: |
          cp app.js /tmp/app.mjs
          node --check /tmp/app.mjs
          grep -q 'sr-profile-telegram-service-entry' app.js
          grep -q 'data-sr-post-actions' app.js
          grep -q 'app.js?v=20260719-profile-service-post-actions-v1' index.html
          ! grep -q "fixed left-4 bottom-20 md:bottom-6" app.js
          ! grep -q "button.className = 'mt-3 min-h-\[40px\]'" app.js

      - name: Commit generated result
        run: |
          rm -f scripts/apply_profile_service_post_actions.py
          rm -f .github/workflows/apply-profile-service-post-actions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move member service and compact post actions [profile-service-post-actions-generated]"
          git push origin HEAD:fix/profile-service-post-actions
