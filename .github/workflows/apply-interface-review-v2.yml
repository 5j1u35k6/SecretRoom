name: Apply interface review v2

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/interface-review-followup-v2
          fetch-depth: 0

      - name: Apply frontend and admin patches
        run: |
          python3 scripts/patch_frontend_interface_v2.py
          python3 scripts/patch_admin_interface_v2.py

      - name: Validate syntax and integration
        run: |
          cp app.js /tmp/app.mjs
          cp admin.js /tmp/admin.mjs
          node --check /tmp/app.mjs
          node --check /tmp/admin.mjs
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html').read_text(encoding='utf-8')
          portal = Path('portal_sr_x892.html').read_text(encoding='utf-8')
          app = Path('app.js').read_text(encoding='utf-8')
          admin = Path('admin.js').read_text(encoding='utf-8')

          assert 'user-scalable=no' not in index
          assert '20260717-conversation-ui-v2' in index
          assert 'role="dialog"' in index and 'aria-modal="true"' in index
          assert 'id="bgm-toggle-btn"' in index and 'aria-pressed="false"' in index
          assert 'window.__SR_CONVERSATION_UI_V1__' in app
          assert 'window.__SR_DIALOG_A11Y__' in app

          card = app[app.index('function ensureCard(snapshot = lastSnapshot)'):app.index('function wrapPasswordSecurityMail()')]
          assert card.count('bound && isHome') == 1
          assert card.index('bound && isHome') < card.index('let card = existing')

          assert 'id="admin-login-form"' in portal
          assert 'autocomplete="username"' in portal
          assert 'autocomplete="current-password"' in portal
          assert 'aria-live="assertive"' in portal
          assert '舊 EmailJS 失敗紀錄（唯讀）' in portal
          assert "button.setAttribute('aria-busy', 'true')" in admin
          assert 'srSubmitBridge' in admin
          PY

      - name: Commit final core files
        run: |
          rm -f scripts/patch_frontend_interface_v2.py
          rm -f scripts/patch_admin_interface_v2.py
          rm -f .github/workflows/apply-interface-review-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete interface review on conversation UI"
          git push origin HEAD:fix/interface-review-followup-v2
