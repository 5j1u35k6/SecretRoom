name: SecretRoom six-file validation v2

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-validation-v2' }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-noble
    steps:
      - uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture

      - name: Run static and browser validation
        id: validation
        shell: bash
        run: |
          cat > /tmp/validate.mjs <<'JS'
          import fs from 'node:fs';
          import http from 'node:http';
          import path from 'node:path';
          import { chromium } from 'playwright';

          const root = process.cwd();
          const report = { ok: true, static: [], browser: [], errors: [] };
          const add = (name, ok, detail = '') => {
            report.static.push({ name, ok, detail });
            if (!ok) report.ok = false;
          };
          const read = file => fs.readFileSync(path.join(root, file), 'utf8');
          const exists = file => fs.existsSync(path.join(root, file));

          try {
            const required = ['index.html', 'style.css', 'app.js', 'portal_sr_x892.html', 'admin.css', 'admin.js'];
            for (const file of required) add(`${file} exists`, exists(file));
            add('admin.html removed', !exists('admin.html'));
            const oldRuntimeFiles = fs.readdirSync(root).filter(name => /^sr_.*\.js$/.test(name));
            add('top-level sr_*.js removed', oldRuntimeFiles.length === 0, oldRuntimeFiles.join(', '));

            const index = read('index.html');
            const portal = read('portal_sr_x892.html');
            const app = read('app.js');
            const admin = read('admin.js');
            const count = (text, pattern) => (text.match(pattern) || []).length;

            add('index loads exactly one app.js', count(index, /src="app\.js/g) === 1);
            add('portal loads exactly one admin.js', count(portal, /src="admin\.js/g) === 1);
            add('HTML has no sr_*.js references', !/src="sr_[^"]+\.js/.test(index + portal));
            add('no local dynamic JS imports', !/import\(['"]\.\/[^'"]+\.js/.test(app + admin));
            add('Rank v4 integrated', app.includes('__SR_RANK_POLICY_V4__') && app.includes('data:rankData, render'));
            add('legacy rank renderer removed', !app.includes('Weekly Grade System'));
            add('admin applications fallback removed', !admin.includes("applications', adminId"));
            add('legacy admin count removed', !admin.includes('allApplications.filter(app => isAdminAccount'));
            add('case note listener cleanup present', admin.includes('activeDrawerUnsubscribe=fs.onSnapshot'));
            add('frontend coordinator has observer', /Integrated frontend runtime coordinator[\s\S]{0,1200}new MutationObserver\(schedule\)/.test(app));
            add('admin coordinator has observer', /Integrated admin runtime coordinator[\s\S]{0,1200}new MutationObserver\(schedule\)/.test(admin));
            add('frontend coordinator is not self-registered', !/Integrated frontend runtime coordinator[\s\S]{0,1200}SRRuntime\?\.register\(schedule\)/.test(app));
            add('admin coordinator is not self-registered', !/Integrated admin runtime coordinator[\s\S]{0,1200}SRAdminRuntime\?\.register\(schedule\)/.test(admin));
            add('frontend observer count bounded', count(app, /new MutationObserver/g) <= 5, String(count(app, /new MutationObserver/g)));
            add('admin observer count bounded', count(admin, /new MutationObserver/g) <= 3, String(count(admin, /new MutationObserver/g)));
          } catch (error) {
            report.ok = false;
            report.errors.push(`Static validation crashed: ${error.stack || error}`);
          }

          const mime = { '.html':'text/html; charset=utf-8', '.js':'text/javascript; charset=utf-8', '.css':'text/css; charset=utf-8', '.jpg':'image/jpeg', '.jpeg':'image/jpeg', '.png':'image/png', '.webp':'image/webp' };
          const server = http.createServer((request, response) => {
            const url = new URL(request.url, 'http://127.0.0.1');
            let filename = decodeURIComponent(url.pathname === '/' ? '/index.html' : url.pathname);
            filename = path.join(root, filename.replace(/^\/+/, ''));
            if (!filename.startsWith(root) || !fs.existsSync(filename) || fs.statSync(filename).isDirectory()) {
              response.writeHead(404); response.end('Not found'); return;
            }
            response.writeHead(200, { 'Content-Type': mime[path.extname(filename).toLowerCase()] || 'application/octet-stream', 'Cache-Control':'no-store' });
            fs.createReadStream(filename).pipe(response);
          });

          let browser;
          try {
            await new Promise(resolve => server.listen(4173, '127.0.0.1', resolve));
            browser = await chromium.launch({ headless: true, args: ['--no-sandbox'] });

            async function check(pagePath, expectedGlobal, expectedSelector) {
              const page = await browser.newPage();
              const pageErrors = [];
              const consoleErrors = [];
              page.on('pageerror', error => pageErrors.push(String(error?.stack || error)));
              page.on('console', message => { if (message.type() === 'error') consoleErrors.push(message.text()); });
              const response = await page.goto(`http://127.0.0.1:4173/${pagePath}`, { waitUntil:'domcontentloaded', timeout:60000 });
              await page.waitForTimeout(8000);
              const status = response?.status() || 0;
              const globalReady = await page.evaluate(name => Boolean(window[name]), expectedGlobal);
              const selectorReady = await page.locator(expectedSelector).count() > 0;
              const localScripts = await page.locator('script[src]').evaluateAll(nodes => nodes.map(node => node.getAttribute('src')).filter(src => src && !/^https?:/.test(src)));
              const responsive = await page.evaluate(() => ({ value: 6 * 7, state: document.readyState }));
              const result = { pagePath, status, globalReady, selectorReady, localScripts, responsive, pageErrors, consoleErrors: consoleErrors.slice(0, 12) };
              result.ok = status === 200 && globalReady && selectorReady && localScripts.length === 1 && responsive.value === 42 && pageErrors.length === 0;
              report.browser.push(result);
              if (!result.ok) report.ok = false;
              await page.close();
            }

            await check('index.html', '__SR_RUNTIME__', '#app');
            await check('portal_sr_x892.html', '__SR_ADMIN_RUNTIME__', '#admin-login-modal');
          } catch (error) {
            report.ok = false;
            report.errors.push(`Browser validation crashed: ${error.stack || error}`);
          } finally {
            if (browser) await browser.close();
            await new Promise(resolve => server.close(resolve));
          }

          fs.writeFileSync('/tmp/secretroom-validation.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          process.exit(report.ok ? 0 : 1);
          JS

          set +e
          node /tmp/validate.mjs
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish validation report
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATION_EXIT: ${{ steps.validation.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            let report = { ok: false, errors: ['Validation report was not produced.'] };
            try { report = JSON.parse(fs.readFileSync('/tmp/secretroom-validation.json', 'utf8')); } catch (error) { report.errors = [String(error)]; }
            const icon = report.ok ? '✅' : '❌';
            const staticRows = (report.static || []).map(row => `- ${row.ok ? '✅' : '❌'} ${row.name}${row.detail ? ` — ${row.detail}` : ''}`).join('\n');
            const browserRows = (report.browser || []).map(row => [
              `### ${row.ok ? '✅' : '❌'} ${row.pagePath}`,
              `- HTTP: ${row.status}`,
              `- Runtime: ${row.globalReady}`,
              `- Root element: ${row.selectorReady}`,
              `- Local scripts: \`${JSON.stringify(row.localScripts)}\``,
              `- Page errors: ${row.pageErrors?.length || 0}`,
              row.consoleErrors?.length ? `<details><summary>Console errors</summary>\n\n\`\`\`text\n${row.consoleErrors.join('\n')}\n\`\`\`\n</details>` : ''
            ].filter(Boolean).join('\n')).join('\n\n');
            const errors = (report.errors || []).length ? `\n\n### Errors\n\`\`\`text\n${report.errors.join('\n\n')}\n\`\`\`` : '';
            const body = `## ${icon} 六檔整合驗證 v2\n\n${staticRows}\n\n${browserRows}${errors}`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: 1, body });
            if (!report.ok) core.setFailed('SecretRoom validation failed; see PR comment.');
