name: Refresh Telegram settings frontend cache

on:
  push:
    branches: [fix/telegram-settings-latency]

permissions:
  contents: write

jobs:
  refresh:
    if: ${{ !contains(github.event.head_commit.message, '[telegram-cache-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/telegram-settings-latency
          fetch-depth: 0
      - run: python3 tools/telegram_phase2_1_cache_bust.py
      - run: node --check app.js
      - run: grep -q 'app.js?v=20260716-telegram-phase2-1-v1' index.html
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refresh Telegram settings frontend cache [telegram-cache-generated]"
          git push origin HEAD:fix/telegram-settings-latency
