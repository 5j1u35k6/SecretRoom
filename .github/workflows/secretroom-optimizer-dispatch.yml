name: SecretRoom optimizer dispatcher

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  dispatch:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-optimizer' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main workflow source
        uses: actions/checkout@v4
        with:
          ref: main
          path: workflow-source

      - name: Checkout optimization branch
        uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture
          path: repo
          fetch-depth: 0

      - name: Extract integration script
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('workflow-source/.github/workflows/secretroom-optimize-once.yml').read_text(encoding='utf-8')
          start_marker = '      - name: Build final six-file architecture\n        shell: bash\n        run: |\n'
          end_marker = '\n      - name: Verify final architecture\n'
          start = source.find(start_marker)
          end = source.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('Unable to extract the integration script')
          block = source[start + len(start_marker):end]
          lines = []
          for line in block.splitlines():
              if line.startswith('          '):
                  line = line[10:]
              lines.append(line)
          Path('/tmp/secretroom-integrate.sh').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          chmod +x /tmp/secretroom-integrate.sh

      - name: Run integration
        working-directory: repo
        run: /tmp/secretroom-integrate.sh

      - name: Verify final architecture
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          node --check app.js
          node --check admin.js
          test -f index.html && test -f style.css && test -f app.js
          test -f portal_sr_x892.html && test -f admin.css && test -f admin.js
          test ! -e admin.html
          test -z "$(find . -maxdepth 1 -name 'sr_*.js' -print -quit)"
          test ! -d .github/workflows
          test "$(grep -c 'src="app.js' index.html)" -eq 1
          test "$(grep -c 'src="admin.js' portal_sr_x892.html)" -eq 1
          ! grep -Eq 'src="sr_[^"]+\.js' index.html portal_sr_x892.html
          ! grep -Eq "import\(['\"]\./[^'\"]+\.js" app.js admin.js
          grep -q '__SR_RANK_POLICY_V4__' app.js
          ! grep -q "applications', adminId" admin.js
          ! grep -q 'allApplications.filter(app => isAdminAccount' admin.js
          grep -q 'activeDrawerUnsubscribe=fs.onSnapshot' admin.js
          python3 - <<'PY'
          from pathlib import Path
          import re
          for html_name in ('index.html', 'portal_sr_x892.html'):
              html = Path(html_name).read_text(encoding='utf-8')
              local = re.findall(r'(?:src|href)="([^":?#]+\.(?:js|css))', html)
              missing = [item for item in local if not Path(item).exists()]
              if missing:
                  raise SystemExit(f'{html_name} references missing files: {missing}')
          print('All local HTML asset references exist.')
          PY

      - name: Commit optimization output
        working-directory: repo
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete six-file platform optimization [optimizer-output]"
          git push origin HEAD:optimize/six-file-architecture
