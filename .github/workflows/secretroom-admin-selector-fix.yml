name: SecretRoom admin selector correction

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-admin-selector-fix' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture
          fetch-depth: 0

      - name: Replace invalid Tailwind selector
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('admin.js')
          text = path.read_text(encoding='utf-8')
          old = "count?.closest('.rounded-2xl, .bg-slate-950\\/60, .admin-stat-mini') || count?.parentElement"
          new = "count?.closest('.rounded-2xl, .admin-stat-mini') || count?.parentElement"
          if old not in text:
              raise SystemExit('Target selector was not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')

          portal = Path('portal_sr_x892.html')
          html = portal.read_text(encoding='utf-8').replace('20260716-optimized-final3', '20260716-optimized-final4')
          portal.write_text(html, encoding='utf-8')
          PY

      - name: Verify selector and syntax
        shell: bash
        run: |
          node --check admin.js
          ! grep -Fq ".bg-slate-950\/60" admin.js
          grep -Fq "closest('.rounded-2xl, .admin-stat-mini')" admin.js

      - name: Commit selector correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin.js portal_sr_x892.html
          git commit -m "Fix admin statistic card selector [optimizer-output]"
          git push origin HEAD:optimize/six-file-architecture
