name: SecretRoom runtime coordinator correction

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-runtime-fix' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture
          fetch-depth: 0

      - name: Correct coordinator observers
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              'app.js': (
                  'window.SRRuntime?.register(schedule);',
                  "new MutationObserver(schedule).observe(document.documentElement, { childList: true, subtree: true });"
              ),
              'admin.js': (
                  'window.SRAdminRuntime?.register(schedule);',
                  "new MutationObserver(schedule).observe(document.documentElement, { childList: true, subtree: true });"
              )
          }

          for filename, (old, new) in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              marker = '/* ===== Consolidated source:'
              head_end = text.find(marker)
              if head_end < 0:
                  raise SystemExit(f'{filename}: first consolidated marker missing')
              head, tail = text[:head_end], text[head_end:]
              if head.count(old) != 1:
                  raise SystemExit(f'{filename}: expected exactly one coordinator self-registration, found {head.count(old)}')
              head = head.replace(old, new, 1)
              path.write_text(head + tail, encoding='utf-8')

          index = Path('index.html').read_text(encoding='utf-8').replace('20260716-optimized-final2', '20260716-optimized-final3')
          portal = Path('portal_sr_x892.html').read_text(encoding='utf-8').replace('20260716-optimized-final2', '20260716-optimized-final3')
          Path('index.html').write_text(index, encoding='utf-8')
          Path('portal_sr_x892.html').write_text(portal, encoding='utf-8')
          PY

      - name: Verify coordinator behavior
        shell: bash
        run: |
          set -euo pipefail
          node --check app.js
          node --check admin.js
          ! sed -n '1,60p' app.js | grep -q 'SRRuntime?.register(schedule)'
          ! sed -n '1,60p' admin.js | grep -q 'SRAdminRuntime?.register(schedule)'
          sed -n '1,60p' app.js | grep -q 'new MutationObserver(schedule)'
          sed -n '1,60p' admin.js | grep -q 'new MutationObserver(schedule)'
          test "$(grep -c 'new MutationObserver' app.js)" -le 5
          test "$(grep -c 'new MutationObserver' admin.js)" -le 3

      - name: Commit coordinator correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix integrated runtime coordinators [optimizer-output]"
          git push origin HEAD:optimize/six-file-architecture
