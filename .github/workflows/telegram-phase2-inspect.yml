name: Build Telegram Phase 2

on:
  push:
    branches: [feature/telegram-phase2-integration]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/telegram-phase2-integration
          fetch-depth: 0
      - name: Merge staged Telegram modules
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          app=Path('app.js').read_text(encoding='utf-8')
          admin=Path('admin.js').read_text(encoding='utf-8')
          css=Path('style.css').read_text(encoding='utf-8')
          acss=Path('admin.css').read_text(encoding='utf-8')
          front=Path('telegram/build/frontend_phase2.js').read_text(encoding='utf-8')
          console=Path('telegram/build/admin_delivery_ui.js').read_text(encoding='utf-8')
          fcss=Path('telegram/build/frontend_phase2.css').read_text(encoding='utf-8')
          uicss=Path('telegram/build/admin_phase2.css').read_text(encoding='utf-8')
          old="if (!data.telegramInfo) navigate('telegram-bind');"
          new="if (!data.telegramInfo && data.telegramBound !== true && !data.telegramUserId) navigate('telegram-bind');"
          if old not in app: raise SystemExit('Telegram compatibility condition missing')
          app=app.replace(old,new)
          if 'SecretRoom Telegram Phase 2 member integration' not in app: app=app.rstrip()+'\n\n'+front.rstrip()+'\n'
          if 'SecretRoom Telegram Phase 2 delivery console' not in admin: admin=admin.rstrip()+'\n\n'+console.rstrip()+'\n'
          if 'SecretRoom Telegram Phase 2 member styles' not in css: css=css.rstrip()+'\n\n'+fcss.rstrip()+'\n'
          if 'SecretRoom Telegram Phase 2 admin styles' not in acss: acss=acss.rstrip()+'\n\n'+uicss.rstrip()+'\n'
          index=Path('index.html').read_text(encoding='utf-8')
          portal=Path('portal_sr_x892.html').read_text(encoding='utf-8')
          index=re.sub(r'style\.css\?v=[^"\']+','style.css?v=20260716-telegram-phase2-v1',index)
          index=re.sub(r'app\.js\?v=[^"\']+','app.js?v=20260716-telegram-phase2-v1',index)
          portal=re.sub(r'admin\.css\?v=[^"\']+','admin.css?v=20260716-telegram-phase2-v1',portal)
          portal=re.sub(r'admin\.js\?v=[^"\']+','admin.js?v=20260716-telegram-phase2-v1',portal)
          for path,data in [('app.js',app),('admin.js',admin),('style.css',css),('admin.css',acss),('index.html',index),('portal_sr_x892.html',portal)]: Path(path).write_text(data,encoding='utf-8')
          PY
      - name: Verify
        shell: bash
        run: |
          node --check app.js
          node --check admin.js
          test "$(grep -c 'SecretRoom Telegram Phase 2 member integration' app.js)" -eq 1
          test "$(grep -c 'SecretRoom Telegram Phase 2 delivery console' admin.js)" -eq 1
          ! grep -q "if (!data.telegramInfo) navigate('telegram-bind');" app.js
      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js admin.js style.css admin.css index.html portal_sr_x892.html
          git commit -m "Integrate Telegram Phase 2 member and delivery features [generated]"
          git push origin HEAD:feature/telegram-phase2-integration
