name: Inspect Telegram Phase 2 integration points

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  inspect:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/telegram-phase2-integration
          fetch-depth: 0

      - name: Build targeted code report
        shell: bash
        run: |
          mkdir -p telegram
          python3 <<'PY'
          from pathlib import Path
          import re

          TERMS = re.compile(r'emailjs|telegram|approve|reject|avatar|spec|password|forgot|reset|notification|applications|account.?status|suspend|delete', re.I)

          def functions(text):
              starts = []
              pattern = re.compile(r'(?m)^\s*(?:async\s+)?function\s+([A-Za-z_$][\w$]*)\s*\([^)]*\)\s*\{')
              for m in pattern.finditer(text):
                  depth = 0
                  quote = None
                  esc = False
                  i = m.end() - 1
                  while i < len(text):
                      c = text[i]
                      if quote:
                          if esc: esc = False
                          elif c == '\\': esc = True
                          elif c == quote: quote = None
                      else:
                          if c in "'\"`": quote = c
                          elif c == '{': depth += 1
                          elif c == '}':
                              depth -= 1
                              if depth == 0:
                                  starts.append((m.group(1), m.start(), i + 1))
                                  break
                      i += 1
              return starts

          out = []
          for filename in ['app.js', 'admin.js']:
              text = Path(filename).read_text(encoding='utf-8')
              lines = text.splitlines()
              out.append(f'\n===== {filename} =====\n')
              selected = []
              for name, start, end in functions(text):
                  body = text[start:end]
                  if TERMS.search(body):
                      selected.append((name, body))
              out.append(f'Relevant functions: {len(selected)}\n')
              for name, body in selected:
                  body_lines = body.splitlines()
                  if len(body_lines) > 260:
                      body_lines = body_lines[:180] + ['// ... truncated middle ...'] + body_lines[-60:]
                  out.append(f'\n--- FUNCTION {name} ({len(body.splitlines())} lines) ---\n')
                  out.append('\n'.join(body_lines) + '\n')

              out.append('\n--- RAW KEYWORD CONTEXTS ---\n')
              hit_lines = [i for i, line in enumerate(lines) if TERMS.search(line)]
              emitted = set()
              for i in hit_lines:
                  start = max(0, i - 8); end = min(len(lines), i + 9)
                  key = (start, end)
                  if key in emitted: continue
                  emitted.add(key)
                  out.append(f'\n[{filename}:{start+1}-{end}]\n')
                  for n in range(start, end):
                      out.append(f'{n+1:05d}: {lines[n]}\n')

          Path('telegram/phase2-inspection.txt').write_text(''.join(out), encoding='utf-8')
          PY

      - name: Commit report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram/phase2-inspection.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add Telegram Phase 2 integration inspection [generated]"
          git push origin HEAD:feature/telegram-phase2-integration
