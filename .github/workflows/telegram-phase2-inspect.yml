name: Finalize Telegram Phase 2

on:
  push:
    branches: [feature/telegram-phase2-integration]

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/telegram-phase2-integration
          fetch-depth: 0
      - name: Verify integrated platform files
        shell: bash
        run: |
          node --check app.js
          node --check admin.js
          test "$(grep -c 'SecretRoom Telegram Phase 2 member integration' app.js)" -eq 1
          test "$(grep -c 'SecretRoom Telegram Phase 2 delivery console' admin.js)" -eq 1
          test "$(grep -c 'SecretRoom Telegram Phase 2 member styles' style.css)" -eq 1
          test "$(grep -c 'SecretRoom Telegram Phase 2 admin styles' admin.css)" -eq 1
          ! grep -q "if (!data.telegramInfo) navigate('telegram-bind');" app.js
          test "$(grep -c 'src=\"app.js' index.html)" -eq 1
          test "$(grep -c 'src=\"admin.js' portal_sr_x892.html)" -eq 1
      - name: Remove temporary integration assets
        shell: bash
        run: |
          rm -rf telegram/build telegram/inspect
          rm -f telegram/phase2-inspection.txt telegram/phase2-trigger.txt
          rm -f .github/workflows/telegram-phase2-inspect.yml
      - name: Commit clean branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Telegram Phase 2 integration [cleanup-generated]"
          git push origin HEAD:feature/telegram-phase2-integration
