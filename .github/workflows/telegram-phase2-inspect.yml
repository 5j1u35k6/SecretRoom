name: Inspect Telegram Phase 2 integration points

on:
  push:
    branches: [feature/telegram-phase2-integration]

permissions:
  contents: write

jobs:
  inspect:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/telegram-phase2-integration
          fetch-depth: 0

      - name: Build exact action reports
        shell: bash
        run: |
          mkdir -p telegram/inspect
          python3 <<'PY'
          from pathlib import Path
          import re

          def extract_functions(text):
              found=[]
              patterns=[
                  re.compile(r'(?m)^\s*window\.([A-Za-z_$][\w$]*)\s*=\s*(?:async\s*)?function\s*\([^)]*\)\s*\{'),
                  re.compile(r'(?m)^\s*(?:async\s+)?function\s+([A-Za-z_$][\w$]*)\s*\([^)]*\)\s*\{')
              ]
              matches=[]
              for pattern in patterns:
                  matches.extend((m.start(),m) for m in pattern.finditer(text))
              for _,m in sorted(matches,key=lambda item:item[0]):
                  name=m.group(1)
                  depth=0; quote=None; esc=False; i=m.end()-1
                  while i < len(text):
                      c=text[i]
                      if quote:
                          if esc: esc=False
                          elif c=='\\': esc=True
                          elif c==quote: quote=None
                      else:
                          if c in "'\"`": quote=c
                          elif c=='{': depth+=1
                          elif c=='}':
                              depth-=1
                              if depth==0:
                                  found.append((name,text[m.start():i+1])); break
                      i+=1
              return found

          text=Path('admin.js').read_text(encoding='utf-8')
          funcs=extract_functions(text)
          name_rx=re.compile(r'(status|approve|reject|avatar|spec|password|reset|account|email|notification|retry|delete|suspend)',re.I)
          Path('telegram/inspect/admin-action-names.txt').write_text('\n'.join(name for name,_ in funcs if name_rx.search(name)),encoding='utf-8')
          body_rx=re.compile(r'^(updateStatus|updateStatusWithReason|approveAvatarChange|rejectAvatarChange|approveSpecElite|rejectSpecElite|retryEmailFailure|markEmailFailureHandled|processPassword|approve.*Password|reject.*Password|approve.*Account|reject.*Account|executeDelete|sendEmailNotification|sendRecoveryMail)$',re.I)
          Path('telegram/inspect/admin-target-actions.txt').write_text(''.join(f'\n===== {name} =====\n{body}\n' for name,body in funcs if body_rx.search(name)),encoding='utf-8')

          app=Path('app.js').read_text(encoding='utf-8')
          app_funcs=extract_functions(app)
          app_name_rx=re.compile(r'(telegram|profile|dashboard|account|password|notification|spec|avatar)',re.I)
          Path('telegram/inspect/app-action-names.txt').write_text('\n'.join(name for name,_ in app_funcs if app_name_rx.search(name)),encoding='utf-8')
          app_body_rx=re.compile(r'^(renderTelegramBind|renderDashboard|patchProfile|sendMail|createUserNotification|navigate|checkExistingApplication)$',re.I)
          Path('telegram/inspect/app-target-actions.txt').write_text(''.join(f'\n===== {name} =====\n{body}\n' for name,body in app_funcs if app_body_rx.search(name)),encoding='utf-8')
          PY

      - name: Commit reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram/inspect
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add exact Telegram Phase 2 action reports [generated]"
          git push origin HEAD:feature/telegram-phase2-integration
