name: SecretRoom final optimizer cleanup

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-final-cleanup' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture
          fetch-depth: 0

      - name: Remove remaining legacy rank and observer layers
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          app_path = Path('app.js')
          admin_path = Path('admin.js')
          app = app_path.read_text(encoding='utf-8')
          admin = admin_path.read_text(encoding='utf-8')

          # Remove the unused phase-one rank helpers and invocation.
          start_marker = '/* ===== Consolidated source: sr_frontend_entry.js ===== */'
          end_marker = '/* ===== Integrated rank policy and renderer ===== */'
          start = app.find(start_marker)
          end = app.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('Frontend entry/rank policy boundary was not found')
          section = app[start:end]
          section, removed_tiers = re.subn(r"\n  const tiers = \[.*?\n  \];\n", '\n', section, count=1, flags=re.S)
          section, removed_helpers = re.subn(r"\n  function timeValue\(value\) \{.*?\n  function normalizeBrandAndNav\(\)", '\n  function normalizeBrandAndNav()', section, count=1, flags=re.S)
          section = section.replace('    renderRankRules();\n', '')
          if removed_tiers != 1 or removed_helpers != 1:
              raise SystemExit(f'Legacy rank cleanup mismatch: tiers={removed_tiers}, helpers={removed_helpers}')
          app = app[:start] + section + app[end:]

          # Make the integrated renderer callable by the core rank entry point.
          old_export = "window.SRRankPolicy = Object.freeze({ version:'v4', maxPosts:TOP_POSTS, maxRatingsPerReviewerAuthor:REVIEW_CAP, tiers, data:rankData });"
          new_export = "window.SRRankPolicy = Object.freeze({ version:'v4', maxPosts:TOP_POSTS, maxRatingsPerReviewerAuthor:REVIEW_CAP, tiers, data:rankData, render });"
          if old_export not in app:
              raise SystemExit('Rank policy export was not found')
          app = app.replace(old_export, new_export, 1)

          # Replace the old core rank renderer containing Weekly Grade System.
          needle = 'Weekly Grade System'
          position = app.find(needle)
          if position < 0:
              raise SystemExit('Legacy core rank renderer was not found')
          matches = list(re.finditer(r'function\s+([A-Za-z_$][\w$]*)\s*\([^)]*\)\s*\{', app[:position]))
          if not matches:
              raise SystemExit('Unable to locate the legacy core rank function')
          match = matches[-1]
          open_brace = app.find('{', match.start())

          def closing_brace(text, opening):
              depth = 0
              quote = None
              escaped = False
              line_comment = False
              block_comment = False
              i = opening
              while i < len(text):
                  ch = text[i]
                  nxt = text[i + 1] if i + 1 < len(text) else ''
                  if line_comment:
                      if ch == '\n': line_comment = False
                      i += 1; continue
                  if block_comment:
                      if ch == '*' and nxt == '/': block_comment = False; i += 2; continue
                      i += 1; continue
                  if quote:
                      if escaped: escaped = False
                      elif ch == '\\': escaped = True
                      elif ch == quote: quote = None
                      i += 1; continue
                  if ch in "'\"`": quote = ch; i += 1; continue
                  if ch == '/' and nxt == '/': line_comment = True; i += 2; continue
                  if ch == '/' and nxt == '*': block_comment = True; i += 2; continue
                  if ch == '{': depth += 1
                  elif ch == '}':
                      depth -= 1
                      if depth == 0: return i
                  i += 1
              raise SystemExit('Legacy rank function closing brace was not found')

          close_brace = closing_brace(app, open_brace)
          signature = app[match.start():open_brace]
          replacement = signature + "{\n            window.SRRankPolicy?.render?.();\n        }"
          app = app[:match.start()] + replacement + app[close_brace + 1:]
          if needle in app:
              raise SystemExit('Legacy Weekly Grade System renderer remains')

          # Consolidate identifier-based document observers behind the platform schedulers.
          observer_pattern = re.compile(r'new MutationObserver\(([A-Za-z_$][\w$]*)\)\.observe\(document\.documentElement,\s*\{\s*childList\s*:\s*true,\s*subtree\s*:\s*true\s*\}\);')
          app_split = app.find('/* ===== Consolidated source: sr_audio_control.js ===== */')
          admin_split = admin.find('/* ===== Consolidated source: admin.js ===== */')
          if app_split < 0 or admin_split < 0:
              raise SystemExit('Runtime split markers were not found')
          app_head, app_tail = app[:app_split], app[app_split:]
          admin_head, admin_tail = admin[:admin_split], admin[admin_split:]
          app_tail, app_count = observer_pattern.subn(lambda m: f'window.SRRuntime?.register({m.group(1)});', app_tail)
          admin_tail, admin_count = observer_pattern.subn(lambda m: f'window.SRAdminRuntime?.register({m.group(1)});', admin_tail)
          app = app_head + app_tail
          admin = admin_head + admin_tail

          app_path.write_text(app.rstrip() + '\n', encoding='utf-8')
          admin_path.write_text(admin.rstrip() + '\n', encoding='utf-8')

          index = Path('index.html').read_text(encoding='utf-8').replace('20260716-optimized-final', '20260716-optimized-final2')
          portal = Path('portal_sr_x892.html').read_text(encoding='utf-8').replace('20260716-optimized-final', '20260716-optimized-final2')
          Path('index.html').write_text(index, encoding='utf-8')
          Path('portal_sr_x892.html').write_text(portal, encoding='utf-8')

          print('Additional frontend observers consolidated:', app_count)
          print('Additional admin observers consolidated:', admin_count)
          print('Remaining frontend observers:', app.count('new MutationObserver'))
          print('Remaining admin observers:', admin.count('new MutationObserver'))
          PY

      - name: Verify final cleanup
        shell: bash
        run: |
          set -euo pipefail
          node --check app.js
          node --check admin.js
          ! grep -q 'Weekly Grade System' app.js admin.js
          ! grep -q 'function renderRankRules' app.js
          ! grep -q 'entry.ratingCount \* avgRating' app.js
          grep -q 'data:rankData, render' app.js
          test "$(grep -c 'new MutationObserver' app.js)" -le 5
          test "$(grep -c 'new MutationObserver' admin.js)" -le 3
          test -z "$(find . -maxdepth 1 -name 'sr_*.js' -print -quit)"
          ! grep -Eq "import\(['\"]\./[^'\"]+\.js" app.js admin.js

      - name: Commit final cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize integrated runtimes [optimizer-output]"
          git push origin HEAD:optimize/six-file-architecture
