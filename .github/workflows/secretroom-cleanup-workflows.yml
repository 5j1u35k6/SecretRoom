name: SecretRoom one-time workflow cleanup

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/cleanup-secretroom-workflows' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove temporary optimization workflows
        shell: bash
        run: |
          rm -rf .github/workflows
          if [ -d .github ] && [ -z "$(find .github -mindepth 1 -print -quit)" ]; then
            rmdir .github
          fi

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary optimization workflows"
          git push origin HEAD:main
