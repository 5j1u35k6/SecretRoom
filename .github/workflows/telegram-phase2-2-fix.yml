name: Build Telegram Phase 2.2 frontend repair

on:
  push:
    branches: [fix/telegram-binding-truth-deeplink-onboarding]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message || github.event.pull_request.title, '[telegram-phase2-2-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/telegram-binding-truth-deeplink-onboarding
          fetch-depth: 0
      - run: python3 tools/telegram_phase2_2_frontend_patch.py
      - name: Static checks
        run: |
          node --check app.js
          grep -q "const hasActiveBinding" app.js
          grep -q "telegram_bindings" app.js
          grep -q "function profileProgress" app.js
          grep -q "sr_telegram_settings_intent" app.js
          grep -q "app.js?v=20260716-telegram-phase2-2-v1" index.html
          ! grep -q "const isBoundData" app.js
      - name: Commit generated repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html
          git commit -m "Fix Telegram binding truth and member deep link [telegram-phase2-2-generated]"
          git push origin HEAD:fix/telegram-binding-truth-deeplink-onboarding
