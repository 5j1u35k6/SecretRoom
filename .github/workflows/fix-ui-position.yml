name: Validate Telegram UI placement fix

on:
  pull_request:
    branches: [main]
    types: [reopened, synchronize]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/interface-review-followup
          fetch-depth: 0
      - run: python3 scripts/fix_interface_review_position.py
      - run: |
          cp app.js /tmp/app.mjs
          cp admin.js /tmp/admin.mjs
          node --check /tmp/app.mjs
          node --check /tmp/admin.mjs
          python3 - <<'PY'
          from pathlib import Path
          text = Path('app.js').read_text(encoding='utf-8')
          assert text.count('if (bound && isHome)') == 1
          modal = text[text.index('function renderModal(snapshot)'):text.index('function modalElement()')]
          card = text[text.index('function ensureCard(snapshot = lastSnapshot)'):text.index('function wrapPasswordSecurityMail()')]
          assert 'bound && isHome' not in modal
          assert 'bound && isHome' in card
          PY
      - run: |
          rm -f scripts/fix_interface_review_position.py
          rm -f .github/workflows/fix-ui-position.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Telegram interface deduplication placement"
          git push origin HEAD:fix/interface-review-followup
