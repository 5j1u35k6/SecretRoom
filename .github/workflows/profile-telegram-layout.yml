name: Apply Telegram profile layout

on:
  push:
    branches: [feature/profile-telegram-layout]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message || github.event.pull_request.title, '[profile-telegram-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/profile-telegram-layout
          fetch-depth: 0
      - run: python3 tools/profile_telegram_layout_patch.py
      - run: node --check app.js
      - run: |
          grep -q 'sr-tg-dismiss-home-card' app.js
          grep -q 'sr-profile-action-grid' app.js
          grep -q 'sr-profile-telegram-action' app.js
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          import re
          text = re.sub(r'app\.js\?v=[^"\']+', 'app.js?v=20260717-profile-telegram-layout-v1', text, count=1)
          path.write_text(text, encoding='utf-8')
          PY
      - run: |
          rm -f tools/profile_telegram_layout_patch.py .github/workflows/profile-telegram-layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Telegram card and profile actions [profile-telegram-generated]"
          git push origin HEAD:feature/profile-telegram-layout
