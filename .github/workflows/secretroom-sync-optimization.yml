name: SecretRoom one-time optimization branch sync

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  sync:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/sync-secretroom-optimization' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-work
          fetch-depth: 0

      - name: Remove temporary workflow from main
        working-directory: main-work
        shell: bash
        run: |
          rm -rf .github/workflows
          if [ -d .github ] && [ -z "$(find .github -mindepth 1 -print -quit)" ]; then
            rmdir .github
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove one-time optimization branch sync"
          git push origin HEAD:main

      - name: Checkout optimization branch
        uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture
          path: optimize-work
          fetch-depth: 0

      - name: Merge clean main into optimization branch
        working-directory: optimize-work
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm -rf .github/workflows
          if [ -d .github ] && [ -z "$(find .github -mindepth 1 -print -quit)" ]; then
            rmdir .github
          fi
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Keep optimization branch free of temporary workflows"
          fi
          git push origin HEAD:optimize/six-file-architecture
