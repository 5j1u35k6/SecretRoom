name: Stabilize profile Telegram service entry

on:
  push:
    branches: [fix/profile-service-post-actions]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message || github.event.pull_request.title, '[profile-entry-idempotent]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-service-post-actions
          fetch-depth: 0
      - run: python3 scripts/fix_profile_entry_idempotency.py
      - run: |
          cp app.js /tmp/app.mjs
          node --check /tmp/app.mjs
          grep -q 'srProfileServiceSignature' app.js
      - run: |
          rm -f scripts/fix_profile_entry_idempotency.py
          rm -f .github/workflows/fix-profile-entry-idempotency.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Stabilize profile service rendering [profile-entry-idempotent]"
          git push origin HEAD:fix/profile-service-post-actions
