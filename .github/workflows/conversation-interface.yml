name: Build conversation interface update

on:
  push:
    branches: [fix/conversation-interface-v1]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message || github.event.pull_request.title, '[conversation-ui-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/conversation-interface-v1
          fetch-depth: 0

      - name: Merge conversation UI into core files
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          app = Path('app.js').read_text(encoding='utf-8')
          runtime = Path('conversation-ui.js.tmp').read_text(encoding='utf-8')
          marker = '/* ===== SecretRoom conversation interface v1 ===== */'
          if marker not in app:
              app = app.rstrip() + '\n\n' + runtime.rstrip() + '\n'
          app = app.replace('@${c.userId}</span>', '@${escapeHtml(c.userId)}</span>')
          app = app.replace('<p class="text-slate-300 font-light leading-relaxed">${c.text}</p>', '<p class="text-slate-300 font-light leading-relaxed">${escapeHtml(c.text)}</p>')
          Path('app.js').write_text(app, encoding='utf-8')

          css = Path('style.css').read_text(encoding='utf-8')
          addition = Path('conversation-ui.css.tmp').read_text(encoding='utf-8')
          if '/* SecretRoom conversation interface v1 */' not in css:
              css = css.rstrip() + '\n\n' + addition.rstrip() + '\n'
          Path('style.css').write_text(css, encoding='utf-8')

          html = Path('index.html').read_text(encoding='utf-8')
          html = re.sub(r'app\.js\?v=[^"\']+', 'app.js?v=20260717-conversation-ui-v1', html)
          html = re.sub(r'style\.css\?v=[^"\']+', 'style.css?v=20260717-conversation-ui-v1', html)
          Path('index.html').write_text(html, encoding='utf-8')
          PY

      - name: Static validation
        shell: bash
        run: |
          cp app.js /tmp/app.mjs
          node --check /tmp/app.mjs
          grep -q 'SecretRoom conversation interface v1' app.js
          grep -q 'sr-conversation-panel' style.css
          grep -q 'app.js?v=20260717-conversation-ui-v1' index.html
          grep -q 'style.css?v=20260717-conversation-ui-v1' index.html
          grep -q 'escapeHtml(c.text)' app.js
          test "$(grep -c 'src="app.js' index.html)" -eq 1

      - name: Commit final files
        shell: bash
        run: |
          rm -f conversation-ui.js.tmp conversation-ui.css.tmp
          rm -f .github/workflows/conversation-interface.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Improve conversation interface [conversation-ui-generated]"
          git push origin HEAD:fix/conversation-interface-v1
