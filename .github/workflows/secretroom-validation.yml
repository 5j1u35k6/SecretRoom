name: SecretRoom optimization validation

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-validation' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture

      - name: Static architecture checks
        shell: bash
        run: |
          set -euo pipefail
          node --check app.js
          node --check admin.js
          test -f index.html && test -f style.css && test -f app.js
          test -f portal_sr_x892.html && test -f admin.css && test -f admin.js
          test ! -e admin.html
          test -z "$(find . -maxdepth 1 -name 'sr_*.js' -print -quit)"
          test "$(grep -c 'src="app.js' index.html)" -eq 1
          test "$(grep -c 'src="admin.js' portal_sr_x892.html)" -eq 1
          ! grep -Eq 'src="sr_[^"]+\.js' index.html portal_sr_x892.html
          ! grep -Eq "import\(['\"]\./[^'\"]+\.js" app.js admin.js
          ! grep -q 'Weekly Grade System' app.js admin.js
          ! grep -q "applications', adminId" admin.js
          ! grep -q 'allApplications.filter(app => isAdminAccount' admin.js
          grep -q '__SR_RANK_POLICY_V4__' app.js
          grep -q 'activeDrawerUnsubscribe=fs.onSnapshot' admin.js
          echo "Frontend MutationObservers: $(grep -c 'new MutationObserver' app.js || true)"
          echo "Admin MutationObservers: $(grep -c 'new MutationObserver' admin.js || true)"

      - name: Install browser test dependency
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.52.0
          npx playwright install --with-deps chromium >/dev/null

      - name: Start branch preview
        shell: bash
        run: |
          python3 -m http.server 4173 > /tmp/secretroom-http.log 2>&1 &
          echo $! > /tmp/secretroom-http.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/secretroom-http.log
          exit 1

      - name: Browser smoke test
        shell: bash
        run: |
          cat > /tmp/smoke.mjs <<'JS'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({ headless: true });
          const results = [];

          async function check(path, expectedGlobal, expectedSelector) {
            const page = await browser.newPage();
            const pageErrors = [];
            const consoleErrors = [];
            await page.addInitScript(() => {
              window.__srRafCount = 0;
              const native = window.requestAnimationFrame.bind(window);
              window.requestAnimationFrame = callback => native(time => {
                window.__srRafCount += 1;
                callback(time);
              });
            });
            page.on('pageerror', error => pageErrors.push(String(error?.message || error)));
            page.on('console', message => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });
            const response = await page.goto(`http://127.0.0.1:4173/${path}`, { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForTimeout(7000);
            const status = response?.status() || 0;
            const globalReady = await page.evaluate(name => Boolean(window[name]), expectedGlobal);
            const selectorReady = await page.locator(expectedSelector).count() > 0;
            const rafCount = await page.evaluate(() => window.__srRafCount || 0);
            const localScripts = await page.locator('script[src]').evaluateAll(nodes => nodes.map(node => node.getAttribute('src')).filter(src => src && !src.startsWith('http')));
            const fatalErrors = pageErrors.filter(text => !/ResizeObserver loop/i.test(text));
            results.push({ path, status, globalReady, selectorReady, rafCount, localScripts, pageErrors: fatalErrors, consoleErrors: consoleErrors.slice(0, 20) });
            if (status !== 200) throw new Error(`${path}: HTTP ${status}`);
            if (!globalReady) throw new Error(`${path}: ${expectedGlobal} was not initialized`);
            if (!selectorReady) throw new Error(`${path}: ${expectedSelector} was not found`);
            if (localScripts.length !== 1) throw new Error(`${path}: expected one local script, got ${JSON.stringify(localScripts)}`);
            if (rafCount > 500) throw new Error(`${path}: requestAnimationFrame count is unexpectedly high (${rafCount})`);
            if (fatalErrors.length) throw new Error(`${path}: page errors: ${fatalErrors.join(' | ')}`);
            await page.close();
          }

          try {
            await check('index.html', '__SR_RUNTIME__', '#app');
            await check('portal_sr_x892.html', '__SR_ADMIN_RUNTIME__', '#admin-login-modal');
            console.log(JSON.stringify({ ok: true, results }, null, 2));
          } finally {
            await browser.close();
          }
          JS
          node /tmp/smoke.mjs | tee /tmp/secretroom-smoke.json

      - name: Comment validation result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            {
              echo '## ✅ 六檔整合驗證通過'
              echo
              echo '- `app.js` 與 `admin.js` 語法檢查通過'
              echo '- 前台與後台各只載入 1 個本地 JavaScript'
              echo '- Chromium 成功載入前台與管理後台'
              echo '- 共用 runtime coordinator 已初始化'
              echo '- 未偵測到失控的 requestAnimationFrame 迴圈'
              echo '- 未偵測到未處理的頁面 JavaScript 例外'
              echo
              echo '<details><summary>Browser smoke test</summary>'
              echo
              echo '```json'
              cat /tmp/secretroom-smoke.json
              echo '```'
              echo '</details>'
            } > /tmp/validation-comment.md
          else
            {
              echo '## ❌ 六檔整合驗證未通過'
              echo
              echo '工作流程在靜態檢查、瀏覽器安裝或 smoke test 階段失敗；請查看 Actions 紀錄後再合併。'
              if [ -f /tmp/secretroom-smoke.json ]; then
                echo
                echo '```json'
                cat /tmp/secretroom-smoke.json
                echo '```'
              fi
            } > /tmp/validation-comment.md
          fi
          gh pr comment 1 --repo 5j1u35k6/SecretRoom --body-file /tmp/validation-comment.md
