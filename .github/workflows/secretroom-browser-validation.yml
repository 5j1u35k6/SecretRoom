name: SecretRoom final browser validation

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  browser:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-secretroom-browser-validation' }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-noble
    steps:
      - uses: actions/checkout@v4
        with:
          ref: optimize/six-file-architecture

      - name: Install matching Playwright package
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.52.0

      - name: Run Chromium smoke test
        id: smoke
        shell: bash
        run: |
          cat > .secretroom-browser-test.mjs <<'JS'
          import fs from 'node:fs';
          import http from 'node:http';
          import path from 'node:path';
          import { chromium } from 'playwright';

          const root = process.cwd();
          const report = { ok: true, pages: [], errors: [] };
          const mime = { '.html':'text/html; charset=utf-8', '.js':'text/javascript; charset=utf-8', '.css':'text/css; charset=utf-8', '.jpg':'image/jpeg', '.jpeg':'image/jpeg', '.png':'image/png', '.webp':'image/webp' };
          const server = http.createServer((request, response) => {
            const url = new URL(request.url, 'http://127.0.0.1');
            const relative = decodeURIComponent(url.pathname === '/' ? 'index.html' : url.pathname.replace(/^\/+/, ''));
            const filename = path.resolve(root, relative);
            if (!filename.startsWith(root) || !fs.existsSync(filename) || fs.statSync(filename).isDirectory()) {
              response.writeHead(404); response.end('Not found'); return;
            }
            response.writeHead(200, { 'Content-Type': mime[path.extname(filename).toLowerCase()] || 'application/octet-stream', 'Cache-Control':'no-store' });
            fs.createReadStream(filename).pipe(response);
          });

          let browser;
          try {
            await new Promise(resolve => server.listen(4173, '127.0.0.1', resolve));
            browser = await chromium.launch({ headless: true, args:['--no-sandbox'] });

            async function testPage(pagePath, runtimeName, rootSelector) {
              const page = await browser.newPage();
              const pageErrors = [];
              const consoleErrors = [];
              page.on('pageerror', error => pageErrors.push(String(error?.stack || error)));
              page.on('console', message => { if (message.type() === 'error') consoleErrors.push(message.text()); });
              const response = await page.goto(`http://127.0.0.1:4173/${pagePath}`, { waitUntil:'domcontentloaded', timeout:60000 });
              await page.waitForTimeout(8000);
              const status = response?.status() || 0;
              const runtimeReady = await page.evaluate(name => Boolean(window[name]), runtimeName);
              const rootReady = await page.locator(rootSelector).count() === 1;
              const localScripts = await page.locator('script[src]').evaluateAll(nodes => nodes.map(node => node.getAttribute('src')).filter(src => src && !/^https?:/.test(src)));
              const heartbeat = await page.evaluate(() => new Promise(resolve => requestAnimationFrame(() => resolve({ answer: 42, readyState: document.readyState }))));
              const result = { pagePath, status, runtimeReady, rootReady, localScripts, heartbeat, pageErrors, consoleErrors: consoleErrors.slice(0, 20) };
              result.ok = status === 200 && runtimeReady && rootReady && localScripts.length === 1 && heartbeat.answer === 42 && pageErrors.length === 0;
              report.pages.push(result);
              if (!result.ok) report.ok = false;
              await page.close();
            }

            await testPage('index.html', '__SR_RUNTIME__', '#app');
            await testPage('portal_sr_x892.html', '__SR_ADMIN_RUNTIME__', '#admin-login-modal');
          } catch (error) {
            report.ok = false;
            report.errors.push(String(error?.stack || error));
          } finally {
            if (browser) await browser.close();
            if (server.listening) await new Promise(resolve => server.close(resolve));
          }

          fs.writeFileSync('/tmp/secretroom-browser-report.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          process.exit(report.ok ? 0 : 1);
          JS

          set +e
          node .secretroom-browser-test.mjs
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          rm -f .secretroom-browser-test.mjs package.json package-lock.json
          rm -rf node_modules
          exit 0

      - name: Publish browser report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = { ok:false, errors:['Browser report was not produced.'] };
            try { report = JSON.parse(fs.readFileSync('/tmp/secretroom-browser-report.json', 'utf8')); } catch (error) { report.errors = [String(error)]; }
            const pages = (report.pages || []).map(page => [
              `### ${page.ok ? '✅' : '❌'} ${page.pagePath}`,
              `- HTTP: ${page.status}`,
              `- Runtime initialized: ${page.runtimeReady}`,
              `- Root element: ${page.rootReady}`,
              `- Local scripts: \`${JSON.stringify(page.localScripts)}\``,
              `- requestAnimationFrame heartbeat: ${page.heartbeat?.answer === 42}`,
              `- Page exceptions: ${page.pageErrors?.length || 0}`,
              page.pageErrors?.length ? `\`\`\`text\n${page.pageErrors.join('\n')}\n\`\`\`` : '',
              page.consoleErrors?.length ? `<details><summary>Console errors（不一定為致命錯誤）</summary>\n\n\`\`\`text\n${page.consoleErrors.join('\n')}\n\`\`\`\n</details>` : ''
            ].filter(Boolean).join('\n')).join('\n\n');
            const errors = (report.errors || []).length ? `\n\n### Runner errors\n\`\`\`text\n${report.errors.join('\n\n')}\n\`\`\`` : '';
            const body = `## ${report.ok ? '✅' : '❌'} SecretRoom Chromium smoke test\n\n${pages}${errors}`;
            await github.rest.issues.createComment({ owner:context.repo.owner, repo:context.repo.repo, issue_number:1, body });
            if (!report.ok) core.setFailed('Browser smoke test failed; see PR comment.');
