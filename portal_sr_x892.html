<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SecretRoom | 管理後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css?v=20260717-conversation-ui-v2">
</head>
<body class="min-h-screen bg-[#020204] p-4 md:p-8">
<div id="admin-login-modal" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-md flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="admin-login-title" aria-describedby="admin-login-description">
  <form id="admin-login-form" class="glass-panel border border-amber-500/20 rounded-3xl p-6 w-full max-w-sm shadow-2xl" novalidate>
    <h2 id="admin-login-title" class="text-xl font-extrabold text-white mb-1 flex items-center gap-2"><i class="fa-solid fa-user-shield text-amber-500" aria-hidden="true"></i> 管理員登入</h2>
    <p id="admin-login-description" class="text-xs text-slate-500 mb-5">請用已授權的管理員帳號登入。</p>
    <div id="admin-login-error" class="hidden mb-3 p-3 rounded-xl bg-red-500/10 border border-red-500/25 text-red-200 text-xs font-semibold" role="alert" aria-live="assertive"></div>
    <div class="space-y-3">
      <div><label for="admin-login-id" class="sr-only">管理員帳號 ID</label><input id="admin-login-id" name="username" autocomplete="username" required autofocus class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-sm text-slate-200" placeholder="管理員帳號 ID"></div>
      <div><label for="admin-login-password" class="sr-only">管理員密碼</label><input id="admin-login-password" name="password" type="password" autocomplete="current-password" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-sm text-slate-200" placeholder="密碼"></div>
      <button id="admin-login-submit" type="submit" class="w-full min-h-[44px] px-5 py-3 bg-amber-600 hover:bg-amber-500 text-slate-950 rounded-xl text-xs font-bold">登入後台</button>
    </div>
  </form>
</div>
<div id="admin-main" class="max-w-6xl mx-auto hidden">
  <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8 pb-6 border-b border-slate-900">
    <div><h1 class="text-3xl font-extrabold text-white flex items-center gap-3"><i class="fa-solid fa-user-shield text-amber-500"></i> SecretRoom 管理後台 (v3.1.0)</h1><p class="text-slate-500 text-sm mt-1">會員審核、內容檢舉、Telegram 通知與帳號管理</p></div>
    <div id="connection-status" class="self-start px-4 py-2 rounded-full bg-slate-900 border border-slate-800 text-xs text-slate-500"><i class="fa-solid fa-circle-notch animate-spin text-amber-500"></i> 正在連線...</div>
  </header>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
    <div class="bg-slate-950/60 border border-slate-900 p-5 rounded-2xl"><div class="text-xs text-slate-500">待審核</div><div id="count-pending" class="text-3xl font-bold text-amber-500">-</div></div>
    <div class="bg-slate-950/60 border border-slate-900 p-5 rounded-2xl"><div class="text-xs text-slate-500">頭像 / 身分待審</div><div id="count-avatar-pending" class="text-3xl font-bold text-amber-500">-</div></div>
    <div class="bg-slate-950/60 border border-slate-900 p-5 rounded-2xl"><div class="text-xs text-slate-500">檢舉待處理</div><div id="count-reports" class="text-3xl font-bold text-rose-500">-</div></div>
    <div class="bg-slate-950/60 border border-slate-900 p-5 rounded-2xl"><div class="text-xs text-slate-500">後台管理員</div><div id="count-admins" class="text-3xl font-bold text-cyan-300">-</div></div>
    <div class="bg-slate-950/60 border border-slate-900 p-5 rounded-2xl"><div class="text-xs text-slate-500">會員總數</div><div id="count-total" class="text-3xl font-bold text-amber-400">-</div></div>
  </div>
  <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 mb-8">
    <div class="admin-stat-mini rounded-2xl p-4"><div class="text-[10px] text-slate-500 font-black">今日新增</div><div id="count-today-users" class="text-2xl font-black text-amber-300">-</div></div><div class="admin-stat-mini rounded-2xl p-4"><div class="text-[10px] text-slate-500 font-black">本週新增</div><div id="count-week-users" class="text-2xl font-black text-amber-300">-</div></div><div class="admin-stat-mini rounded-2xl p-4"><div class="text-[10px] text-slate-500 font-black">黃金 Spec</div><div id="count-spec-users" class="text-2xl font-black text-amber-300">-</div></div><div class="admin-stat-mini rounded-2xl p-4"><div class="text-[10px] text-slate-500 font-black">S+ . S . G</div><div id="count-ssg-users" class="text-2xl font-black text-amber-300">-</div></div><div class="admin-stat-mini rounded-2xl p-4"><div class="text-[10px] text-slate-500 font-black">今日貼文</div><div id="count-today-posts" class="text-2xl font-black text-amber-300">-</div></div><div class="admin-stat-mini rounded-2xl p-4"><div class="text-[10px] text-slate-500 font-black">刪除帳號</div><div id="count-account-requests" class="text-2xl font-black text-amber-300">-</div></div><div class="admin-stat-mini rounded-2xl p-4"><div class="text-[10px] text-slate-500 font-black">忘記密碼</div><div id="count-password-reset" class="text-2xl font-black text-amber-300">-</div></div>
  </div>
  <div class="bg-slate-950/40 border border-amber-500/15 rounded-3xl p-6 glass-panel mb-8">
    <h2 class="text-lg font-bold text-white mb-1">平台通知</h2><p class="text-xs text-slate-500 mb-4">平台通知與 Telegram 外部通知分開管理。</p>
    <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-3 mb-3"><select id="broadcast-target" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-xs text-amber-500"><option value="all">全體會員</option><option value="sg">S+ . S . G</option></select><input id="broadcast-title" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-sm text-slate-200" placeholder="通知標題"></div>
    <textarea id="broadcast-message" class="w-full min-h-[110px] bg-slate-900 border border-slate-800 rounded-2xl px-3 py-3 text-sm text-slate-200" placeholder="輸入通知內容"></textarea>
    <div class="flex justify-end mt-4"><button onclick="sendPlatformBroadcast()" class="px-5 py-3 bg-amber-600 text-slate-950 rounded-xl text-xs font-bold"><i class="fa-solid fa-paper-plane mr-1.5"></i> 發送平台通知</button></div>
    <div class="mt-6 border-t border-slate-800 pt-5"><div class="flex justify-between"><h3 class="text-xs font-bold text-slate-300">發送紀錄</h3><span id="broadcast-history-count" class="text-[10px] text-slate-500">-</span></div><div id="broadcast-history" class="space-y-2 max-h-72 overflow-y-auto mt-3"></div></div>
  </div>
  <div class="bg-slate-950/40 border border-slate-900 rounded-3xl p-6 glass-panel">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-3"><h2 class="text-lg font-bold text-white">會員與內容管理</h2><div class="flex gap-2 flex-wrap"><input id="admin-search" oninput="filterApplications()" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200" placeholder="搜尋帳號、暱稱或 Telegram"><select id="filter-status" onchange="filterApplications()" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-amber-500"><option value="all">全部</option><option value="pending" selected>待審核</option><option value="avatar_pending">頭像待審</option><option value="spec_pending">Spec 待審</option><option value="reported_posts">貼文檢舉</option><option value="reported_comments">留言檢舉</option><option value="account_delete_requests">刪除帳號</option><option value="password_reset_requests">忘記密碼</option><option value="email_failures">舊 EmailJS 失敗紀錄（唯讀）</option><option value="approved">已通過</option><option value="active">使用中</option><option value="rejected">已拒絕</option></select></div></div>
    <div id="admin-list" class="space-y-4"><div class="text-center py-12 text-slate-500">正在讀取資料...</div></div>
  </div>
</div>
<div id="zoom-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center hidden opacity-0" onclick="closeZoomModal()"><div onclick="event.stopPropagation()"><img id="zoom-modal-img" class="max-w-[90vw] max-h-[85vh] object-contain rounded-xl"></div></div>
<div id="reject-reason-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden opacity-0"><div class="bg-slate-950 border border-slate-800 p-6 rounded-3xl max-w-sm w-full mx-4" id="reject-reason-content"><h3 class="text-lg font-bold text-white mb-2">為什麼要拒絕？</h3><div class="space-y-2 mb-5"><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="頭像不符合規範，請更換清楚真實照片。" required><span class="text-xs text-slate-300">頭像不符合規範，請更換清楚真實照片。</span></label><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="暱稱或個人資料需要修改。" ><span class="text-xs text-slate-300">暱稱或個人資料需要修改。</span></label><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="資料不完整，請補齊後再申請。" ><span class="text-xs text-slate-300">資料不完整，請補齊後再申請。</span></label><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="本次申請未通過，請聯絡管理員。" ><span class="text-xs text-slate-300">本次申請未通過，請聯絡管理員。</span></label></div><div class="flex gap-3 justify-end"><button onclick="closeRejectReasonModal()" class="px-4 py-2 text-slate-400">取消</button><button id="confirm-reject-btn" class="px-4 py-2 bg-red-600 rounded-xl text-white">拒絕申請</button></div></div></div>
<div id="delete-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden opacity-0"><div class="bg-slate-950 border border-slate-800 p-6 rounded-3xl max-w-sm w-full mx-4" id="delete-modal-content"><h3 class="text-lg font-bold text-white mb-2">確定刪除這個帳號？</h3><p class="text-slate-400 text-sm mb-6">帳號與相關資料會永久刪除，無法復原。</p><div class="flex gap-3 justify-end"><button onclick="closeDeleteModal()" class="px-4 py-2 text-slate-400">取消</button><button id="confirm-delete-btn" class="px-4 py-2 bg-red-600 rounded-xl text-white">永久刪除</button></div></div></div>
<div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-xs px-4" role="status" aria-live="polite" aria-atomic="true"></div>
<script type="module" src="admin.js?v=20260717-conversation-ui-v2"></script>
</body>
</html>
