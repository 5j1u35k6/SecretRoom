<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>SecretRoom | 管理後台</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="admin.css?v=20260719-admin-workspaces-v1"><style id="sr-admin-workspaces-style">body{padding:0!important;background:#050609!important}#admin-main{max-width:1440px!important;padding:18px 20px 40px}.admin-topbar{position:sticky;top:0;z-index:40;margin:-18px -20px 18px;padding:14px 20px;background:rgba(5,6,9,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(217,183,107,.13)}.admin-brand{display:flex;align-items:center;gap:.8rem;min-width:0}.admin-brand-mark{display:grid;place-items:center;width:38px;height:38px;border-radius:12px;background:rgba(217,183,107,.11);border:1px solid rgba(217,183,107,.23);color:#e6c878}.admin-workspace-nav{display:flex;gap:.45rem;overflow-x:auto;padding:.35rem;border-radius:1rem;background:rgba(15,17,23,.8);border:1px solid rgba(255,255,255,.06);scrollbar-width:none}.admin-workspace-nav::-webkit-scrollbar{display:none}.admin-workspace-tab{flex:0 0 auto;min-height:40px;padding:0 .9rem;border-radius:.75rem;color:#9299a8;font-size:.72rem;font-weight:800;white-space:nowrap}.admin-workspace-tab[aria-selected="true"]{color:#13100a;background:linear-gradient(135deg,#d4af37,#f3e5ab 45%,#aa771c);box-shadow:0 8px 24px rgba(170,119,28,.2)}.admin-panel{animation:admin-panel-in .2s ease}@keyframes admin-panel-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}.admin-summary-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:.75rem}.admin-summary-card{min-height:108px;padding:1rem;border-radius:1.15rem;background:linear-gradient(145deg,rgba(15,17,24,.96),rgba(8,9,13,.96));border:1px solid rgba(255,255,255,.06);box-shadow:0 14px 32px rgba(0,0,0,.25)}.admin-summary-card strong{display:block;margin-top:.35rem;font-size:1.8rem;line-height:1;color:#e6c878}.admin-queue-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:.55rem;margin-top:.75rem}.admin-queue-button{min-height:76px;padding:.7rem;border-radius:1rem;text-align:left;background:rgba(12,14,20,.72);border:1px solid rgba(255,255,255,.055);transition:.18s ease}.admin-queue-button:hover{border-color:rgba(217,183,107,.3);transform:translateY(-1px)}.admin-queue-button small{display:block;color:#737b8d;font-size:.62rem;font-weight:800}.admin-queue-button b{display:block;margin-top:.3rem;color:#d9bf80;font-size:1.25rem}.admin-section-card{border-radius:1.35rem!important;padding:1.1rem!important}.admin-manage-header{display:grid;grid-template-columns:1fr minmax(360px,auto);gap:1rem;align-items:end;margin-bottom:1rem}#admin-search{min-width:220px}.admin-empty-hint{padding:1rem;border:1px dashed rgba(217,183,107,.18);border-radius:1rem;color:#7f8797;font-size:.72rem}@media(max-width:1100px){.admin-summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.admin-queue-grid{grid-template-columns:repeat(4,minmax(0,1fr))}}@media(max-width:760px){#admin-main{padding:12px 12px 30px}.admin-topbar{margin:-12px -12px 12px;padding:11px 12px}.admin-topbar-row{align-items:flex-start!important}.admin-brand h1{font-size:1rem!important}.admin-brand p{display:none}#connection-status{padding:.55rem .7rem!important;font-size:.62rem!important}.admin-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.admin-summary-card{min-height:90px;padding:.8rem}.admin-summary-card strong{font-size:1.5rem}.admin-queue-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.admin-manage-header{grid-template-columns:1fr}.admin-manage-controls{display:grid!important;grid-template-columns:1fr!important}#admin-search{min-width:0;width:100%}}</style></head><body class="min-h-screen bg-[#020204]"><div id="admin-login-modal" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-md flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="admin-login-title" aria-describedby="admin-login-description"><form id="admin-login-form" class="glass-panel border border-amber-500/20 rounded-3xl p-6 w-full max-w-sm shadow-2xl" novalidate><h2 id="admin-login-title" class="text-xl font-extrabold text-white mb-1 flex items-center gap-2"><i class="fa-solid fa-user-shield text-amber-500" aria-hidden="true"></i> 管理員登入</h2><p id="admin-login-description" class="text-xs text-slate-500 mb-5">請用已授權的管理員帳號登入。</p><div id="admin-login-error" class="hidden mb-3 p-3 rounded-xl bg-red-500/10 border border-red-500/25 text-red-200 text-xs font-semibold" role="alert" aria-live="assertive"></div><div class="space-y-3"><div><label for="admin-login-id" class="sr-only">管理員帳號 ID</label><input id="admin-login-id" name="username" autocomplete="username" required autofocus class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-sm text-slate-200" placeholder="管理員帳號 ID"></div><div><label for="admin-login-password" class="sr-only">管理員密碼</label><input id="admin-login-password" name="password" type="password" autocomplete="current-password" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-sm text-slate-200" placeholder="密碼"></div><button id="admin-login-submit" type="submit" class="w-full min-h-[44px] px-5 py-3 bg-amber-600 hover:bg-amber-500 text-slate-950 rounded-xl text-xs font-bold">登入後台</button></div></form></div><div id="admin-main" class="mx-auto hidden"><div class="admin-topbar"><div class="admin-topbar-row flex items-center justify-between gap-3 mb-3"><div class="admin-brand"><div class="admin-brand-mark"><i class="fa-solid fa-user-shield"></i></div><div class="min-w-0"><h1 class="text-xl font-extrabold text-white truncate">SecretRoom 管理後台</h1><p class="text-[11px] text-slate-500 mt-0.5">依功能分區管理會員、審核、內容、帳號安全與通知</p></div></div><div id="connection-status" class="shrink-0 px-3 py-2 rounded-full bg-slate-900 border border-slate-800 text-xs text-slate-500"><i class="fa-solid fa-circle-notch animate-spin text-amber-500"></i> 正在連線...</div></div><nav class="admin-workspace-nav" aria-label="管理功能分頁"><button type="button" class="admin-workspace-tab" data-admin-workspace="overview" aria-selected="true"><i class="fa-solid fa-chart-pie mr-1.5"></i>總覽</button><button type="button" class="admin-workspace-tab" data-admin-workspace="review" aria-selected="false"><i class="fa-solid fa-list-check mr-1.5"></i>審核中心</button><button type="button" class="admin-workspace-tab" data-admin-workspace="members" aria-selected="false"><i class="fa-solid fa-users mr-1.5"></i>會員管理</button><button type="button" class="admin-workspace-tab" data-admin-workspace="content" aria-selected="false"><i class="fa-solid fa-shield mr-1.5"></i>內容與檢舉</button><button type="button" class="admin-workspace-tab" data-admin-workspace="security" aria-selected="false"><i class="fa-solid fa-key mr-1.5"></i>帳號安全</button><button type="button" class="admin-workspace-tab" data-admin-workspace="notifications" aria-selected="false"><i class="fa-solid fa-paper-plane mr-1.5"></i>平台通知</button><button type="button" class="admin-workspace-tab" data-admin-workspace="system" aria-selected="false"><i class="fa-solid fa-gear mr-1.5"></i>系統紀錄</button></nav></div><section id="admin-panel-overview" class="admin-panel"><div class="admin-summary-grid"><button type="button" class="admin-summary-card text-left" data-queue-filter="pending"><span class="text-xs text-slate-500 font-bold">待審核會員</span><strong id="count-pending">-</strong><span class="text-[10px] text-slate-600">前往審核中心</span></button><button type="button" class="admin-summary-card text-left" data-queue-filter="avatar_pending"><span class="text-xs text-slate-500 font-bold">頭像／身分待審</span><strong id="count-avatar-pending">-</strong><span class="text-[10px] text-slate-600">查看待處理項目</span></button><button type="button" class="admin-summary-card text-left" data-queue-filter="reported_posts"><span class="text-xs text-slate-500 font-bold">檢舉待處理</span><strong id="count-reports" class="!text-rose-400">-</strong><span class="text-[10px] text-slate-600">前往內容與檢舉</span></button><button type="button" class="admin-summary-card text-left" data-queue-filter="approved"><span class="text-xs text-slate-500 font-bold">會員總數</span><strong id="count-total">-</strong><span class="text-[10px] text-slate-600">開啟會員管理</span></button><button type="button" class="admin-summary-card text-left" data-queue-filter="email_failures"><span class="text-xs text-slate-500 font-bold">後台管理員</span><strong id="count-admins" class="!text-cyan-300">-</strong><span class="text-[10px] text-slate-600">系統與權限概況</span></button></div><div class="admin-queue-grid"><button class="admin-queue-button" data-queue-filter="approved"><small>今日新增</small><b id="count-today-users">-</b></button><button class="admin-queue-button" data-queue-filter="approved"><small>本週新增</small><b id="count-week-users">-</b></button><button class="admin-queue-button" data-queue-filter="spec_pending"><small>黃金 Spec</small><b id="count-spec-users">-</b></button><button class="admin-queue-button" data-queue-filter="approved"><small>S+ · S · G</small><b id="count-ssg-users">-</b></button><button class="admin-queue-button" data-queue-filter="reported_posts"><small>今日貼文</small><b id="count-today-posts">-</b></button><button class="admin-queue-button" data-queue-filter="account_delete_requests"><small>刪除帳號</small><b id="count-account-requests">-</b></button><button class="admin-queue-button" data-queue-filter="password_reset_requests"><small>密碼復原</small><b id="count-password-reset">-</b></button></div><div class="admin-empty-hint mt-4"><i class="fa-solid fa-circle-info text-amber-400 mr-1.5"></i>總覽只顯示關鍵數字；點擊卡片即可進入對應功能，不再把所有資料堆在同一頁。</div></section><section id="admin-panel-manage" class="admin-panel hidden"><div class="bg-slate-950/40 border border-slate-900 rounded-3xl glass-panel admin-section-card"><div class="admin-manage-header"><div><div id="admin-workspace-kicker" class="text-[10px] text-amber-400 font-black tracking-[.16em]">REVIEW CENTER</div><h2 id="admin-workspace-title" class="text-lg font-bold text-white mt-1">審核中心</h2><p id="admin-workspace-description" class="text-xs text-slate-500 mt-1">集中處理會員、頭像與黃金 Spec 申請。</p></div><div class="admin-manage-controls flex gap-2 flex-wrap justify-end"><input id="admin-search" oninput="filterApplications()" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-slate-200" placeholder="搜尋帳號、暱稱或 Telegram"><select id="filter-status" onchange="filterApplications()" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-amber-500"><option value="all">全部資料</option><option value="pending" selected>待審核會員</option><option value="avatar_pending">頭像待審</option><option value="spec_pending">Spec 待審</option><option value="reported_posts">貼文檢舉</option><option value="reported_comments">留言檢舉</option><option value="account_delete_requests">刪除帳號</option><option value="password_reset_requests">密碼復原申請</option><option value="email_failures">舊 EmailJS 失敗紀錄（唯讀）</option><option value="approved">已通過</option><option value="active">使用中</option><option value="rejected">已拒絕</option></select></div></div><div id="admin-list" class="space-y-4"><div class="text-center py-12 text-slate-500">正在讀取資料...</div></div></div></section><section id="admin-panel-notifications" class="admin-panel hidden"><div class="bg-slate-950/40 border border-amber-500/15 rounded-3xl glass-panel admin-section-card"><div class="mb-4"><div class="text-[10px] text-amber-400 font-black tracking-[.16em]">NOTIFICATION CENTER</div><h2 class="text-lg font-bold text-white mt-1">平台通知</h2><p class="text-xs text-slate-500 mt-1">平台內通知與 Telegram 外部通知分開管理；此區只負責平台公告與發送紀錄。</p></div><div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-3 mb-3"><select id="broadcast-target" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-xs text-amber-500"><option value="all">全體會員</option><option value="sg">S+ · S · G</option></select><input id="broadcast-title" class="bg-slate-900 border border-slate-800 rounded-xl px-3 py-3 text-sm text-slate-200" placeholder="通知標題"></div><textarea id="broadcast-message" class="w-full min-h-[130px] bg-slate-900 border border-slate-800 rounded-2xl px-3 py-3 text-sm text-slate-200" placeholder="輸入通知內容"></textarea><div class="flex justify-end mt-4"><button onclick="sendPlatformBroadcast()" class="px-5 py-3 bg-amber-600 text-slate-950 rounded-xl text-xs font-bold"><i class="fa-solid fa-paper-plane mr-1.5"></i>發送平台通知</button></div><div class="mt-6 border-t border-slate-800 pt-5"><div class="flex justify-between"><h3 class="text-xs font-bold text-slate-300">發送紀錄</h3><span id="broadcast-history-count" class="text-[10px] text-slate-500">-</span></div><div id="broadcast-history" class="space-y-2 max-h-[420px] overflow-y-auto mt-3"></div></div></div></section></div><div id="zoom-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center hidden opacity-0" onclick="closeZoomModal()"><div onclick="event.stopPropagation()"><img id="zoom-modal-img" class="max-w-[90vw] max-h-[85vh] object-contain rounded-xl" alt="放大檢視"></div></div><div id="reject-reason-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden opacity-0"><div class="bg-slate-950 border border-slate-800 p-6 rounded-3xl max-w-sm w-full mx-4" id="reject-reason-content"><h3 class="text-lg font-bold text-white mb-2">為什麼要拒絕？</h3><div class="space-y-2 mb-5"><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="頭像不符合規範，請更換清楚真實照片。" required><span class="text-xs text-slate-300">頭像不符合規範，請更換清楚真實照片。</span></label><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="暱稱或個人資料需要修改。"><span class="text-xs text-slate-300">暱稱或個人資料需要修改。</span></label><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="資料不完整，請補齊後再申請。"><span class="text-xs text-slate-300">資料不完整，請補齊後再申請。</span></label><label class="flex gap-3 p-2.5 bg-slate-900 rounded-xl"><input type="radio" name="rejection-reason" value="本次申請未通過，請聯絡管理員。"><span class="text-xs text-slate-300">本次申請未通過，請聯絡管理員。</span></label></div><div class="flex gap-3 justify-end"><button onclick="closeRejectReasonModal()" class="px-4 py-2 text-slate-400">取消</button><button id="confirm-reject-btn" class="px-4 py-2 bg-red-600 rounded-xl text-white">拒絕申請</button></div></div></div><div id="delete-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden opacity-0"><div class="bg-slate-950 border border-slate-800 p-6 rounded-3xl max-w-sm w-full mx-4" id="delete-modal-content"><h3 class="text-lg font-bold text-white mb-2">確定刪除這個帳號？</h3><p class="text-slate-400 text-sm mb-6">帳號與相關資料會永久刪除，無法復原。</p><div class="flex gap-3 justify-end"><button onclick="closeDeleteModal()" class="px-4 py-2 text-slate-400">取消</button><button id="confirm-delete-btn" class="px-4 py-2 bg-red-600 rounded-xl text-white">永久刪除</button></div></div></div><div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-xs px-4" role="status" aria-live="polite" aria-atomic="true"></div><script type="module" src="admin.js?v=20260719-admin-workspaces-v1"></script><script type="module">
(() => {
  const panels = {
    overview: document.getElementById('admin-panel-overview'),
    manage: document.getElementById('admin-panel-manage'),
    notifications: document.getElementById('admin-panel-notifications')
  };
  const filter = document.getElementById('filter-status');
  const title = document.getElementById('admin-workspace-title');
  const description = document.getElementById('admin-workspace-description');
  const kicker = document.getElementById('admin-workspace-kicker');
  const configs = {
    overview: { panel: 'overview' },
    review: { panel: 'manage', filter: 'pending', kicker: 'REVIEW CENTER', title: '審核中心', description: '集中處理新會員、頭像與黃金 Spec 申請。' },
    members: { panel: 'manage', filter: 'approved', kicker: 'MEMBER DIRECTORY', title: '會員管理', description: '搜尋已通過與使用中的會員，處理會員資料與狀態。' },
    content: { panel: 'manage', filter: 'reported_posts', kicker: 'CONTENT SAFETY', title: '內容與檢舉', description: '依序處理貼文與留言檢舉，避免審核項目混在會員清單。' },
    security: { panel: 'manage', filter: 'password_reset_requests', kicker: 'ACCOUNT SECURITY', title: '帳號安全', description: '查看密碼復原與刪除帳號申請；密碼復原正式流程由 Telegram 驗證完成。' },
    notifications: { panel: 'notifications' },
    system: { panel: 'manage', filter: 'email_failures', kicker: 'SYSTEM RECORDS', title: '系統紀錄', description: '檢查舊 EmailJS 失敗紀錄與系統相容資料；此區為唯讀稽核用途。' }
  };
  function renderList() {
    try { window.filterApplications?.(); } catch (error) { console.warn('列表更新失敗', error); }
  }
  function activate(name, forcedFilter = '') {
    const config = configs[name] || configs.overview;
    Object.values(panels).forEach(panel => panel?.classList.add('hidden'));
    panels[config.panel]?.classList.remove('hidden');
    document.querySelectorAll('[data-admin-workspace]').forEach(button => button.setAttribute('aria-selected', String(button.dataset.adminWorkspace === name)));
    if (config.panel === 'manage') {
      const nextFilter = forcedFilter || config.filter || 'all';
      if (filter) filter.value = nextFilter;
      if (kicker) kicker.textContent = config.kicker || '';
      if (title) title.textContent = config.title || '';
      if (description) description.textContent = config.description || '';
      renderList();
    }
    sessionStorage.setItem('sr_admin_workspace', name);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  document.querySelectorAll('[data-admin-workspace]').forEach(button => {
    button.addEventListener('click', () => activate(button.dataset.adminWorkspace));
  });
  document.querySelectorAll('[data-queue-filter]').forEach(button => {
    button.addEventListener('click', () => {
      const value = button.dataset.queueFilter;
      const workspace = ['reported_posts','reported_comments'].includes(value) ? 'content'
        : ['password_reset_requests','account_delete_requests'].includes(value) ? 'security'
        : value === 'email_failures' ? 'system'
        : ['approved','active','rejected'].includes(value) ? 'members' : 'review';
      activate(workspace, value);
    });
  });
  const loginForm = document.getElementById('admin-login-form');
  loginForm?.addEventListener('submit', event => {
    event.preventDefault();
    document.getElementById('admin-login-submit')?.click();
  });
  const stored = sessionStorage.getItem('sr_admin_workspace');
  activate(configs[stored] ? stored : 'overview');
})();
</script></body></html>
