        ::-webkit-scrollbar-track { background: transparent; }

        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms ease-out, transform 300ms ease-out; }
        
        /* 自訂下拉選單樣式 */

        /* 星星評分閃爍特效 */

            text-shadow: 0 0 8px rgba(250, 204, 21, 0.6);

            transition: transform 0.2s ease, filter 0.2s ease;

</head>
<body class="min-h-screen flex flex-col items-center justify-center p-0 md:p-4 bg-[#090d16]">

    <!-- 主應用程式容器 (強制維持美學尺寸，在任何螢幕上均不塌陷) -->
    <div id="app" class="w-full max-w-md h-[100dvh] md:h-[800px] md:rounded-3xl shadow-2xl overflow-hidden relative flex flex-col bg-[#090d16] md:glass-panel border-0 md:border md:border-slate-800">
        <!-- 動態內容將渲染於此 -->
        <div id="loading-screen" class="absolute inset-0 z-50 bg-[#090d16] flex flex-col items-center justify-center">
            <div class="w-16 h-16 border-4 border-slate-800 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-medium tracking-widest text-sm">連線至加密伺服器...</p>

    <!-- 浮動提示訊息容器 (Toast) -->
    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-xs px-4"></div>

    <script type="module">
        // 宣告 Firebase 變數，後續動態載入
        let initializeApp, getAuth, signInAnonymously, onAuthStateChanged;
        let getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, getDocs, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc;

        // --- 👇 請在此填入您的 Firebase 設定 👇 ---
        const appId = 'secretg-demo-app'; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyCNgJxYjC90DjtvTSaze5CREJf1Vt32aYQ",
            authDomain: "secretroom-ef728.firebaseapp.com",
            projectId: "secretroom-ef728",
            storageBucket: "secretroom-ef728.firebasestorage.app",
            messagingSenderId: "22006617218",
            appId: "1:22006617218:web:9e9af5c6558ea57dcb109b"
        };
        // --- 👆 填寫結束 👆 ---

        // --- 👇 EmailJS 與 Telegram Bot 設定 👇 ---
        const emailjsConfig = {
            publicKey: "ZEp9d-hAeYdFujDZy",
            serviceId: "service_1ou10mi",
            templateId: "template_25proud"
        };

        const telegramBotName = "SecretRoomtwBot"; 
        // --- 👆 填寫結束 👆 ---

        // 動態載入 Firebase SDK
        async function loadFirebaseSDKs() {
            try {
                const [appMod, authMod, firestoreMod] = await Promise.all([
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")
                ]);

                initializeApp = appMod.initializeApp;
                getAuth = authMod.getAuth;
                signInAnonymously = authMod.signInAnonymously;
                onAuthStateChanged = authMod.onAuthStateChanged;

                getFirestore = firestoreMod.getFirestore;
                doc = firestoreMod.doc;
                setDoc = firestoreMod.setDoc;
                getDoc = firestoreMod.getDoc;
                collection = firestoreMod.collection;
                query = firestoreMod.query;
                onSnapshot = firestoreMod.onSnapshot;
                updateDoc = firestoreMod.updateDoc;
                getDocs = firestoreMod.getDocs;
                addDoc = firestoreMod.addDoc;
                serverTimestamp = firestoreMod.serverTimestamp;
                arrayUnion = firestoreMod.arrayUnion;
                arrayRemove = firestoreMod.arrayRemove;
                deleteDoc = firestoreMod.deleteDoc; // 註冊刪除方法

                return true;
            } catch (e) {
                console.error("無法加載 Firebase SDK，此為真實系統，必須連線運行。", e);
                return false;
            }
        }

        let app, db, auth;

        window.state = {
            currentView: 'landing',
            userId: null, // 以使用者帳號為 ID
            userData: {
                username: '', password: '',
                nickname: '', birthYear: '', birthMonth: '', birthDay: '',
                height: '', weight: '', length: '', girth: '', kinks: [], otherKink: '', email: ''
            },
            emailVerified: false,
            sentOTP: null,
            posts: [],
            searchTerm: '',
            currentTab: 'feed', // 'feed' | 'profile'
            showCreateModal: false,
            dashboardInitialized: false, // 防重複載入鎖
            selectedProfileUserId: null, // 用於點擊瀏覽他人專區的 ID
            selectedProfileData: null,   // 用於儲存點擊瀏覽的他人資料
            postToDeleteId: null,        // 暫存即將刪除的貼文ID
            kinksOptions: [
                "熊族/Daddy大叔", "肌肉狼犬/運動風", "陽光小鮮肉", 
                "白襪/球鞋控", "西裝正裝/制服控", "皮革膠衣/個性風", 
                "繩縛/BDSM調教", "藝術攝影/體態展現", "生活日常/品味",
                "純愛伴侶/心靈交流"
            ]
        };

        const appContainer = document.getElementById('app');

        async function initApp() {
            if (emailjsConfig.publicKey) {
                emailjs.init({ publicKey: emailjsConfig.publicKey });
            }

            const firebaseLoaded = await loadFirebaseSDKs();
            
            if (firebaseLoaded) {
                try {
                    app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    
                    // 啟用匿名連線
                    await signInAnonymously(auth);
                    hideLoading();
                    navigate('landing');
                } catch (error) {
                    console.error("Firebase 初始化錯誤:", error);
                    showToast('資料庫連線錯誤，請確認 Firebase 設定', 'error');
                }
            } else {
                showToast('無法加載 SDK，請確認網路或 CDN 狀態', 'error');
            }
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';
        }

        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColors = {
                error: 'bg-red-500/95 border-red-400',
                success: 'bg-emerald-500/95 border-emerald-400',
                info: 'bg-indigo-600/95 border-indigo-400'
            };
            toast.className = `${bgColors[type]} text-white px-5 py-3.5 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] border text-sm font-medium transition-all duration-300 opacity-0 transform -translate-y-4 backdrop-blur-xl flex items-center gap-3`;
            
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> <span>${message}</span>`;
            
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.remove('opacity-0', '-translate-y-4'));
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.navigate = function(view) {
            window.state.currentView = view;
            renderView();
        }

        function renderView() {
            appContainer.innerHTML = '';
            let content = '';

            switch(window.state.currentView) {
                case 'landing': content = viewLanding(); break;
                case 'login': content = viewLogin(); break;
                case 'register': content = viewRegister(); break;
                case 'confirm': content = viewConfirm(); break;
                case 'pending': content = viewPending(); break;
                case 'telegram': content = viewTelegram(); break;
                case 'dashboard': content = viewDashboard(); break;
            }

            appContainer.innerHTML = content;
            
            if (window.state.currentView === 'register') initRegisterForm();
            if (window.state.currentView === 'pending') listenToApplicationStatus();
            if (window.state.currentView === 'telegram') loadTelegramWidget();
            if (window.state.currentView === 'dashboard') initDashboardFeatures();
        }

        function viewLanding() {
            return `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-enter fade-enter-active bg-[url('https://images.unsplash.com/photo-1574170685715-db104eb0058b?q=80&w=600&auto=format&fit=crop')] bg-cover bg-center relative h-full">
                    <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm z-0"></div>
                    <div class="z-10 w-full flex flex-col items-center">
                        <div class="w-24 h-24 bg-gradient-to-tr from-indigo-900 to-indigo-700 rounded-3xl flex items-center justify-center mb-6 shadow-2xl border border-indigo-500/30 transform rotate-3">
                            <i class="fa-solid fa-camera-retro text-4xl text-slate-100 transform -rotate-3"></i>
                        </div>
                        <h1 class="text-4xl font-bold mb-3 tracking-wider text-white">SecretRoom</h1>
                        <p class="text-slate-300 mb-10 text-sm font-light tracking-wide leading-relaxed">
                            專屬男性的私密生活分享社群<br>分享生活近況，看見最真實的彼此
                        </p>
                        
                        <div class="w-full space-y-3">
                            <button onclick="navigate('register')" class="w-full bg-indigo-600 text-white hover:bg-indigo-500 font-bold py-4 px-4 rounded-2xl transition duration-300 shadow-[0_0_30px_rgba(99,102,241,0.3)] text-lg">
                                申請加入社群
                            </button>
                            <button onclick="navigate('login')" class="w-full bg-slate-900/80 hover:bg-slate-850 text-slate-300 font-bold py-4 px-4 rounded-2xl transition duration-300 border border-slate-800 text-base">
                                已有帳號？登入查看進度
                            </button>
                        </div>
                        <p class="text-xs text-slate-500 mt-6 bg-slate-950/80 py-2 px-4 rounded-full border border-slate-900"><i class="fa-solid fa-shield-halved mr-1 text-emerald-500"></i> 真人審核 · 滿18歲限定</p>
                    </div>
                </div>
            `;
        }

        function viewLogin() {
            return `
                <div class="flex-1 flex flex-col h-full fade-enter fade-enter-active bg-[#090d16]">
                    <div class="p-4 border-b border-slate-900 flex items-center bg-[#090d16]/80 backdrop-blur-md sticky top-0 z-20">
                        <button onclick="navigate('landing')" class="text-slate-400 hover:text-white transition w-10 flex justify-start"><i class="fa-solid fa-chevron-left text-lg"></i></button>
                        <h2 class="flex-1 text-center font-semibold text-lg tracking-wide text-white">身分登入</h2>
                        <div class="w-10"></div>
                    </div>
                    <div class="flex-1 flex flex-col justify-center p-6 space-y-6">
                        <div class="text-center">
                            <i class="fa-solid fa-user-check text-4xl text-indigo-500 mb-3"></i>
                            <p class="text-slate-400 text-xs leading-relaxed">請輸入您註冊時設定的帳號與密碼，<br>隨時追蹤人工審核及綁定進度。</p>
                        </div>
                        <form id="loginForm" onsubmit="handleLoginSubmit(event)" class="space-y-4">
                            <div class="space-y-1.5">
                                <label class="block text-sm font-medium text-slate-300">使用者帳號</label>
                                <input type="text" id="login-username" required class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 transition placeholder-slate-600" placeholder="您的登入帳號">
                            </div>
                            <div class="space-y-1.5">
                                <label class="block text-sm font-medium text-slate-300">安全密碼</label>
                                <input type="password" id="login-password" required class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 transition placeholder-slate-600" placeholder="您的密碼">
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition duration-300 shadow-lg text-lg">
                                驗證並檢查狀態
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        window.handleLoginSubmit = async function(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const docRef = doc(db, 'secretg_apps', appId, 'applications', username);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.password === password) {
                        window.state.userData = data;
                        window.state.userId = username;
                        showToast('驗證成功！', 'success');
                        
                        if (data.status === 'pending') {
                            navigate('pending');
                        } else if (data.status === 'approved') {
                            navigate('telegram');
                        } else if (data.status === 'active') {
                            navigate('dashboard');
                        } else if (data.status === 'rejected') {
                            showToast('您的申請未通過審核。', 'error');
                            navigate('landing');
                        }
                    } else {
                        showToast('密碼錯誤！請再次確認', 'error');
                    }
                } else {
                    showToast('此帳號不存在！', 'error');
                }
            } catch (err) {
                console.error("登入錯誤:", err);
                showToast('連線失敗，請稍後再試', 'error');
            }
        }

            return `

                                    <i class="fa-solid fa-key"></i> 帳號密碼設定
                                </h3>
                                <div class="space-y-1.5">
                                    <label class="block text-xs font-medium text-slate-400 ml-1">使用者帳號 <span class="text-red-400">*</span></label>
                                    <input type="text" id="reg-username" required value="${window.state.userData.username||''}" class="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition" placeholder="建議填寫英數組合">
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-xs font-medium text-slate-400 ml-1">再次確認使用者帳號 <span class="text-red-400">*</span></label>
                                    <input type="text" id="reg-username-confirm" required value="${window.state.userData.username||''}" class="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition" placeholder="再次輸入以核對">
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-xs font-medium text-slate-400 ml-1">安全密碼 <span class="text-red-400">*</span></label>
                                    <input type="password" id="reg-password" required value="${window.state.userData.password||''}" class="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500 transition" placeholder="請設定 6 位數以上密碼">
                                </div>

                                                <option value="">年</option>
                                            </select>
                                        </div>
                                        <div class="relative">
                                            <select id="reg-month" required class="w-full bg-slate-900/50 border border-slate-850 rounded-2xl pl-4 pr-10 py-3.5 text-white focus:outline-none focus:border-indigo-500 transition appearance-none text-center">

                                        <div class="relative">
                                            <select id="reg-day" required class="w-full bg-slate-900/50 border border-slate-850 rounded-2xl pl-4 pr-10 py-3.5 text-white focus:outline-none focus:border-indigo-500 transition appearance-none text-center">
                                                <option value="">日</option>

                                    </div>

                                <!-- 身高體重 -->

        // OTP 發送與驗證處理
        window.handleSendOTP = async function() {
            const emailInput = document.getElementById('reg-email');
            const email = emailInput.value.trim();
            if (!email || !email.includes('@')) {
                showToast('請先填寫正確的電子郵件信箱', 'error');
                return;
            }

            const sendBtn = document.getElementById('send-otp-btn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 發送中...';

            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            window.state.sentOTP = otp;

            try {
                await emailjs.send(emailjsConfig.serviceId, emailjsConfig.templateId, {
                    to_email: email,
                    to_name: "新申請用戶",
                    status_text: "信箱綁定驗證碼",
                    message: `您好！您目前正在註冊 SecretRoom 私密社群。\n\n您的信箱驗證代碼為：[ ${otp} ]\n\n請於網頁中輸入此驗證碼以完成信箱綁定認證。`
                });

                showToast('驗證郵件寄送成功，請查收信箱', 'success');
                document.getElementById('otp-input-container').classList.remove('hidden');
                emailInput.disabled = true;
            } catch (err) {
                console.error("OTP 發送失敗:", err);
                showToast('發送失敗，請確認您的信箱是否存在或 EmailJS 設定', 'error');
                sendBtn.disabled = false;
                sendBtn.innerText = '發送驗證碼';
            }
        }

        window.handleVerifyOTP = function() {
            const userOtp = document.getElementById('reg-otp').value.trim();
            if (userOtp === window.state.sentOTP) {
                window.state.emailVerified = true;
                showToast('信箱驗證成功！', 'success');
                document.getElementById('otp-input-container').classList.add('hidden');
                document.getElementById('send-otp-btn').classList.add('hidden');
                document.getElementById('email-verified-badge').classList.remove('hidden');
            } else {
                showToast('驗證碼不正確，請重新確認', 'error');
            }
        }

        function initRegisterForm() {
            const yearSelect = document.getElementById('reg-year');
            const monthSelect = document.getElementById('reg-month');
            const daySelect = document.getElementById('reg-day');
            
            const currentYear = new Date().getFullYear();
            const maxYear = currentYear - 18; // 滿18歲
            const minYear = currentYear - 80;

            for (let y = maxYear; y >= minYear; y--) {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                if(window.state.userData.birthYear == y) opt.selected = true;
                yearSelect.appendChild(opt);
            }

            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = m;
                if(window.state.userData.birthMonth == m) opt.selected = true;
                monthSelect.appendChild(opt);
            }

            const updateDays = () => {
                const y = parseInt(yearSelect.value);
                const m = parseInt(monthSelect.value);
                daySelect.innerHTML = '<option value="">日</option>';
                if (!y || !m) return;
                
                const daysInMonth = new Date(y, m, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = d;
                    if(window.state.userData.birthDay == d) opt.selected = true;
                    daySelect.appendChild(opt);
                }
            };

            yearSelect.addEventListener('change', updateDays);
            monthSelect.addEventListener('change', updateDays);
            if(window.state.userData.birthYear && window.state.userData.birthMonth) updateDays();

            const form = document.getElementById('registerForm');
            const otherCheckbox = document.getElementById('kink-other-checkbox');
            const otherContainer = document.getElementById('kink-other-container');

            if(window.state.userData.otherKink) {
                otherCheckbox.checked = true;
                otherContainer.classList.remove('hidden');
                document.getElementById('reg-kink-other').setAttribute('required', 'true');
            }

            otherCheckbox.addEventListener('change', (e) => {
                if(e.target.checked) {
                    otherContainer.classList.remove('hidden');
                    document.getElementById('reg-kink-other').setAttribute('required', 'true');
                } else {
                    otherContainer.classList.add('hidden');
                    document.getElementById('reg-kink-other').removeAttribute('required');
                    document.getElementById('reg-kink-other').value = '';
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!window.state.emailVerified) {
                    showToast('請先完成信箱驗證綁定！', 'error');
                    return;
                }
                
                const username = document.getElementById('reg-username').value.trim();
                const usernameConfirm = document.getElementById('reg-username-confirm').value.trim();
                const password = document.getElementById('reg-password').value;
                const passwordConfirm = document.getElementById('reg-password-confirm').value;

                if (username !== usernameConfirm) {
                    showToast('使用者帳號兩次輸入不一致！', 'error');
                    return;
                }
                if (password !== passwordConfirm) {
                    showToast('安全密碼兩次輸入不一致！', 'error');
                    return;
                }

                if(db) {
                    try {
                        const docRef = doc(db, 'secretg_apps', appId, 'applications', username);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) {
                            showToast('此帳號已被註冊，請換個帳號！', 'error');
                            return;
                        }
                    } catch (err) {
                        console.error("查重帳號出錯:", err);
                    }
                }

                const selectedKinks = Array.from(document.querySelectorAll('input[name="kinks"]:checked')).map(el => el.value);
                const otherValue = otherCheckbox.checked ? document.getElementById('reg-kink-other').value.trim() : '';

                window.state.userData = {
                    username: username,
                    password: password,
                    nickname: document.getElementById('reg-nickname').value,
                    birthYear: document.getElementById('reg-year').value,
                    birthMonth: document.getElementById('reg-month').value,
                    birthDay: document.getElementById('reg-day').value,
                    height: document.getElementById('reg-height').value,
                    weight: document.getElementById('reg-weight').value,
                    length: document.getElementById('reg-length').value || '未填',
                    girth: document.getElementById('reg-girth').value || '未填',
                    kinks: selectedKinks,
                    otherKink: otherValue,
                    email: document.getElementById('reg-email').value,
                    status: 'pending'
                };

                navigate('confirm');
            });
        }

                    if (doc.id !== window.state.userId && data.telegramInfo && data.telegramInfo.id === user.id) {

                });

                if (isAlreadyBound) {

                    return;
                }

                showToast('Telegram 帳號驗證與綁定成功！', 'success');
                saveTelegramAuthData(user);
            } catch (err) {
                console.error("檢查 Telegram 唯一性失敗:", err);

        function getRecommendationScore(post, myKinks) {
            let score = 0;
            
            // 1. 主題契合度 (Kinks tags match) - 最重加分
            if (post.tags && Array.isArray(post.tags)) {
                post.tags.forEach(tag => {
                    if (myKinks && myKinks.some(k => k.includes(tag) || tag.includes(k))) {
                        score += 150; // 主題高度吻合加分
                    }
                });
            }
            
            // 2. 按讚熱門度
            const likesCount = post.likes ? post.likes.length : 0;
            score += likesCount * 15;
            
            // 3. 評分高度與廣度
            const ratingsMap = post.ratings || {};
            const ratingsArray = Object.values(ratingsMap);
            if (ratingsArray.length > 0) {
                const avgRating = ratingsArray.reduce((a, b) => a + b, 0) / ratingsArray.length;
                score += avgRating * 25; // 依照平均星等加分
                score += ratingsArray.length * 5; // 評分人氣度加分
            }
            
            // 4. 新舊平準 (貼文新鮮度)
            const postTime = post.createdAt ? (post.createdAt.seconds || (new Date(post.createdAt).getTime() / 1000)) : (Date.now() / 1000);
            const hoursAgo = (Date.now() / 1000 - postTime) / 3600;
            if (hoursAgo > 0) {
                score -= Math.min(hoursAgo * 2, 100); // 每過一小時扣 2 分，最多扣 100 分
            } else {
                score += 50; // 新貼文暴發分
            }
            
            return score;
        }

                                    <button type="submit" id="submit-post-btn" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-white text-xs font-semibold shadow-lg">發布分享</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- 刪除貼文確認 Modal (客製高質感，無 Alert) -->
                    <div id="delete-post-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[110] flex items-center justify-center hidden opacity-0 transition-all duration-300">
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl max-w-xs w-full mx-4 shadow-2xl relative transform scale-95 transition-all text-center">
                            <i class="fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-3 block animate-bounce"></i>
                            <h3 class="text-base font-bold text-white mb-2">確定刪除此則貼文？</h3>
                            <p class="text-xs text-slate-400 mb-6 leading-relaxed">
                                這將會永久將此貼文自雲端資料庫刪除，此動作將無法還原，請確認。
                            </p>
                            <div class="flex gap-3 justify-center">
                                <button type="button" onclick="closeDeletePostModal()" class="px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-800 text-xs font-semibold transition">取消</button>
                                <button type="button" onclick="executePostDelete()" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-xl text-white text-xs font-semibold transition shadow-lg shadow-red-950/30">確認刪除</button>
                            </div>
                        </div>
                    </div>

                </div>
            `;
        }

        window.viewUserProfile = async function(profileUserId) {
            if (profileUserId === window.state.userId) {
                // 如果是自己，直接切換到個人檔案分頁
                switchTab('profile');
                return;
            }

            try {
                const userDocRef = doc(db, 'secretg_apps', appId, 'applications', profileUserId);
                const userSnap = await getDoc(userDocRef);
                if (userSnap.exists()) {
                    window.state.selectedProfileUserId = profileUserId;
                    window.state.selectedProfileData = userSnap.data();
                    renderView();
                } else {
                    showToast("找不到此用戶資料", "error");
                }
            } catch (err) {
                console.error("載入他人資訊出錯:", err);
                showToast("連線至資料庫失敗", "error");
            }
        };

        window.closeUserProfile = function() {
            window.state.selectedProfileUserId = null;
            window.state.selectedProfileData = null;
            renderView();
        };

        window.handleTagClick = function(tag) {
            window.state.searchTerm = tag;
            closeUserProfile();
            const searchInput = document.getElementById('dashboard-search');
            if (searchInput) {
                searchInput.value = tag;
                handleSearch(searchInput);
            }
        };

        let longPressTimer = null;
        window.startPostPress = function(postId) {
            longPressTimer = setTimeout(() => {
                openDeletePostModal(postId);
            }, 800); // 800毫秒視為長按
        };

        window.cancelPostPress = function() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        };

        window.openDeletePostModal = function(postId) {
            window.state.postToDeleteId = postId;
            const modal = document.getElementById('delete-post-modal');
            if (!modal) return;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const box = modal.querySelector('.transform');
                if (box) box.classList.remove('scale-95');
            }, 50);
        };

        window.closeDeletePostModal = function() {
            const modal = document.getElementById('delete-post-modal');
            if (!modal) return;
            modal.classList.add('opacity-0');
            const box = modal.querySelector('.transform');
            if (box) box.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                window.state.postToDeleteId = null;
            }, 300);
        };

        window.executePostDelete = async function() {
            const postId = window.state.postToDeleteId;
            if (!postId || !db) return;

            try {
                const docRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                await deleteDoc(docRef);
                showToast("貼文已成功永久刪除！", "success");
                closeDeletePostModal();
            } catch (err) {
                console.error("刪除貼文失敗:", err);
                showToast("刪除失敗，請檢查資料庫權限", "error");
            }
        };

        function initDashboardFeatures() {
            // 阻斷重複註冊監聽器
            if (window.state.dashboardInitialized) return;
            window.state.dashboardInitialized = true;

            // 即時自 Firebase 監聽貼文
            if (db) {
                const postsQuery = query(collection(db, 'secretg_apps', appId, 'posts'));
                onSnapshot(postsQuery, (querySnapshot) => {
                    const loadedPosts = [];
                    querySnapshot.forEach((docSnap) => {
                        loadedPosts.push({ id: docSnap.id, ...docSnap.data() });
                    });
                    
                    window.state.posts = loadedPosts;
                    
                    // 只要不在打開 Modal 或聚焦搜尋，就重繪
                    if (window.state.currentView === 'dashboard') {
                        const isModalOpen = !document.getElementById('create-post-modal')?.classList.contains('hidden');
                        const isDeleteOpen = !document.getElementById('delete-post-modal')?.classList.contains('hidden');
                        const isSearching = document.activeElement === document.getElementById('dashboard-search');
                        
                        if (!isModalOpen && !isDeleteOpen && !isSearching) {
                            renderView();
                        }
                    }
                }, (error) => {
                    console.error("Posts snapshot error:", error);
                });
            }
        }

        window.switchTab = function(tab) {
            window.state.currentTab = tab;
            // 當點擊切換頁籤時，自動關閉正在瀏覽的他人的個人主頁
            window.state.selectedProfileUserId = null;
            window.state.selectedProfileData = null;
            renderView();
        }

        window.handleSearch = function(input) {
            window.state.searchTerm = input.value;
            
            if (window.state.searchDebounce) {
                clearTimeout(window.state.searchDebounce);
            }
            
            const debounceTimer = setTimeout(() => {
                renderView();
                const searchInput = document.getElementById('dashboard-search');
                if(searchInput) {
                    searchInput.focus();
                    searchInput.selectionStart = searchInput.selectionEnd = searchInput.value.length;
                }
            }, 300);
            window.state.searchDebounce = debounceTimer;
        }

        window.openCreatePostModal = function() {
            const modal = document.getElementById('create-post-modal');
            if (!modal) return;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const formTransform = modal.querySelector('.transform');
                if (formTransform) formTransform.classList.remove('scale-95');
            }, 50);
        }

        window.closeCreatePostModal = function() {
            const modal = document.getElementById('create-post-modal');
            if (!modal) return;
            modal.classList.add('opacity-0');
            const formTransform = modal.querySelector('.transform');
            if (formTransform) formTransform.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        window.previewSelectedImage = function(input) {
            const file = input.files[0];
            if (!file) return;

            const previewContainer = document.getElementById('image-preview-container');
            const iconContainer = document.getElementById('upload-icon-container');
            const previewEl = document.getElementById('image-preview-el');

            iconContainer.classList.add('hidden');
            previewContainer.classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                previewEl.src = e.target.result;
            }
        }

        function compressAndSetImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // 壓縮品質 70%
                    callback(dataUrl);
                };
            };
        }

        window.handleCreatePost = async function(e) {
            e.preventDefault();
            const text = document.getElementById('post-text').value.trim();
            const tagsInput = document.getElementById('post-tags').value.trim();
            const fileInput = document.getElementById('post-image-file');
            
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()) : [];
            const submitBtn = document.getElementById('submit-post-btn');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 上傳中...';

            const onComplete = async (imageUrl) => {
                try {
                    const postData = {
                        userId: window.state.userId,
                        authorName: window.state.userData.nickname,
                        text: text,
                        tags: tags,
                        image: imageUrl || '',
                        createdAt: serverTimestamp ? serverTimestamp() : new Date(),
                        timeString: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        likes: [],
                        ratings: {}
                    };

                    await addDoc(collection(db, 'secretg_apps', appId, 'posts'), postData);
                    showToast('貼文分享成功！', 'success');
                    closeCreatePostModal();
                } catch (err) {
                    console.error("發貼失敗:", err);
                    showToast('上傳失敗，請稍後重試', 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = '發布分享';
                }
            };

            if (fileInput.files && fileInput.files[0]) {
                compressAndSetImage(fileInput.files[0], onComplete);
            } else {
                onComplete('');
            }
        }

        window.toggleLike = async function(postId) {
            if (!db) return;
            const myId = window.state.userId;
            const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
            
            const post = window.state.posts.find(p => p.id === postId);
            if (!post) return;

            const hasLiked = (post.likes || []).includes(myId);

            try {
                if (hasLiked) {
                    await updateDoc(postRef, { likes: arrayRemove(myId) });
                } else {
                    await updateDoc(postRef, { likes: arrayUnion(myId) });
                }
            } catch (err) {
                console.error("更新愛心失敗:", err);
            }
        }

        window.ratePost = async function(postId, score) {
            if (!db) return;
            const myId = window.state.userId;
            const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);

            try {
                const key = `ratings.${myId}`;
                await updateDoc(postRef, {
                    [key]: score
                });
                showToast(`成功評分 ${score} 顆星！`, 'success');
            } catch (err) {
                console.error("更新評分失敗:", err);
            }
        }

        // 啟動應用
        window.onload = function () {
            initApp();
        }
    </script>
</body>
</html>
