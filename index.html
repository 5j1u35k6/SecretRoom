<body class="min-h-screen flex flex-col items-center justify-center p-0 md:p-4">

    <!-- 主應用程式容器 -->
    <div id="app" class="w-full max-w-md h-[100dvh] md:h-[800px] md:rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] overflow-hidden relative flex flex-col bg-[#05050a] md:glass-panel border-0 md:border md:border-slate-800">
        <!-- 動態內容載入載入器 -->
        <div id="loading-screen" class="absolute inset-0 z-50 bg-[#05050a] flex flex-col items-center justify-center">
            <div class="w-14 h-14 border-4 border-slate-800 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-medium tracking-widest text-xs">安全連線中...</p>
        </div>
    </div>

    <!-- 浮動提示訊息容器 (Toast) -->
    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-xs px-4"></div>

    <script type="module">
        let initializeApp, getAuth, signInAnonymously, onAuthStateChanged;
        let getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, getDocs, where, deleteDoc, serverTimestamp;

        // --- 👇 替換開始：將 Firebase Config 貼在這裡 👇 ---
        const appId = 'secretg-demo-app'; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyCNgJxYjC90DjtvTSaze5CREJf1Vt32aYQ",
            authDomain: "secretroom-ef728.firebaseapp.com",
            projectId: "secretroom-ef728",
            storageBucket: "secretroom-ef728.firebasestorage.app",
            messagingSenderId: "22006617218",
            appId: "1:22006617218:web:9e9af5c6558ea57dcb109b"
        };
        // --- 👆 替換結束 👆 ---

        // --- 👇 替換開始：將您的 EmailJS 與 Telegram 配置貼在這裡 👇 ---
        const emailjsConfig = {
            publicKey: "ZEp9d-hAeYdFujDZy", 
            serviceId: "service_1ou10mi", 
            templateId: "template_25proud" 
        };

        const telegramBotName = "SecretRoomtwBot"; 
        // --- 👆 替換結束 👆 ---

        // 動態載入 Firebase SDK 以符合 GitHub Pages 的靜態安全要求
        async function loadFirebaseSDKs() {
            try {
                const [appMod, authMod, firestoreMod] = await Promise.all([
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")
                ]);

                initializeApp = appMod.initializeApp;
                getAuth = authMod.getAuth;
                signInAnonymously = authMod.signInAnonymously;
                onAuthStateChanged = authMod.onAuthStateChanged;

                getFirestore = firestoreMod.getFirestore;
                doc = firestoreMod.doc;
                setDoc = firestoreMod.setDoc;
                getDoc = firestoreMod.getDoc;
                collection = firestoreMod.collection;
                query = firestoreMod.query;
                onSnapshot = firestoreMod.onSnapshot;
                updateDoc = firestoreMod.updateDoc;
                getDocs = firestoreMod.getDocs;
                where = firestoreMod.where;
                deleteDoc = firestoreMod.deleteDoc;
                serverTimestamp = firestoreMod.serverTimestamp;

                return true;
            } catch (e) {
                console.error("無法從 CDN 載入 Firebase SDK", e);
                return false;
            }
        }

        let app, db, auth;

        // 全域狀態管理
        window.state = {
            currentView: 'landing',
            userId: null,
            applicationId: null,
            unsubscribeListener: null,
            visiblePostsCount: 5, // 無限滾動，初始加載5筆
            openComments: {}, // 紀錄哪些貼文的評論區被展開
            userData: {
                nickname: '', birthYear: '', birthMonth: '', birthDay: '',
                height: '', weight: '', length: '', girth: '', kinks: [], otherKink: '', email: '', avatar: ''
            },
            kinksOptions: [
                "生活日常", "健身運動", "時尚穿搭", "攝影影像", "戶外旅遊", 
                "美食烹飪", "心靈交流", "熟男/Daddy", "純愛分享"
            ],
            posts: [] // 存放首頁的所有貼文
        };

        const appContainer = document.getElementById('app');

        // 初始化應用與登入驗證
        async function initApp() {
            if (emailjsConfig.publicKey && emailjsConfig.publicKey !== "YOUR_EMAILJS_PUBLIC_KEY") {
                emailjs.init({ publicKey: emailjsConfig.publicKey });
            }

            const firebaseLoaded = await loadFirebaseSDKs();
            
            if (firebaseLoaded) {
                try {
                    app = initializeApp(firebaseConfig || {});
                    db = getFirestore(app);
                    auth = getAuth(app);

                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            window.state.userId = user.uid;
                            checkExistingApplication();
                        }
                    });
                } catch (error) {
                    console.error("Firebase 初始化錯誤:", error);
                    showToast('資料庫連接異常，請確認設定檔。', 'error');
                }
            } else {
                showToast('無法與伺服器建立安全連線', 'error');
            }
        }

        // 檢查使用者帳號狀態並決定跳轉頁面
        async function checkExistingApplication() {
            if(!db) { hideLoading(); navigate('landing'); return; }
            try {
                // 先在 localStorage 看看有沒有已保存登入的 username
                const cachedUser = localStorage.getItem('sr_username');
                if (cachedUser) {
                    const appRef = doc(db, 'secretg_apps', appId, 'applications', cachedUser);
                    const docSnap = await getDoc(appRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        window.state.userData = data;
                        window.state.applicationId = cachedUser;
                        
                        if (data.status === 'pending') navigate('pending');
                        else if (data.status === 'approved') navigate('telegram');
                        else if (data.status === 'active') navigate('dashboard');
                        else navigate('landing');
                        hideLoading();
                        return;
                    }
                }
                navigate('landing');
            } catch (e) {
                console.error("檢查狀態出錯:", e);
                navigate('landing');
            }
            hideLoading();
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';
        }

        window.navigate = function(view) {
            window.state.currentView = view;
            renderView();
        }

        function renderView() {
            appContainer.innerHTML = '';
            let content = '';

            switch(window.state.currentView) {
                case 'landing': content = viewLanding(); break;
                case 'register': content = viewRegister(); break;
                case 'confirm': content = viewConfirm(); break;
                case 'pending': content = viewPending(); break;
                case 'telegram': content = viewTelegram(); break;
                case 'dashboard': content = viewDashboard(); break;
            }

            appContainer.innerHTML = content;
            
            // 執行視圖掛載後邏輯
            if (window.state.currentView === 'register') initRegisterForm();
            if (window.state.currentView === 'pending') listenToApplicationStatus();
            if (window.state.currentView === 'telegram') loadTelegramWidget();
            if (window.state.currentView === 'dashboard') initDashboardFeatures();
        }

        // 登入歡迎主頁
        function viewLanding() {
            return `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-enter fade-enter-active bg-slate-950 relative overflow-hidden">
                    <div class="absolute w-80 h-80 bg-indigo-500/10 rounded-full blur-3xl -top-10 -right-10"></div>
                    <div class="absolute w-80 h-80 bg-purple-500/5 rounded-full blur-3xl -bottom-10 -left-10"></div>
                    
                    <div class="z-10 w-full flex flex-col items-center">
                        <!-- 應用精緻放大且預先加載的 SR 標誌徽章 (套用高階 .animate-gentle-logo 柔軟呼吸光效) -->
                        <div class="w-36 h-36 md:w-40 md:h-40 rounded-full overflow-hidden mb-8 border-2 animate-gentle-logo transition-transform duration-500 select-none">
                            <img src="Gemini_Generated_Image_e2fxvje2fxvje2fx.jpg?v=2" class="w-full h-full object-cover">
                        </div>
                        <h1 class="text-4xl font-extrabold mb-3 tracking-wider text-white" style="font-family: serif; font-style: italic;">SecretRoom</h1>
                        <p class="text-slate-400 mb-10 text-xs font-light tracking-widest leading-relaxed">
                            專屬男性的私密生活分享社群<br>分享生活近況，看見最真實的彼此
                        </p>
                        
                        <div class="w-full space-y-3">
                            <button onclick="navigate('register')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-4 rounded-2xl transition duration-300 shadow-lg shadow-indigo-950/40 text-sm">
                                建立新帳號申請
                            </button>
                            <button onclick="openLoginModal()" class="w-full bg-slate-900 hover:bg-slate-800 text-slate-300 font-bold py-4 px-4 rounded-2xl border border-slate-800 transition duration-300 text-sm">
                                已有帳號？登入查看進度
                            </button>
                        </div>
                        
                        <p class="text-[10px] text-slate-600 mt-8 bg-slate-900/40 py-2 px-4 rounded-full border border-slate-800/50 flex items-center gap-1.5">
                            <i class="fa-solid fa-shield-halved text-emerald-500"></i> 人工審核機制 · 滿 18 歲限定
                        </p>
                    </div>

                    <!-- 內置極簡登入視窗 -->
                    <div id="login-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center hidden opacity-0 transition-all duration-300">
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-11/12 max-w-xs shadow-2xl space-y-4">
                            <div class="text-center">
                                <h3 class="font-bold text-white text-base">輸入註冊帳密</h3>
                                <p class="text-[11px] text-slate-500 mt-1">查看人工審核進度或直接進入平台</p>
                            </div>
                            <div class="space-y-2">
                                <input type="text" id="login-user" placeholder="請輸入使用者帳號" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-3 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500">
                                <input type="password" id="login-pass" placeholder="請輸入密碼" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-3 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500">
                            </div>
                            <div class="flex gap-2">
                                <button onclick="closeLoginModal()" class="flex-1 bg-slate-800 text-slate-400 py-2.5 rounded-xl text-xs font-semibold hover:bg-slate-750 transition">取消</button>
                                <button onclick="executeLogin()" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl text-xs font-semibold hover:bg-indigo-500 transition shadow-lg">登入</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.openLoginModal = function() {
            const m = document.getElementById('login-modal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 50);
        }

        window.closeLoginModal = function() {
            const m = document.getElementById('login-modal');
            m.classList.add('opacity-0');
            setTimeout(() => m.classList.add('hidden'), 300);
        }

        // 登入驗證實作
        window.executeLogin = async function() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;
            if(!user || !pass) { showToast('請填寫帳號及密碼', 'error'); return; }

            if(!db) return;
            try {
                const appRef = doc(db, 'secretg_apps', appId, 'applications', user);
                const docSnap = await getDoc(appRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.password === pass) {
                        localStorage.setItem('sr_username', user);
                        window.state.userData = data;
                        window.state.applicationId = user;
                        showToast('登入成功！', 'success');
                        closeLoginModal();
                        
                        if (data.status === 'pending') navigate('pending');
                        else if (data.status === 'approved') navigate('telegram');
                        else if (data.status === 'active') navigate('dashboard');
                    } else {
                        showToast('密碼輸入錯誤', 'error');
                    }
                } else {
                    showToast('找不到該註冊帳號', 'error');
                }
            } catch (err) {
                console.error("登入出錯:", err);
                showToast('連線失敗，請重試', 'error');
            }
        }

        // 註冊頁面 (所有欄位皆為必填)

            let kinksHtml = window.state.kinksOptions.map((kink) => `

                    <input type="checkbox" name="kinks" value="${kink}" class="form-checkbox h-4.5 w-4.5 text-indigo-500 rounded border-slate-700 bg-slate-950 focus:ring-indigo-500 focus:ring-offset-slate-950">
                    <span class="text-xs text-slate-300 font-medium">${kink}</span>
                </label>
            `).join('');

            return `
                <div class="flex flex-col h-full fade-enter fade-enter-active bg-[#05050a]">

                        <button onclick="navigate('landing')" class="text-slate-400 hover:text-white transition w-10 flex justify-start"><i class="fa-solid fa-chevron-left text-sm"></i></button>

                        <div class="w-10"></div>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto p-5 scroll-smooth pb-16">
                        <form id="registerForm" class="space-y-6">
                            
                            <!-- 帳密設定區塊 -->

                                <h3 class="text-xs font-semibold text-slate-200 flex items-center gap-1.5"><div class="w-1 h-3.5 bg-indigo-500 rounded-full"></div> 1. 設置安全登入帳密</h3>
                                <div class="space-y-3">
                                    <input type="text" id="reg-username" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" placeholder="使用者帳號 (僅限英文/數字)">
                                    <input type="text" id="reg-username-confirm" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" placeholder="再次輸入使用者帳號確認">
                                    <input type="password" id="reg-password" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" placeholder="密碼">
                                    <input type="password" id="reg-password-confirm" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" placeholder="再次確認密碼">
                                </div>
                            </div>

                            <!-- 頭像上傳區塊 -->
                            <div class="bg-slate-950/30 p-5 rounded-3xl border border-slate-900 space-y-4 text-center">
                                <h3 class="text-xs font-semibold text-slate-200 flex items-center gap-1.5 text-left"><div class="w-1 h-3.5 bg-indigo-500 rounded-full"></div> 2. 上傳真實清晰大頭照</h3>
                                <p class="text-[10px] text-slate-500 text-left leading-relaxed">此照片將一併送審，通過後即為個人頭像。後續更改大頭照需重新人工審核。</p>

        // 初始化註冊表單及頭像壓縮邏輯
        function initRegisterForm() {
            const yearSelect = document.getElementById('reg-year');
            const monthSelect = document.getElementById('reg-month');
            const daySelect = document.getElementById('reg-day');
            
            const currentYear = new Date().getFullYear();
            const maxYear = currentYear - 18;
            const minYear = currentYear - 80;

            for (let y = maxYear; y >= minYear; y--) {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = `${y} 年`;
                yearSelect.appendChild(opt);
            }
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = `${m} 月`;
                monthSelect.appendChild(opt);
            }

            const updateDays = () => {
                const y = parseInt(yearSelect.value);
                const m = parseInt(monthSelect.value);
                daySelect.innerHTML = '<option value="">日</option>';
                if (!y || !m) return;
                const daysInMonth = new Date(y, m, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = `${d} 日`;
                    daySelect.appendChild(opt);
                }
            };

            yearSelect.addEventListener('change', updateDays);
            monthSelect.addEventListener('change', updateDays);
            updateDays();

            // 大頭照壓縮與預覽
            const avatarInput = document.getElementById('avatar-input');
            const avatarPreview = document.getElementById('avatar-preview');
            const avatarPlaceholder = document.getElementById('avatar-placeholder');

            avatarInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300; // 頭像 300px 足夠清晰且省空間
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        window.state.userData.avatar = compressedBase64;

                        avatarPreview.src = compressedBase64;
                        avatarPreview.classList.remove('hidden');
                        avatarPlaceholder.classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });

            // 興趣補充
            const otherCheckbox = document.getElementById('kink-other-checkbox');
            const otherContainer = document.getElementById('kink-other-container');
            otherCheckbox.addEventListener('change', (e) => {
                if(e.target.checked) {
                    otherContainer.classList.remove('hidden');
                    document.getElementById('reg-kink-other').setAttribute('required', 'true');
                } else {
                    otherContainer.classList.add('hidden');
                    document.getElementById('reg-kink-other').removeAttribute('required');
                    document.getElementById('reg-kink-other').value = '';
                }
            });

            // 表單提交與基本檢查
            const form = document.getElementById('registerForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!window.state.userData.avatar) {
                    showToast('請上傳您的個人大頭照！', 'error');
                    return;
                }

                if (!window.state.emailVerified) {
                    showToast('請先完成信箱驗證碼驗證！', 'error');
                    return;
                }

                const uName = document.getElementById('reg-username').value.trim();
                const uNameConf = document.getElementById('reg-username-confirm').value.trim();
                const pass = document.getElementById('reg-password').value;
                const passConf = document.getElementById('reg-password-confirm').value;

                if (uName !== uNameConf) { showToast('兩次輸入的使用者帳號不一致', 'error'); return; }
                if (pass !== passConf) { showToast('兩次輸入的密碼不一致', 'error'); return; }

                // 檢查使用者帳號是否已被註冊
                if (db) {
                    try {
                        const testRef = doc(db, 'secretg_apps', appId, 'applications', uName);
                        const testSnap = await getDoc(testRef);
                        if (testSnap.exists()) {
                            showToast('此使用者帳號已被註冊，請換一個', 'error');
                            return;
                        }
                    } catch (err) {
                        console.error("查重出錯:", err);
                    }
                }

                const selectedKinks = Array.from(document.querySelectorAll('input[name="kinks"]:checked')).map(el => el.value);
                if (selectedKinks.length === 0 && !otherCheckbox.checked) {
                    showToast('請至少選擇一項您感興趣的主題', 'error');
                    return;
                }

                const otherValue = otherCheckbox.checked ? document.getElementById('reg-kink-other').value.trim() : '';

                window.state.userData = {
                    ...window.state.userData,
                    username: uName,
                    password: pass,
                    nickname: document.getElementById('reg-nickname').value.trim(),
                    birthYear: document.getElementById('reg-year').value,
                    birthMonth: document.getElementById('reg-month').value,
                    birthDay: document.getElementById('reg-day').value,
                    height: document.getElementById('reg-height').value,
                    weight: document.getElementById('reg-weight').value,
                    length: document.getElementById('reg-length').value,
                    girth: document.getElementById('reg-girth').value,
                    kinks: selectedKinks,
                    otherKink: otherValue,
                    email: document.getElementById('reg-email').value.trim(),
                    status: 'pending', // 註冊預設狀態為待人工審核
                    avatarStatus: 'approved' // 註冊頭像預設直接套用，更換才需審核
                };

                window.state.applicationId = uName;
                navigate('confirm');
            });
        }

        // 發送信箱驗證碼
        window.sendVerificationOTP = async function() {
            const emailInput = document.getElementById('reg-email');
            const email = emailInput.value.trim();
            if (!email || !emailInput.checkValidity()) {
                showToast('請先輸入正確的信箱地址', 'error');
                return;
            }

            const sendBtn = document.getElementById('send-otp-btn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 發送中';

            // 產生 6 位數驗證碼
            const otp = Math.floor(100000 + Math.random() * 90000).toString();
            window.state.generatedOTP = otp;

            if (!emailjsConfig.publicKey || emailjsConfig.publicKey === "YOUR_EMAILJS_PUBLIC_KEY") {
                console.info(`[Email 模擬] 驗證信箱：${email}，驗證碼為：${otp}`);
                showToast(`[模擬信件] 驗證碼：${otp} (請查閱主機 Console)`, 'info');
                document.getElementById('otp-input-container').classList.remove('hidden');
                sendBtn.disabled = false;
                sendBtn.textContent = '重新發送';
                return;
            }

            try {
                await emailjs.send(emailjsConfig.serviceId, emailjsConfig.templateId, {
                    to_email: email,
                    to_name: "新申請用戶",
                    status_text: "信箱綁定驗證碼",
                    message: `您好！感謝您申請加入 SecretRoom 私密社群。\n\n您的電子信箱驗證碼為：【 ${otp} 】\n\n請於網頁中輸入此驗證碼以完成信箱綁定認證。若非本人操作請忽略此信。`
                });
                showToast('驗證碼已寄送到您的信箱，請查看！', 'success');
                document.getElementById('otp-input-container').classList.remove('hidden');
            } catch (err) {
                console.error("驗證信發送失敗:", err);
                showToast('驗證碼寄送失敗，請重試或聯絡管理員', 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '重新發送';
            }
        }

        // 比對驗證碼
        window.verifyOTP = function() {
            const entered = document.getElementById('reg-otp').value.trim();
            if (entered === window.state.generatedOTP) {
                window.state.emailVerified = true;
                showToast('電子信箱驗證通過！', 'success');
                document.getElementById('otp-input-container').classList.add('hidden');
                document.getElementById('send-otp-btn').classList.add('hidden');
                document.getElementById('reg-email').disabled = true;
                document.getElementById('email-verified-status').classList.remove('hidden');
            } else {
                showToast('驗證碼不正確，請重新輸入', 'error');
            }
        }

        // 動態注入 Telegram Widget
        function loadTelegramWidget() {
            const container = document.getElementById('telegram-login-container');
            if (!container) return;

            container.innerHTML = '';

            if (!telegramBotName) {
                container.innerHTML = `
                    <p class="text-amber-500 text-xs font-semibold flex items-center gap-1"><i class="fa-solid fa-triangle-exclamation"></i> 未配置 Telegram Bot</p>
                `;
                return;
            }

            // 建立官方 JS Widget 
            const script = document.createElement('script');
            script.async = true;
            script.src = "https://telegram.org/js/telegram-widget.js?22";
            script.setAttribute('data-telegram-login', telegramBotName);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            script.setAttribute('data-request-access', 'write');

            container.appendChild(script);
        }

        // 綁定成功 Callback (Telegram 官方自動觸發此全域函數)
        window.onTelegramAuth = async function(user) {
            if (!db || !window.state.applicationId) return;

            try {
                // 1. 全域唯一性防線：檢索資料庫是否有此 TG ID 已被其他人綁定過
                const ref = collection(db, 'secretg_apps', appId, 'applications');
                const q = query(ref, where('telegramInfo.id', '==', user.id));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    // 若有其他文件已記錄此 TG ID 且文件 ID 非當前使用者
                    let isRebound = false;
                    snap.forEach((docSnap) => {
                        if (docSnap.id !== window.state.applicationId) {
                            isRebound = true;
                        }
                    });

                    if (isRebound) {
                        showToast('❌ 此 Telegram 帳號已被其他 SecretRoom 用戶綁定！無法重複使用。', 'error');
                        return;
                    }
                }

                // 2. 寫入 TG 資料，升級 status 為 active
                const docRef = doc(db, 'secretg_apps', appId, 'applications', window.state.applicationId);
                const tgData = {
                    id: user.id,
                    username: user.username || '',
                    first_name: user.first_name || '',
                    photo_url: user.photo_url || '',
                    auth_date: user.auth_date,
                    hash: user.hash 
                };

                await updateDoc(docRef, {
                    status: 'active',
                    tgLinked: true,
                    telegramInfo: tgData
                });

                showToast('🎉 帳號成功啟用，歡迎來到 SecretRoom！', 'success');
                window.state.userData.status = 'active';
                navigate('dashboard');

            } catch (err) {
                console.error("TG 綁定失敗:", err);
                showToast('綁定出錯，請重新嘗試', 'error');
            }
        };

            const u = window.state.userData;
            const myPosts = window.state.posts.filter(p => p.userId === u.username);
            
            let displayKinks = [...u.kinks];
            if(u.otherKink) displayKinks.push(`其他: ${u.otherKink}`);

                ? myPosts.map(p => `

        // 智慧評分演算法計算 (依主題加分 + 按讚熱度 + 星等表現 + 時間衰減)
        function getRecommendationScore(post) {
            let score = 0;
            const myKinks = window.state.userData.kinks || [];

            // 1. 主題加成 (Kinks 匹配 + 150分)
            if (post.tags && myKinks.some(k => post.tags.includes(k))) {
                score += 150;
            }

            // 2. 按讚熱度 (1按讚 = 15分)
            const likesCount = post.likes ? post.likes.length : 0;
            score += likesCount * 15;

            // 3. 星等評分表現 (平均評分 * 25分)
            const ratingCount = post.ratings ? Object.keys(post.ratings).length : 0;
            if (ratingCount > 0) {
                const averageRating = Object.values(post.ratings).reduce((a, b) => a + b, 0) / ratingCount;
                score += averageRating * 25;
            }

            // 4. 新貼文加成 (時間衰減)
            const ageInHours = post.createdAt 
                ? (Date.now() - (post.createdAt.seconds * 1000)) / (1000 * 60 * 60)
                : 0;
            if (ageInHours < 24) {
                score += (24 - ageInHours) * 3; // 發布 24 小時內的貼文有隨時間遞減的暴光紅利
            }

            return score;
        }

        // 按讚愛心切換

            if(!db) return;
            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                const post = window.state.posts.find(p => p.id === postId);
                if (!post) return;

                let updatedLikes = post.likes ? [...post.likes] : [];
                const idx = updatedLikes.indexOf(window.state.userId);

                if (idx > -1) {
                    updatedLikes.splice(idx, 1); // 收回
                } else {
                    updatedLikes.push(window.state.userId); // 按讚
                }

                await updateDoc(postRef, { likes: updatedLikes });
            } catch (err) {
                console.error("按讚失敗:", err);

        }

        window.openPublishModal = function() {
            const m = document.getElementById('publish-modal');
            const c = document.getElementById('publish-modal-content');
            
            // 初始化發布照片上傳綁定
            const imgInput = document.getElementById('post-image-input');
            const imgPreview = document.getElementById('post-image-preview');
            const imgPlaceholder = document.getElementById('post-image-placeholder');

            imgInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // 最寬 800px，確保畫質極佳
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        window.state.newPostImage = compressedBase64;

                        imgPreview.src = compressedBase64;
                        imgPreview.classList.remove('hidden');
                        imgPlaceholder.classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            m.classList.remove('hidden');
            setTimeout(() => {
                m.classList.remove('opacity-0');
                c.classList.remove('translate-y-10');
            }, 50);
        }

                return;
            }
            const reason = reasonEl.value;
            const postId = window.state.reportingPostId;

            if (!db) {
                showToast("檢舉成功 (模擬)", "success");
                closeReportModal();
                return;
            }

            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                const docSnap = await getDoc(postRef);
                if (docSnap.exists()) {
                    const postData = docSnap.data();
                    const newReport = {
                        reporterId: window.state.userId,
                        reason: reason,
                        timestamp: new Date()
                    };
                    const updatedReports = postData.reports ? [...postData.reports, newReport] : [newReport];
                    const reportCount = updatedReports.length;

                    await updateDoc(postRef, {
                        reports: updatedReports,
                        reportCount: reportCount
                    });
                    
                    showToast("我們已收到您的檢舉，管理員會立即審查！", "success");
                    closeReportModal();
                }
            } catch (err) {
                console.error("提交檢舉失敗:", err);
                showToast("操作失敗，請重試", "error");
            }
        }

        // 無限滾動的滑動監聽器
        function initDashboardScroll() {
            const container = document.getElementById('feed-scroll-container');
            if (container) {
                container.addEventListener('scroll', () => {
                    const threshold = 100; // 距離底部 100 像素時觸發
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - threshold) {
                        const totalPosts = window.state.posts.length;
                        if (totalPosts > window.state.visiblePostsCount) {
                            window.state.visiblePostsCount += 5; // 再載入 5 筆
                            renderView();
                        }
                    }
                });
            }
        }

        // 修改個人資料視窗
        window.openEditProfileModal = function() {
            const m = document.getElementById('edit-profile-modal');
            
            // 綁定編輯頭像即時預覽
            const editAvatarInput = document.getElementById('edit-avatar-input');
            const editAvatarPreview = document.getElementById('edit-avatar-preview');

            editAvatarInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        window.state.editedAvatar = compressedBase64;
                        editAvatarPreview.src = compressedBase64;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 50);
        }

        window.closeEditProfileModal = function() {
            const m = document.getElementById('edit-profile-modal');
            m.classList.add('opacity-0');
            setTimeout(() => {
                m.classList.add('hidden');
                window.state.editedAvatar = null;
            }, 300);
        }

        // 提交修改個人資料 (頭像需要待審核，其餘直接生效)
        window.submitProfileEdit = async function() {
            const nickname = document.getElementById('edit-nickname').value.trim();
            const height = document.getElementById('edit-height').value;
            const weight = document.getElementById('edit-weight').value;
            const length = document.getElementById('edit-length').value;
            const girth = document.getElementById('edit-girth').value;

            if (!nickname || !height || !weight || !length || !girth) {
                showToast('所有修改欄位皆為必填！', 'error');
                return;
            }

            if (!db || !window.state.applicationId) return;

            try {
                const docRef = doc(db, 'secretg_apps', appId, 'applications', window.state.applicationId);
                const updates = {
                    nickname: nickname,
                    height: height,
                    weight: weight,
                    length: length,
                    girth: girth
                };

                // 如果有變更頭像，則頭像進入變更待審核，且發布信件告知管理員
                if (window.state.editedAvatar) {
                    updates.avatarPending = window.state.editedAvatar;
                    updates.avatarStatus = 'pending';
                    showToast('資料已更新，您的新頭像更換已提交管理員人工審核！', 'success');
                } else {
                    showToast('基本資料修改儲存成功！', 'success');
                }

                await updateDoc(docRef, updates);
                closeEditProfileModal();
            } catch (err) {
                console.error("更新資料錯誤:", err);
                showToast('更新失敗，請檢查權限。', 'error');
            }
        }

        // 長按貼文刪除逻辑
        let pressTimer = null;
        window.handlePostTouchStart = function(postId) {
            pressTimer = setTimeout(() => openDeletePostModal(postId), 1000);
        }
        window.handlePostTouchEnd = function() {
            clearTimeout(pressTimer);
        }
        window.handlePostMouseDown = function(postId) {
            pressTimer = setTimeout(() => openDeletePostModal(postId), 1000);
        }
        window.handlePostMouseUp = function() {
            clearTimeout(pressTimer);
        }

        function openDeletePostModal(postId) {
            window.state.postIdToDelete = postId;
            const m = document.getElementById('delete-post-modal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 50);
        }

        window.closeDeletePostModal = function() {
            const m = document.getElementById('delete-post-modal');
            m.classList.add('opacity-0');
            setTimeout(() => {
                m.classList.add('hidden');
                window.state.postIdToDelete = null;
            }, 300);
        }

        window.executePostDelete = async function() {
            const postId = window.state.postIdToDelete;
            if (!postId || !db) return;

            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                await deleteDoc(postRef);
                showToast('貼文已成功下架銷毀！', 'success');
                closeDeletePostModal();
            } catch (err) {
                console.error("貼文下架失敗:", err);
                showToast('下架失敗，請重試', 'error');
            }
        }

        // 安全登出
        window.logoutPlatform = function() {
            localStorage.removeItem('sr_username');
            window.state.userData = {};
            window.state.applicationId = null;
            window.state.dashboardInitialized = false;
            if(window.state.unsubscribeListener) window.state.unsubscribeListener();
            navigate('landing');
            showToast('您已成功安全登出本裝置！', 'info');
        }

        // 啟動 App
        initApp();
    </script>
</body>
</html>
