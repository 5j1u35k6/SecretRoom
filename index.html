    <style>
        /* 奢華曜石暗色與香檳金主題配對 */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030305;
            color: #f1f5f9;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-luxury {

        }

        /* 隱密會所：奢華黑金牆面背景線條 */
        .club-groove-bg {
            background-color: #030305;
            background-image: linear-gradient(90deg, rgba(212, 175, 55, 0.015) 1px, transparent 1px);
            background-size: 80px 100%;
        }
        
        /* 奢華曜石磨砂卡片 - 金絲質地與微型光澤邊框 */
        .glass-panel {
            background: rgba(8, 8, 12, 0.97);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.16);
            box-shadow: 0 16px 48px 0 rgba(0, 0, 0, 0.95), 
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.02),
                        inset 0 0 20px rgba(212, 175, 55, 0.02);
        }

        /* 頂級極細建築雙線裝飾框 */
        .architectural-border {
            border: 1px solid rgba(212, 175, 55, 0.18);
            outline: 1px solid rgba(212, 175, 55, 0.04);
            outline-offset: -8px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .architectural-border:hover {
            border-color: rgba(212, 175, 55, 0.38);
            outline-color: rgba(212, 175, 55, 0.12);
            box-shadow: 0 20px 48px 0 rgba(0, 0, 0, 0.98),
                        0 0 20px rgba(212, 175, 55, 0.04);
        }

        /* 👑 頂級仕紳尊榮觸覺回饋（按鈕與大型點擊元件通用） */
        .tactile-feedback {
            cursor: pointer !important;
            transition: all 0.28s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        }
        .tactile-feedback:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.12);
            box-shadow: 0 12px 28px rgba(212, 175, 55, 0.16);
        }
        .tactile-feedback:active {
            transform: translateY(1px) scale(0.96);
            filter: brightness(0.92);
        }

        /* 💎 針對小型圖示與極簡文字類型回饋（精緻微光縮放） */
        .tactile-icon {
            cursor: pointer !important;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        }
        .tactile-icon:hover {
            transform: scale(1.18);
            color: #f59e0b !important;
            filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.45));
        }
        .tactile-icon:active {
            transform: scale(0.88);
        }

        /* 純圖示徽章 Hover 提示容器 (客製極簡 Tooltip) */
        .brass-badge {
            position: relative;
            cursor: help;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .brass-badge:hover {
            transform: scale(1.15) rotate(5deg);
            filter: brightness(1.2) drop-shadow(0 0 8px rgba(212, 175, 55, 0.35));
        }

        /* 隱藏滾動條 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 徽章微光渲染 */
        .badge-glow {
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }

        /* 門牌漸進優雅動畫 */
        @keyframes gentleLogo {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.02); }
        }
        .animate-gentle-logo {
            animation: gentleLogo 6s ease-in-out infinite;
        }

            activeOnlineUsers: [] // 模擬線上活躍紳士

        // 載入 Firebase 安全套件
        async function loadFirebase() {
            try {
                const [appMod, firestoreMod] = await Promise.all([
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")
                ]);
                initializeApp = appMod.initializeApp;
                getFirestore = firestoreMod.getFirestore;
                doc = firestoreMod.doc;
                collection = firestoreMod.collection;
                onSnapshot = firestoreMod.onSnapshot;
                setDoc = firestoreMod.setDoc;
                getDoc = firestoreMod.getDoc;
                updateDoc = firestoreMod.updateDoc;
                query = firestoreMod.query;
                orderBy = firestoreMod.orderBy;
                limit = firestoreMod.limit;
                addDoc = firestoreMod.addDoc;
                arrayUnion = firestoreMod.arrayUnion;
                return true;
            } catch (e) {
                console.warn("無法安全握手雲端套件，切換至隔離沙盒：", e);
                return false;
            }
        }

        let db;
        const rootAppId = 'secretg-production-node-tw';

        async function init() {
            const loaded = await loadFirebase();
            if (loaded) {
                try {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    listenToPosts();
                    if (window.state.applicationId) {
                        await fetchUserProfile(window.state.applicationId);
                    }
                } catch (err) {
                    console.error("安全資料庫通道配置故障:", err);
                    setupMockEnvironment();
                }
            } else {
                setupMockEnvironment();
            }
            renderApp();
        }

        // 監聽並自動同步貼文與綜合排行分數
        function listenToPosts() {
            if (!db) return;
            const q = query(collection(db, 'secretg_apps', rootAppId, 'posts'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                const fetchedPosts = [];
                snapshot.forEach((d) => {
                    const data = d.data();
                    // 綜合排行計分演算邏輯
                    const likes = data.likeCount || 0;
                    const ratings = data.ratings ? Object.values(data.ratings) : [];
                    const avgRating = ratings.length > 0 ? (ratings.reduce((a, b) => a + b, 0) / ratings.length) : 0;
                    const comments = data.comments ? Object.keys(data.comments).length : 0;
                    // 分數權重：評分(55%) + 按讚數(35%) + 留言熱度(10%)
                    const score = (avgRating * 20) * 0.55 + (likes * 1.5) * 0.35 + (comments * 2) * 0.1;
                    
                    fetchedPosts.push({
                        id: d.id,
                        ...data,
                        rankScore: score
                    });
                });
                window.state.posts = fetchedPosts;
                
                // 動態演算活躍仕紳頭像
                updateOnlineGents(fetchedPosts);
                
                if (window.state.currentTab === 'feed') {
                    updateSearchAndFeedUI();
                }
            });
        }

        function updateOnlineGents(posts) {
            const uniqueUsers = {};
            posts.forEach(p => {
                if (!uniqueUsers[p.userId]) {
                    uniqueUsers[p.userId] = {
                        userId: p.userId,
                        name: p.authorName,
                        avatar: p.authorAvatar || 'Gemini_Generated_Image_e2fxvje2fxvje2fx.jpg?v=2'
                    };
                }
            });
            window.state.activeOnlineUsers = Object.values(uniqueUsers).slice(0, 8);
        }

        async function fetchUserProfile(userId) {
            if (!db) return;
            try {
                const userRef = doc(db, 'secretg_apps', rootAppId, 'applications', userId);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.status === 'active' || data.status === 'approved') {
                        window.state.authorizedUser = data;
                        localStorage.setItem('secret_user_id', userId);
                        // 若狀態為 approved，自動在前台轉為啟用 (active)
                        if (data.status === 'approved') {
                            await updateDoc(userRef, { status: 'active' });
                            window.state.authorizedUser.status = 'active';
                        }
                    } else {
                        window.state.authorizedUser = data; // 可能 pending 或 rejected
                    }
                } else {
                    window.state.applicationId = '';
                    localStorage.removeItem('secret_user_id');
                }
            } catch (err) {
                console.error("查驗身份協議故障:", err);
            }
        }

        function setupMockEnvironment() {
            showToast("已載入離線高安全沙盒環境 🔒", "info");

                    image: 'https://images.unsplash.com/photo-1593032465175-481ac7f401a0?auto=format&fit=crop&q=80&w=800',
                    kinks: ['商務仕紳', '潮流時尚'],
                    likeCount: 88,

                    ratings: { 'user1': 5, 'user2': 5, 'user3': 5 },
                    comments: {},

                    createdAt: { seconds: Date.now() / 1000 - 7200 }
                }
            ];
            window.state.activeOnlineUsers = [
                { userId: 'gentleman_alpha', name: 'Alpha 紳士', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=150' },
                { userId: 'suit_gourmet', name: '西服美學家', avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=150' }
            ];
        }

        // 渲染主架構
        window.renderApp = function() {
            const container = document.getElementById('app-root');
            if (!container) return;

            const auth = window.state.authorizedUser;
            
            // 未登入，或狀態非 active 的防禦阻擋
            if (!window.state.applicationId || !auth) {
                renderLanding(container);
                return;
            }

            if (auth.status === 'pending') {
                renderPendingScreen(container);
                return;
            }

            if (auth.status === 'rejected') {
                renderRejectedScreen(container, auth.rejectionReason);

            }

            // 狀態為 active，載入三大主分頁
            container.innerHTML = `

                <header class="w-full h-16 bg-[#040406]/95 border-b border-amber-500/10 px-6 flex items-center justify-between shrink-0 z-40 backdrop-blur-md">

        window.navigateToTab = function(tabName) {

                    const ratB = b.ratings ? Object.values(b.ratings) : [];
                    const avgA = ratA.length > 0 ? (ratA.reduce((sum, v) => sum + v, 0) / ratA.length) : 0;
                    const avgB = ratB.length > 0 ? (ratB.reduce((sum, v) => sum + v, 0) / ratB.length) : 0;

        // ==================== 6. 訪客足跡紀錄 (誰來看過我) ====================
        async function fetchVisitorFootprints(myId) {
            if (!db) return;
            const footprintContainer = document.getElementById('visitor-footprints-container');
            if (!footprintContainer) return;

            try {
                const visitorsRef = collection(db, 'secretg_apps', rootAppId, 'visitors');
                // 為避免 Firebase rule index 限制，先下載最新15筆再於前端過濾
                const q = query(visitorsRef, orderBy('timestamp', 'desc'), limit(25));
                
                onSnapshot(q, async (snap) => {
                    const visitorMap = {};
                    const promises = [];

                    snap.forEach(d => {
                        const data = d.data();
                        if (data.to === myId && data.from !== myId && !visitorMap[data.from]) {
                            visitorMap[data.from] = true;
                            // 獲取該訪客的名稱與頭像
                            const p = getDoc(doc(db, 'secretg_apps', rootAppId, 'applications', data.from))
                                .then(userSnap => {
                                    if (userSnap.exists()) {
                                        return { id: data.from, ...userSnap.data() };
                                    }
                                    return null;
                                });
                            promises.push(p);
                        }
                    });

                    const results = (await Promise.all(promises)).filter(Boolean).slice(0, 8);
                    
                    if (results.length === 0) {
                        footprintContainer.innerHTML = `<div class="text-[11px] text-slate-600 italic">尚無兄弟來訪過...</div>`;
                        return;
                    }

                    footprintContainer.innerHTML = results.map(u => `
                        <div class="flex flex-col items-center gap-1 cursor-pointer shrink-0 transition hover:scale-105 tactile-feedback" onclick="viewUserProfile('${u.id}')" title="點擊回訪">
                            <img src="${u.avatar || 'Gemini_Generated_Image_e2fxvje2fxvje2fx.jpg?v=2'}" class="w-10 h-10 rounded-full object-cover border border-slate-800">
                            <span class="text-[9px] text-slate-500 font-mono truncate max-w-[50px]">@${u.id}</span>
                        </div>
                    `).join('');
                });

            } catch (err) {
                console.warn("拉取足跡異常:", err);
            }
        }

            const perfectPosts = userPosts.filter(p => {
                const ratings = p.ratings ? Object.values(p.ratings) : [];
                const avg = ratings.length > 0 ? (ratings.reduce((a,b)=>a+b, 0) / ratings.length) : 0;
                return avg === 5.0 && ratings.length >= 500;
            });
            if (userPosts.length >= 50 && perfectPosts.length === userPosts.length) {
                badges.push({ 
                    icon: 'fa-star', 
                    color: 'from-amber-400 to-yellow-500 shadow-amber-400/20', 
                    tooltip: '多篇作品榮獲無瑕滿分評價'
                });
            }

            if (userPosts.length >= 100) {
                badges.push({ 
                    icon: 'fa-camera', 
                    color: 'from-violet-500 to-purple-700 shadow-violet-500/20', 
                    tooltip: '累計發布上百篇秘密作品'
                });
            }

            return badges.map(b => {
                const sizeClass = isBig ? 'w-8 h-8 text-sm' : 'w-6 h-6 text-xs';
                // 個人主頁徽章不該出現任何說明文字，僅保留圖示 (Tooltip 為原生 HTML title，無文字阻擋)
                return `
                    <span class="inline-flex items-center justify-center ${sizeClass} rounded-full bg-gradient-to-r ${b.color} text-slate-950 shadow-md badge-glow pointer-events-auto select-none brass-badge" title="${b.tooltip}">
                        <i class="fa-solid ${b.icon}"></i>
                    </span>
                `;
            }).join('');
        };

        window.getUserBadgeHTMLForPost = function(post) {
            const userRef = window.state.posts.find(p => p.userId === post.userId);
            const simulatedUser = {
                id: post.userId,
                createdAt: { seconds: Date.now() / 1000 },
                role: post.userId === 'gentleman_alpha' ? 'admin' : 'user',
                isSpecElite: post.userId === 'gentleman_alpha'
            };
            return getBadgeHTML(simulatedUser, false);
        };


        // ==================== 10. 安全通報、高清燈箱與 Toast ====================
        let currentReportingPostId = null;
        window.openReportModal = function(postId) {
            currentReportingPostId = postId;
            const modal = document.getElementById('report-modal');
            const content = document.getElementById('report-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 50);

            document.getElementById('confirm-report-btn').onclick = async function() {
                const checkedRadio = document.querySelector('input[name="report-reason"]:checked');
                if (!checkedRadio) return;
                const reason = checkedRadio.value;
                await submitReport(currentReportingPostId, reason);
                closeReportModal();
            };
        };

        window.closeReportModal = function() {
            const modal = document.getElementById('report-modal');
            const content = document.getElementById('report-modal-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                currentReportingPostId = null;
            }, 300);
        };

        async function submitReport(postId, reason) {
            if (!db) return;
            try {
                const postRef = doc(db, 'secretg_apps', rootAppId, 'posts', postId);
                const postSnap = await getDoc(postRef);
                if (postSnap.exists()) {
                    const data = postSnap.data();
                    const currentReports = data.reports || [];
                    const currentReportCount = data.reportCount || 0;

                    const newReport = {
                        reporter: window.state.applicationId,
                        reason: reason,
                        timestamp: Date.now() / 1000
                    };

                    await updateDoc(postRef, {
                        reports: arrayUnion(newReport),
                        reportCount: currentReportCount + 1
                    });

                    showToast("安全檢舉完成，我們將立即派遣審核官複查 🛡️", "success");
                }
            } catch (err) {
                console.error("檢舉失敗:", err);
            }
        }

        window.zoomImage = function(src) {
            const modal = document.getElementById('zoom-modal');
            const img = document.getElementById('zoom-modal-img');
            if (modal && img) {
                img.src = src;
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.remove('opacity-0'), 50);
            }
        };

        window.closeZoomModal = function() {
            const modal = document.getElementById('zoom-modal');
            if (modal) {
                modal.classList.add('opacity-0');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        };

        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const bgColors = {
                error: 'bg-red-500/95 border-red-400',
                success: 'bg-emerald-550/95 border-emerald-400',
                info: 'bg-amber-600/95 border-amber-500'
            };
            toast.className = `${bgColors[type]} text-white px-5 py-3.5 rounded-xl shadow-lg border text-xs font-semibold transition-all duration-300 opacity-0 transform -translate-y-4 backdrop-blur-xl flex items-center gap-3 pointer-events-auto`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('opacity-0', '-translate-y-4'));
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        };

        init();
    </script>
</body>
</html>
