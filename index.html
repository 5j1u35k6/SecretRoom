<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretRoom | 專屬男性的私密生活分享社群</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 EmailJS SDK 用於發送審核通知郵件 -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms ease-out, transform 400ms ease-out; }
        
        /* 自訂下拉選單樣式 */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
        
        /* 隱藏預設滾動條以自訂水平滾動 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-0 md:p-4">

    <!-- 主應用程式容器 -->
    <div id="app" class="w-full max-w-md h-[100dvh] md:h-auto md:min-h-[750px] md:rounded-3xl shadow-2xl overflow-hidden relative flex flex-col bg-[#0f172a] md:glass-panel border-0 md:border md:border-slate-800">
        <!-- 動態內容將渲染於此 -->
        <div id="loading-screen" class="absolute inset-0 z-50 bg-[#0f172a] flex flex-col items-center justify-center">
            <div class="w-16 h-16 border-4 border-slate-700 border-t-purple-500 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-medium tracking-widest text-sm">連線至伺服器...</p>
        </div>
    </div>

    <!-- 浮動提示訊息容器 (Toast) -->
    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-xs px-4"></div>

    <!-- 管理員入口按鈕 (開發測試用) -->
    <button onclick="navigate('admin')" class="fixed bottom-4 right-4 bg-slate-800 hover:bg-slate-700 text-slate-400 p-3 rounded-full shadow-lg border border-slate-700 transition z-50 text-xs flex items-center gap-2">
        <i class="fa-solid fa-lock"></i> 測試後台
    </button>

    <script type="module">
        // 宣告 Firebase 變數，後續動態載入
        let initializeApp, getAuth, signInAnonymously, onAuthStateChanged;
        let getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, getDocs, serverTimestamp;

        // --- 👇 替換開始：將 Firebase Config 貼在這裡 👇 ---
        const appId = 'secretg-demo-app'; // 這是我們存在資料庫的集合名稱
        
        const firebaseConfig = {
            apiKey: "AIzaSyCNgJxYjC90DjtvTSaze5CREJf1Vt32aYQ",
            authDomain: "secretroom-ef728.firebaseapp.com",
            projectId: "secretroom-ef728",
            storageBucket: "secretroom-ef728.firebasestorage.app",
            messagingSenderId: "22006617218",
            appId: "1:22006617218:web:9e9af5c6558ea57dcb109b"
        };
        // --- 👆 替換結束 👆 ---

        // --- 👇 替換開始：將您的 EmailJS 與 Telegram 配置貼在這裡 👇 ---
        const emailjsConfig = {
            publicKey: "ZEp9d-hAeYdFujDZy", // 您的 EmailJS Public Key
            serviceId: "service_1ou10mi", // 您的 EmailJS Service ID
            templateId: "template_25proud" // 您的 EmailJS Template ID
        };

        const telegramBotName = "YOUR_TELEGRAM_BOT_USERNAME"; // 您的 Telegram Bot 帳號名稱（不含 @），例如 SecretG_Bot
        // --- 👆 替換結束 👆 ---

        // 動態載入 Firebase SDK 以防離線或 CDN 異常時阻斷整個網頁執行
        async function loadFirebaseSDKs() {
            try {
                // 平行載入所有 Firebase 模組
                const [appMod, authMod, firestoreMod] = await Promise.all([
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")
                ]);

                // 賦值給全域變數
                initializeApp = appMod.initializeApp;
                getAuth = authMod.getAuth;
                signInAnonymously = authMod.signInAnonymously;
                onAuthStateChanged = authMod.onAuthStateChanged;

                getFirestore = firestoreMod.getFirestore;
                doc = firestoreMod.doc;
                setDoc = firestoreMod.setDoc;
                getDoc = firestoreMod.getDoc;
                collection = firestoreMod.collection;
                query = firestoreMod.query;
                onSnapshot = firestoreMod.onSnapshot;
                updateDoc = firestoreMod.updateDoc;
                getDocs = firestoreMod.getDocs;
                serverTimestamp = firestoreMod.serverTimestamp;

                return true;
            } catch (e) {
                console.warn("無法從 CDN 載入 Firebase SDK，將自動啟用本地模擬模式（Mock Mode）。", e);
                return false;
            }
        }

        let app, db, auth;

        window.state = {
            currentView: 'landing',
            userId: null,
            applicationId: null,
            unsubscribeListener: null,
            userData: {
                nickname: '', birthYear: '', birthMonth: '', birthDay: '',
                height: '', weight: '', length: '', girth: '', kinks: [], otherKink: '', email: ''
            },
            kinksOptions: [
                "生活日常", "健身運動", "時尚穿搭", "攝影影像", "戶外旅遊", 
                "美食烹飪", "心靈交流", "熟男/Daddy", "純愛分享"
            ]
        };

        const appContainer = document.getElementById('app');

        // 初始化應用與登入
        async function initApp() {
            // 初始化 EmailJS（若已填入 Key）
            if (emailjsConfig.publicKey && emailjsConfig.publicKey !== "YOUR_EMAILJS_PUBLIC_KEY") {
                emailjs.init(emailjsConfig.publicKey);
            }

            const firebaseLoaded = await loadFirebaseSDKs();
            
            if (firebaseLoaded) {
                try {
                    app = initializeApp(firebaseConfig || {});
                    db = getFirestore(app);
                    auth = getAuth(app);

                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            window.state.userId = user.uid;
                            checkExistingApplication();
                        }
                    });
                } catch (error) {
                    console.error("Firebase 初始化或驗證錯誤，切換至模擬模式:", error);
                    enableMockMode();
                }
            } else {
                enableMockMode();
            }
        }

        // 啟用模擬模式
        function enableMockMode() {
            db = null;
            auth = null;
            window.state.userId = 'mock-user-' + Math.floor(Math.random() * 1000);
            showToast('已啟用本地模擬模式（無資料庫連線）', 'info');
            setTimeout(() => {
                hideLoading();
                navigate('landing');
            }, 800);
        }

        // 檢查是否有已存在的申請
        async function checkExistingApplication() {
            if(!db) { hideLoading(); navigate('landing'); return; }
            try {
                const appRef = doc(db, 'secretg_apps', appId, 'applications', window.state.userId);
                const docSnap = await getDoc(appRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.state.userData = data;
                    if (data.status === 'pending') {
                        navigate('pending');
                    } else if (data.status === 'approved') {
                        navigate('telegram');
                    } else if (data.status === 'active') {
                        navigate('dashboard');
                    } else {
                        navigate('landing');
                    }
                } else {
                    navigate('landing');
                }
            } catch (e) {
                console.error("檢查申請時發生錯誤:", e);
                if (e.code === 'permission-denied') {
                    showToast('讀取失敗：Firebase 權限不足，請至後台修改 Rules', 'error');
                }
                navigate('landing');
            }
            hideLoading();
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';
        }

        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColors = {
                error: 'bg-red-500/95 border-red-400',
                success: 'bg-emerald-500/95 border-emerald-400',
                info: 'bg-blue-600/95 border-blue-400'
            };
            toast.className = `${bgColors[type]} text-white px-5 py-3.5 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] border text-sm font-medium transition-all duration-300 opacity-0 transform -translate-y-4 backdrop-blur-xl flex items-center gap-3`;
            
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> <span>${message}</span>`;
            
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.remove('opacity-0', '-translate-y-4'));
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.navigate = function(view) {
            window.state.currentView = view;
            renderView();
        }

        function renderView() {
            appContainer.innerHTML = '';
            let content = '';

            switch(window.state.currentView) {
                case 'landing': content = viewLanding(); break;
                case 'register': content = viewRegister(); break;
                case 'confirm': content = viewConfirm(); break;
                case 'pending': content = viewPending(); break;
                case 'telegram': content = viewTelegram(); break;
                case 'dashboard': content = viewDashboard(); break;
                case 'admin': content = viewAdmin(); break;
            }

            appContainer.innerHTML = content;
            
            // 執行視圖掛載後邏輯
            if (window.state.currentView === 'register') initRegisterForm();
            if (window.state.currentView === 'pending') listenToApplicationStatus();
            if (window.state.currentView === 'telegram') loadTelegramWidget();
            if (window.state.currentView === 'admin') loadAdminData();
        }

        function viewLanding() {
            return `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-enter fade-enter-active bg-[url('https://images.unsplash.com/photo-1574170685715-db104eb0058b?q=80&w=600&auto=format&fit=crop')] bg-cover bg-center relative">
                    <div class="absolute inset-0 bg-slate-900/85 backdrop-blur-sm z-0"></div>
                    <div class="z-10 w-full flex flex-col items-center">
                        <div class="w-24 h-24 bg-gradient-to-tr from-slate-800 to-slate-700 rounded-3xl flex items-center justify-center mb-6 shadow-2xl border border-slate-600/50 transform rotate-3">
                            <i class="fa-solid fa-camera-retro text-4xl text-slate-200 transform -rotate-3"></i>
                        </div>
                        <h1 class="text-4xl font-bold mb-3 tracking-wider text-white">SecretG</h1>
                        <p class="text-slate-300 mb-10 text-sm font-light tracking-wide leading-relaxed">
                            專屬男性的私密生活分享社群<br>分享生活近況，看見最真實的彼此
                        </p>
                        
                        <button onclick="navigate('register')" class="w-full bg-white text-slate-900 hover:bg-slate-200 font-bold py-4 px-4 rounded-2xl transition duration-300 shadow-[0_0_30px_rgba(255,255,255,0.2)] text-lg">
                            申請加入社群
                        </button>
                        <p class="text-xs text-slate-400 mt-6 bg-slate-900/50 py-2 px-4 rounded-full border border-slate-700/50"><i class="fa-solid fa-shield-halved mr-1 text-emerald-400"></i> 人工審核 · 滿18歲限定</p>
                    </div>
                </div>
            `;
        }

        function viewRegister() {
            let kinksHtml = window.state.kinksOptions.map((kink) => `
                <label class="flex items-center space-x-3 p-3 bg-slate-800/40 rounded-xl border border-slate-700/60 cursor-pointer hover:bg-slate-700/50 transition">
                    <input type="checkbox" name="kinks" value="${kink}" class="form-checkbox h-5 w-5 text-slate-100 rounded border-slate-500 bg-slate-900 focus:ring-slate-400 focus:ring-offset-slate-900" ${window.state.userData.kinks && window.state.userData.kinks.includes(kink) ? 'checked' : ''}>
                    <span class="text-sm text-slate-200">${kink}</span>
                </label>
            `).join('');

            return `
                <div class="flex flex-col h-full fade-enter fade-enter-active bg-slate-900">
                    <div class="p-4 border-b border-slate-800 flex items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-20">
                        <button onclick="navigate('landing')" class="text-slate-400 hover:text-white transition w-10 flex justify-start"><i class="fa-solid fa-chevron-left text-lg"></i></button>
                        <h2 class="flex-1 text-center font-semibold text-lg tracking-wide">基本資料填寫</h2>
                        <div class="w-10"></div>
                    </div>
                    <div class="flex-1 overflow-y-auto p-5 scroll-smooth">
                        <form id="registerForm" class="space-y-7 pb-10">
                            
                            <!-- 暱稱 -->
                            <div class="space-y-1.5">
                                <label class="block text-sm font-medium text-slate-300 ml-1">暱稱 <span class="text-red-400">*</span></label>
                                <input type="text" id="reg-nickname" required value="${window.state.userData.nickname||''}" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-slate-400 focus:ring-1 focus:ring-slate-400 transition placeholder-slate-500" placeholder="你在平台上的稱呼">
                            </div>

                            <!-- 生日選擇器 -->
                            <div class="space-y-1.5">
                                <label class="block text-sm font-medium text-slate-300 ml-1">出生年月日 (需滿18歲) <span class="text-red-400">*</span></label>
                                <div class="grid grid-cols-3 gap-3">
                                    <div class="relative">
                                        <select id="reg-year" required class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl pl-4 pr-10 py-3.5 text-white focus:outline-none focus:border-slate-400 transition appearance-none text-center">
                                            <option value="">年</option>
                                        </select>
                                    </div>
                                    <div class="relative">
                                        <select id="reg-month" required class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl pl-4 pr-10 py-3.5 text-white focus:outline-none focus:border-slate-400 transition appearance-none text-center">
                                            <option value="">月</option>
                                        </select>
                                    </div>
                                    <div class="relative">
                                        <select id="reg-day" required class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl pl-4 pr-10 py-3.5 text-white focus:outline-none focus:border-slate-400 transition appearance-none text-center">
                                            <option value="">日</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- 身高體重 -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1.5">
                                    <label class="block text-sm font-medium text-slate-300 ml-1">身高 (cm) <span class="text-red-400">*</span></label>
                                    <input type="number" id="reg-height" required min="100" max="250" value="${window.state.userData.height||''}" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-slate-400 transition text-center">
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-sm font-medium text-slate-300 ml-1">體重 (kg) <span class="text-red-400">*</span></label>
                                    <input type="number" id="reg-weight" required min="30" max="200" value="${window.state.userData.weight||''}" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-slate-400 transition text-center">
                                </div>
                            </div>

                            <!-- 生殖器尺寸 -->
                            <div class="bg-slate-800/30 p-5 rounded-3xl border border-slate-700/50 relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-3 opacity-10"><i class="fa-solid fa-ruler-combined text-4xl"></i></div>
                                <h3 class="text-sm font-medium text-slate-200 mb-4 relative z-10 flex items-center gap-2"><div class="w-1.5 h-4 bg-emerald-500 rounded-full"></div> 身體密碼 (選填，供展示參考)</h3>
                                <div class="grid grid-cols-2 gap-4 relative z-10">
                                    <div class="space-y-1">
                                        <label class="block text-xs text-slate-400 ml-1">長度 (cm)</label>
                                        <input type="number" id="reg-length" step="0.1" value="${window.state.userData.length&&window.state.userData.length!=='未填'?window.state.userData.length:''}" class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-slate-400 transition text-center placeholder-slate-600" placeholder="例如: 15.5">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="block text-xs text-slate-400 ml-1">粗度圓周 (cm)</label>
                                        <input type="number" id="reg-girth" step="0.1" value="${window.state.userData.girth&&window.state.userData.girth!=='未填'?window.state.userData.girth:''}" class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-slate-400 transition text-center placeholder-slate-600" placeholder="例如: 12">
                                    </div>
                                </div>
                            </div>

                            <!-- 興趣標籤 -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-slate-300 ml-1">感興趣的生活主題 (可多選)</label>
                                <div class="grid grid-cols-2 gap-2">
                                    ${kinksHtml}
                                </div>
                                <div class="mt-3 bg-slate-800/40 p-3 rounded-xl border border-slate-700/60">
                                    <label class="flex items-center space-x-3 cursor-pointer">
                                        <input type="checkbox" id="kink-other-checkbox" class="form-checkbox h-5 w-5 text-slate-100 rounded border-slate-500 bg-slate-900 focus:ring-slate-400">
                                        <span class="text-sm text-slate-200">其他補充</span>
                                    </label>
                                    <div id="kink-other-container" class="mt-3 hidden">
                                        <input type="text" id="reg-kink-other" value="${window.state.userData.otherKink||''}" placeholder="請簡述您的其他偏好" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-slate-400 text-sm">
                                    </div>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="space-y-1.5 pt-2 border-t border-slate-800">
                                <label class="block text-sm font-medium text-slate-300 ml-1">通知信箱 <span class="text-red-400">*</span></label>
                                <p class="text-xs text-slate-500 ml-1 mb-2">審核結果將寄送至此，絕不外流。</p>
                                <input type="email" id="reg-email" required value="${window.state.userData.email||''}" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-slate-400 transition placeholder-slate-500" placeholder="your@email.com">
                            </div>

                            <button type="submit" class="w-full mt-6 bg-white hover:bg-slate-200 text-slate-900 font-bold py-4 px-4 rounded-2xl transition duration-300 shadow-lg text-lg sticky bottom-4 z-10">
                                預覽並確認資料
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function initRegisterForm() {
            const yearSelect = document.getElementById('reg-year');
            const monthSelect = document.getElementById('reg-month');
            const daySelect = document.getElementById('reg-day');
            
            const currentYear = new Date().getFullYear();
            const maxYear = currentYear - 18;
            const minYear = currentYear - 80;

            // 產生年份
            for (let y = maxYear; y >= minYear; y--) {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                if(window.state.userData.birthYear == y) opt.selected = true;
                yearSelect.appendChild(opt);
            }

            // 產生月份
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = m;
                if(window.state.userData.birthMonth == m) opt.selected = true;
                monthSelect.appendChild(opt);
            }

            // 更新日期的函數
            const updateDays = () => {
                const y = parseInt(yearSelect.value);
                const m = parseInt(monthSelect.value);
                daySelect.innerHTML = '<option value="">日</option>';
                if (!y || !m) return;
                
                const daysInMonth = new Date(y, m, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = d;
                    if(window.state.userData.birthDay == d) opt.selected = true;
                    daySelect.appendChild(opt);
                }
            };

            yearSelect.addEventListener('change', updateDays);
            monthSelect.addEventListener('change', updateDays);
            if(window.state.userData.birthYear && window.state.userData.birthMonth) updateDays();

            // 其他選項邏輯
            const form = document.getElementById('registerForm');
            const otherCheckbox = document.getElementById('kink-other-checkbox');
            const otherContainer = document.getElementById('kink-other-container');

            if(window.state.userData.otherKink) {
                otherCheckbox.checked = true;
                otherContainer.classList.remove('hidden');
                document.getElementById('reg-kink-other').setAttribute('required', 'true');
            }

            otherCheckbox.addEventListener('change', (e) => {
                if(e.target.checked) {
                    otherContainer.classList.remove('hidden');
                    document.getElementById('reg-kink-other').setAttribute('required', 'true');
                } else {

                        您可以在此看見送出的申請表單。點擊「核准」或「拒絕」將會觸發電子郵件通知，且申請者的網頁會即時跳轉。
                    </div>

                    <div class="flex-1 overflow-y-auto p-4" id="admin-list">
                        <div class="flex justify-center mt-10"><i class="fa-solid fa-circle-notch animate-spin text-2xl text-indigo-400"></i></div>
                    </div>
                </div>
            `;
        }

        async function loadAdminData() {
            const listContainer = document.getElementById('admin-list');
            
            // 處理模擬模式
            if (!db) {
                listContainer.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center flex flex-col items-center justify-center gap-4">
                        <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-xl">
                            <i class="fa-solid fa-circle-info"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800">目前處於模擬模式</h4>
                            <p class="text-xs text-slate-500 mt-1">您可以點擊下方按鈕模擬管理員核准，並觸發模擬發信與頁面跳轉。</p>
                        </div>
                        <button onclick="mockApprove()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-4 rounded-xl transition shadow-sm">
                            模擬核准當前申請
                        </button>
                    </div>
                `;
                return;
            }

            try {
                const q = collection(db, 'secretg_apps', appId, 'applications');
                onSnapshot(q, (querySnapshot) => {
                    listContainer.innerHTML = '';
                    if (querySnapshot.empty) {
                        listContainer.innerHTML = '<div class="text-center text-slate-500 py-8">目前無任何申請資料</div>';
                        return;
                    }
                    querySnapshot.forEach((docSnap) => {
                        const data = docSnap.data();
                        const card = document.createElement('div');
                        card.className = 'bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-4 flex flex-col gap-3';
                        
                        let kinksStr = data.kinks && data.kinks.length > 0 ? data.kinks.join(', ') : '無';
                        if (data.otherKink) kinksStr += ` (其他: ${data.otherKink})`;

                        const statusColors = {
                            pending: 'bg-amber-100 text-amber-800 border-amber-200',
                            approved: 'bg-emerald-100 text-emerald-800 border-emerald-200',
                            active: 'bg-blue-100 text-blue-800 border-blue-200',
                            rejected: 'bg-red-100 text-red-800 border-red-200'
                        };
                        const currentStatusColor = statusColors[data.status] || 'bg-slate-100 text-slate-800';

                        // 檢查是否有綁定 Telegram 資訊
                        let tgInfoHtml = '';
                        if (data.telegramInfo) {
                            tgInfoHtml = `
                                <div class="mt-2 pt-2 border-t border-slate-100 text-xs text-blue-600 flex items-center gap-1">
                                    <i class="fa-brands fa-telegram text-sm"></i>
                                    <span>已綁定：@${data.telegramInfo.username || data.telegramInfo.first_name} (ID: ${data.telegramInfo.id})</span>
                                </div>
                            `;
                        }

                        card.innerHTML = `
                            <div class="flex justify-between items-start">
                                <div class="space-y-1">
                                    <h4 class="font-bold text-slate-800 flex items-center gap-2">
                                        ${data.nickname || '未填'} 
                                        <span class="px-2 py-0.5 text-[10px] font-semibold rounded-full border ${currentStatusColor}">
                                            ${data.status === 'pending' ? '待審核' : data.status === 'approved' ? '已核准' : data.status === 'active' ? '已啟用' : '已拒絕'}
                                        </span>
                                    </h4>
                                    <p class="text-xs text-slate-500">信箱：${data.email}</p>
                                    <p class="text-xs text-slate-600">身高/體重：${data.height} cm / ${data.weight} kg</p>
                                    <p class="text-xs text-slate-600">身體尺寸：長 ${data.length} cm / 粗 ${data.girth} cm</p>
                                    <p class="text-xs text-slate-600">主題偏好：${kinksStr}</p>
                                    ${tgInfoHtml}
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="updateStatus('${docSnap.id}', 'approved')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-3 py-2 rounded-xl transition font-medium">核准</button>
                                    <button onclick="updateStatus('${docSnap.id}', 'rejected')" class="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-2 rounded-xl transition font-medium">拒絕</button>
                                </div>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    });
                });
            } catch (e) {
                console.error("載入後台資料失敗:", e);
                listContainer.innerHTML = `<div class="text-center text-red-500 py-8">載入失敗: ${e.message}</div>`;
            }
        }

        // 發送電子郵件通知
        async function sendEmailNotification(userData, status) {
            if (!emailjsConfig.publicKey || emailjsConfig.publicKey === "YOUR_EMAILJS_PUBLIC_KEY") {
                console.info(`[Email 模擬] 發送郵件給 ${userData.email}：您的申請狀態已更新為 [${status}]。`);
                showToast(`[模擬信件] 已寄送審核通知至 ${userData.email}`, "info");
                return;
            }

            const statusText = status === 'approved' ? '已通過審核' : '未通過審核';
            const messageText = status === 'approved' 
                ? `恭喜您！您的加入申請已通過審核。請點擊下方連結進入平台綁定您的 Telegram 帳號：\nhttps://${window.location.host || 'localhost'}`
                : `很抱歉，您的加入申請未通過審核。感謝您的關注。`;

            try {
                await emailjs.send(emailjsConfig.serviceId, emailjsConfig.templateId, {
                    to_email: userData.email,
                    to_name: userData.nickname,
                    status_text: statusText,
                    message: messageText
                });
                console.log(`Email 成功發送至 ${userData.email}`);
                showToast(`審核通知信已寄送至 ${userData.email}`, "success");
            } catch (error) {
                console.error("Email 發送失敗:", error);
                showToast("Email 通知信發送失敗，請檢查 EmailJS 配置", "error");
            }
        }

        window.updateStatus = async function(userId, status) {
            let userData = null;
            if (db) {
                try {
                    const docRef = doc(db, 'secretg_apps', appId, 'applications', userId);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        userData = docSnap.data();
                    }
                } catch (e) {
                    console.error("讀取用戶資料失敗:", e);
                }
            } else {
                userData = window.state.userData;
            }

            if (!db) {
                showToast('模擬模式：更新狀態為 ' + status, 'info');
                if (userData) {
                    userData.status = status;
                    sendEmailNotification(userData, status);
                }
                return;
            }

            try {
                const docRef = doc(db, 'secretg_apps', appId, 'applications', userId);
                await updateDoc(docRef, { status: status });
                showToast('已更新狀態為 ' + (status === 'approved' ? '已核准' : '已拒絕'), 'success');
                
                if (userData) {
                    sendEmailNotification(userData, status);
                }
            } catch (e) {
                console.error(e);
                showToast('更新狀態失敗: ' + e.message, 'error');
            }
        }

        window.mockApprove = function() {
            window.state.userData.status = 'approved';
            showToast('🎉 模擬核准成功！', 'success');
            sendEmailNotification(window.state.userData, 'approved');
            if (window.state.currentView === 'pending') {
                setTimeout(() => navigate('telegram'), 1200);
            } else {
                setTimeout(() => navigate('telegram'), 600);
            }
        }

        // 啟動應用
        initApp();
    </script>
</body>
</html>
