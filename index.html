function profileFix(){const g=document.getElementById('sr-profile-action-grid');if(!g||g.dataset.fixed)return;const bs=[...g.querySelectorAll('button')],find=r=>bs.find(b=>r.test(b.textContent||'')),edit=find(/修改個人資料|編輯會籍資料/),safe=find(/通知設定|帳號安全服務/),exp=find(/匯出個人資料/),del=find(/申請刪除帳號|刪除申請審核中/);if(!edit||!safe||!exp||!del)return;[edit,safe,exp,del].forEach(b=>nativeAppend.call(g,b));const bind=(b,n,fn)=>{b.type='button';b.dataset.srProfileAction=n;b.removeAttribute('onclick');b.onclick=e=>{e.preventDefault();e.stopPropagation();fn?.()}};bind(edit,'edit',()=>window.showEditProfileModal?.());bind(safe,'safe',()=>window.SROpenTelegramBinding?.());bind(exp,'export',()=>window.exportMyData?.());if(!del.disabled)bind(del,'delete',()=>window.showAccountDeletionRequestModal?.());try{Object.defineProperty(g,'appendChild',{configurable:true,value(c){return c?.parentNode===this?c:nativeAppend.call(this,c)}})}catch{}g.dataset.fixed='1'}
function dialogs(){const add=(marker,cls,sel='.glass-panel')=>{const n=typeof marker==='string'?document.querySelector(marker):marker;if(!n)return;const o=n.matches?.('.fixed.inset-0')?n:n.closest?.('.fixed.inset-0'),p=n.matches?.(sel)?n:o?.querySelector(sel)||n.closest?.(sel);o?.classList.add('sr-responsive-workspace',cls);p?.classList.add('sr-responsive-workspace-panel')};add('#btn-submit-profile-edit','sr-dialog-edit');add('#btn-submit-spec','sr-dialog-spec');add('#btn-submit-delete-request','sr-dialog-delete');add(document.getElementById('sr-safety-manager'),'sr-dialog-manager','section');add(document.getElementById('sr-telegram-phase2-modal'),'sr-dialog-telegram','.sr-tg-modal-card');add(document.getElementById('sr-telegram-service-modal'),'sr-dialog-telegram-legacy',':scope > div')}
const clickSection=n=>document.querySelector({profile:'#aside-profile-trigger',notifications:'#aside-tab-notifications',content:'#aside-tab-feed',gold:'#aside-tab-spec-vault',badges:'#aside-tab-badge-progress',rank:'#aside-tab-ranking'}[n]||'')?.click?.();
function home(){const c=document.getElementById('dashboard-tab-content');if(!c||window.state?.currentTab!=='club-home'||c.querySelector('#sr-club-home'))return;const u=window.state.userData||{},id=window.state.applicationId||'member',posts=(window.state.posts||[]).filter(p=>p.userId===id).length,unread=Number(document.getElementById('aside-notification-count')?.textContent||0),status=['approved','active'].includes(String(u.status).toLowerCase())?'有效會籍':'會員資料已建立',gold=u.isSpecElite||u.specEliteStatus==='approved'?'資格已啟用':u.specEliteStatus==='pending'?'資格審核中':'尚未申請';c.innerHTML=`<div id="sr-club-home" class="sr-club-home"><section class="sr-club-hero"><div class="text-[10px] tracking-[.22em] text-amber-300 font-black">SECRETROOM PRIVATE MEMBERSHIP</div><h1 class="text-2xl md:text-4xl text-white font-black mt-2">歡迎回到俱樂部，${esc(u.nickname||id)}</h1><p class="text-xs md:text-sm text-slate-400 leading-relaxed mt-3 max-w-3xl">SecretRoom 以會籍、資格、隱私與會員專屬內容為核心，不提供配對、追蹤或公開粉絲制度。</p><div class="sr-status-grid"><div class="sr-status"><span>會籍狀態</span><b>${status}</b><span>@${esc(id)}</span></div><div class="sr-status"><span>黃金資格</span><b>${gold}</b><span>決定限定內容權限</span></div><div class="sr-status"><span>站內通知</span><b>${unread} 則未讀</b><span>審核、申請與官方訊息</span></div><div class="sr-status"><span>帳號安全</span><b>${u.telegramInfo||u.telegramBound?'驗證已建立':'待完成驗證'}</b><span>外部工具只作安全輔助</span></div></div></section><section class="sr-club-section"><h2 class="text-lg text-white font-black">會籍與俱樂部服務</h2><p class="text-xs text-slate-500 mt-1">優先管理資格、申請進度、通知與隱私。</p><div class="sr-service-grid">${[['profile','fa-id-card','會籍中心','維護會籍資料與帳號設定'],['notifications','fa-bell','站內通知','查看審核、申請與官方訊息'],['gold','fa-medal','黃金限定','查看資格狀態與限定內容'],['badges','fa-award','資格與里程碑','以資格與參與紀錄取代人氣競賽'],['profile','fa-user-shield','安全與隱私','資料匯出、帳號安全與刪除申請'],['content','fa-layer-group','俱樂部內容','會員投稿、主題內容與俱樂部精選']].map(x=>`<button class="sr-service" data-target="${x[0]}"><i class="fa-solid ${x[1]}"></i><b>${x[2]}</b><small>${x[3]}</small></button>`).join('')}</div></section><section class="sr-club-section"><h2 class="text-lg text-white font-black">會員專屬內容</h2><div class="sr-principle-grid"><div class="sr-principle"><b>內容投稿</b><span>目前已提交 ${posts} 則會員內容。</span></div><div class="sr-principle"><b>有限度互動</b><span>保留留言與檢舉，降低人物比較。</span></div><div class="sr-principle"><b>資格分級</b><span>內容依會籍與資格開放，不依人氣決定。</span></div></div></section></div>`;c.querySelectorAll('[data-target]').forEach(b=>b.onclick=()=>clickSection(b.dataset.target));navState()}
function navState(){const tab=window.state?.currentTab;document.getElementById('sr-club-home-nav')?.classList.toggle('active',tab==='club-home');document.getElementById('sr-membership-nav')?.classList.toggle('active',tab==='profile');document.querySelector('.sr-dashboard-shell')?.classList.toggle('sr-club-home-mode',tab==='club-home')}
function desktopNav(){const feed=document.getElementById('aside-tab-feed'),nav=feed?.closest('nav');if(!feed||!nav||nav.dataset.club)return;nav.dataset.club='1';const label=document.createElement('div');label.className='sr-nav-label';label.textContent='Membership & Club';const h=document.createElement('button');h.id='sr-club-home-nav';h.className='sr-club-nav';h.innerHTML='<i class="fa-solid fa-shield-halved"></i>俱樂部首頁';h.onclick=()=>{window.state.currentTab='club-home';window.state.singlePostFocusId=null;home()};const m=document.createElement('button');m.id='sr-membership-nav';m.className='sr-club-nav';m.innerHTML='<i class="fa-solid fa-id-card"></i>會籍中心';m.onclick=()=>clickSection('profile');nav.insertBefore(label,feed);nav.insertBefore(h,feed);nav.insertBefore(m,feed);feed.innerHTML='<i class="fa-solid fa-layer-group text-amber-500/80"></i> 俱樂部內容';const rank=document.getElementById('aside-tab-ranking');if(rank){rank.innerHTML='<i class="fa-solid fa-chart-simple text-amber-500/80"></i> 會員里程碑';rank.classList.add('sr-secondary-nav')}const gold=document.getElementById('aside-tab-spec-vault');if(gold)gold.querySelector('span')?.replaceChildren(Object.assign(document.createElement('span'),{innerHTML:'<i class="fa-solid fa-medal text-amber-500/80"></i> 黃金限定'}));const badge=document.getElementById('aside-tab-badge-progress');if(badge)badge.querySelector('span')?.replaceChildren(Object.assign(document.createElement('span'),{innerHTML:'<i class="fa-solid fa-award text-amber-500/80"></i> 資格與里程碑'}));const share=document.getElementById('aside-btn-share');if(share)share.innerHTML='<i class="fa-solid fa-file-circle-plus"></i> 提交會員內容';navState()}
function mobileNav(){const h=document.getElementById('mobile-tab-ranking'),f=document.getElementById('mobile-tab-feed'),p=document.getElementById('mobile-tab-profile'),menu=document.getElementById('mobile-btn-logout');if(!h||!f||!p||!menu||h.dataset.club)return;h.dataset.club='1';h.innerHTML='<i class="fa-solid fa-shield-halved text-sm"></i><span class="text-[10px] font-bold">首頁</span>';h.onclick=e=>{e.preventDefault();window.state.currentTab='club-home';home()};f.innerHTML='<i class="fa-solid fa-layer-group text-sm"></i><span class="text-[10px] font-bold">內容</span>';p.innerHTML='<i class="fa-solid fa-id-card text-sm"></i><span class="text-[10px] font-bold">會籍</span>';menu.innerHTML='<i class="fa-solid fa-bars text-sm"></i><span class="text-[10px] font-bold">選單</span>';menu.onclick=e=>{e.preventDefault();document.getElementById('mobile-btn-menu')?.click()};document.getElementById('mobile-btn-share')?.setAttribute('aria-label','提交會員內容')}
function mobileMenu(){const s=document.querySelector('#mobile-feature-menu .sr-mobile-menu-sheet');if(!s||s.dataset.club)return;s.dataset.club='1';[...s.querySelectorAll('h4')].find(x=>/線上活躍帳號/.test(x.textContent||''))?.closest('.space-y-3')?.classList.add('sr-mobile-member-discovery');const g=s.querySelector('.grid.grid-cols-1');if(g){const rank=document.createElement('button');rank.className='sr-mobile-menu-item';rank.innerHTML='<span><i class="fa-solid fa-chart-simple text-amber-400 mr-3"></i>會員里程碑</span><span class="text-[10px] text-slate-500">次要入口</span>';rank.onclick=()=>clickSection('rank');const out=document.createElement('button');out.className='sr-mobile-menu-item text-rose-300';out.innerHTML='<span><i class="fa-solid fa-power-off text-rose-400 mr-3"></i>登出俱樂部</span>';out.onclick=()=>document.getElementById('aside-btn-logout')?.click();g.append(rank,out)}}
function rename(){const tag=[...document.querySelectorAll('p')].find(x=>x.textContent?.trim()==='頂級會員制 · 私生活交流俱樂部');if(tag)tag.textContent='審核會員制 · 私密內容與會籍服務';document.querySelectorAll('[data-sr-profile-action="edit"]').forEach(b=>b.innerHTML=b.innerHTML.replace('修改個人資料','編輯會籍資料'));document.querySelectorAll('[data-sr-profile-action="safe"],[data-sr-profile-action="notifications"]').forEach(b=>b.innerHTML=b.innerHTML.replace('通知設定','帳號安全服務'));const topics=[...document.querySelectorAll('.sr-dashboard-right h3')].find(x=>/熱門主題探索/.test(x.textContent||''));if(topics)topics.innerHTML='<i class="fa-solid fa-layer-group text-xs"></i> 主題內容';const active=[...document.querySelectorAll('.sr-dashboard-right h3')].find(x=>/線上活躍帳號|近期參與會員/.test(x.textContent||''));if(active){active.innerHTML='<i class="fa-solid fa-user-shield text-xs"></i> 近期參與會員';const card=active.parentElement;card?.classList.add('sr-muted-discovery');if(card&&!card.querySelector('.sr-member-note')){const n=document.createElement('span');n.className='sr-member-note';n.textContent='會員名單已降為次要資訊，不作為配對或人物探索入口。';active.after(n)}}document.querySelectorAll('#dashboard-tab-content h1,#dashboard-tab-content h2,#dashboard-tab-content h3,#dashboard-tab-content button,#dashboard-tab-content span').forEach(n=>{if(n.children.length)return;const t=n.textContent?.trim();if(t==='個人主頁')n.textContent='會籍中心';if(t==='個人資料')n.textContent='會籍資料';if(t==='分享動態')n.textContent='提交會員內容';if(t==='發布貼文')n.textContent='提交內容';if(t==='推薦')n.textContent='俱樂部精選'})}
function architecture(){const dash=document.querySelector('.sr-dashboard-shell');if(!dash||!window.state){rename();return}desktopNav();mobileNav();mobileMenu();rename();if(!window.__SR_CLUB_HOME_BOOTSTRAPPED__){window.__SR_CLUB_HOME_BOOTSTRAPPED__=true;if(!window.state.currentTab||window.state.currentTab==='feed')window.state.currentTab='club-home'}if(window.state.currentTab==='club-home')home();navState()}
function apply(){auth();registration();spec();document.querySelectorAll('#sr-telegram-service-modal [data-action="reset"]').forEach(b=>b.remove());profileFix();dialogs();architecture()}
new MutationObserver(apply).observe(document.documentElement,{childList:true,subtree:true});document.addEventListener('DOMContentLoaded',apply,{once:true});apply();
})();
