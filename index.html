                                        <label class="block text-[9px] font-bold text-slate-500 mb-1">勃起粗度圍 (cm)</label>
                                        <input type="number" id="reg-girth" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500" required>

                            <!-- 5列2行完全展開標籤清單 -->
                            <div class="space-y-2">

                                <span class="text-[9px] text-slate-500 block mb-2 leading-relaxed">這些設定在您被審核啟用後，能方便其他兄弟快速找到您的主打標籤。</span>
                                
                                <div class="grid grid-cols-2 gap-2 bg-slate-950/40 p-3.5 border border-slate-850 rounded-2xl" id="register-kinks-box">
                                    ${window.state.kinksOptions.map((k) => `
                                        <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-900/60 p-2 rounded-xl transition border border-transparent hover:border-slate-800">
                                            <input type="checkbox" name="reg-kink" value="${k}" class="rounded border-slate-850 bg-slate-950 text-indigo-650 focus:ring-indigo-500 w-3.5 h-3.5">

                                        </label>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- 提交按鈕 -->
                            <button type="submit" id="apply-submit" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold text-xs py-3.5 px-6 rounded-xl transition duration-300 shadow-lg shadow-indigo-950/20">
                                送出註冊與審核申請
                            </button>
                        </form>
                    </div>
                </div>
            `;

            const yearSelect = document.getElementById('reg-year');
            const monthSelect = document.getElementById('reg-month');
            const daySelect = document.getElementById('reg-day');

            const currentYear = new Date().getFullYear();
            for (let y = currentYear - 18; y >= currentYear - 80; y--) {
                yearSelect.options.add(new Option(`${y} 年`, y));
            }
            for (let m = 1; m <= 12; m++) {
                monthSelect.options.add(new Option(`${m} 月`, m));
            }
            for (let d = 1; d <= 31; d++) {
                daySelect.options.add(new Option(`${d} 日`, d));
            }

            const avatarTrigger = document.getElementById('avatar-trigger');
            const fileInput = document.getElementById('register-avatar-file');
            const previewImg = document.getElementById('avatar-preview');
            const placeholderBox = document.getElementById('avatar-placeholder');
            let base64Avatar = '';

            avatarTrigger.onclick = () => fileInput.click();

            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        base64Avatar = evt.target.result;
                        previewImg.src = base64Avatar;
                        previewImg.classList.remove('hidden');
                        placeholderBox.classList.add('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            };

            document.getElementById('btn-back-landing').onclick = () => navigate('landing');

            const btnSendCode = document.getElementById('btn-send-code');
            const btnVerifyCode = document.getElementById('btn-verify-code');
            const emailInput = document.getElementById('reg-email');
            const codeInput = document.getElementById('reg-email-code');

            btnSendCode.onclick = async () => {
                const email = emailInput.value.trim();
                if (!email || !email.includes('@')) {
                    showToast('請輸入正確的電子郵件信箱！', 'error');
                    return;
                }

                const generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                window.state.emailVerificationCode = generatedCode;

                btnSendCode.disabled = true;
                btnSendCode.classList.add('opacity-50', 'cursor-not-allowed');

                if (emailjsConfig.publicKey && emailjsConfig.publicKey !== "YOUR_EMAILJS_PUBLIC_KEY") {
                    try {
                        await emailjs.send(emailjsConfig.serviceId, emailjsConfig.templateId, {
                            to_email: email,
                            to_name: "SecretRoom 新成員",
                            status_text: "新帳號信箱安全驗證",
                            message: `歡迎申請加入 SecretRoom！您的註冊信箱驗證碼為：【${generatedCode}】。請於 10 分鐘內將此碼填回申請頁面以完成安全查核。`
                        });
                        showToast('信箱驗證郵件已發送，請立即查收信箱！', 'success');
                    } catch (err) {
                        console.error(err);
                        showToast('驗證信送出失敗，請確認信箱無誤後重試。', 'error');
                        btnSendCode.disabled = false;
                        btnSendCode.classList.remove('opacity-50', 'cursor-not-allowed');
                        return;
                    }
                } else {
                    console.log("[系統通訊調試] 驗證碼：", generatedCode);
                    showToast(`[系統通訊調試] 驗證碼為：${generatedCode}`, 'info');
                }

                let countdown = 60;
                const timer = setInterval(() => {
                    countdown--;
                    btnSendCode.textContent = `${countdown}s 後重發`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btnSendCode.disabled = false;
                        btnSendCode.classList.remove('opacity-50', 'cursor-not-allowed');
                        btnSendCode.textContent = '發送驗證碼';
                    }
                }, 1000);
            };

            btnVerifyCode.onclick = () => {
                const userCode = codeInput.value.trim();
                if (!window.state.emailVerificationCode) {
                    showToast('請先點擊發送驗證碼！', 'error');
                    return;
                }
                if (userCode === window.state.emailVerificationCode) {
                    window.state.emailVerified = true;
                    showToast('電子郵件驗證成功！', 'success');
                    
                    emailInput.disabled = true;
                    codeInput.disabled = true;
                    btnSendCode.disabled = true;
                    btnVerifyCode.disabled = true;
                    btnVerifyCode.textContent = '驗證完成 ✓';
                    btnVerifyCode.className = "bg-emerald-750 text-white font-bold text-[10px] px-3.5 rounded-xl cursor-not-allowed shrink-0";
                } else {
                    showToast('驗證碼不正確，請重新確認！', 'error');
                }
            };

            const pwdInput = document.getElementById('reg-password');
            const ruleLen = document.getElementById('pwd-rule-len');
            const ruleUpper = document.getElementById('pwd-rule-upper');
            const ruleSpec = document.getElementById('pwd-rule-spec');

            pwdInput.oninput = () => {
                const val = pwdInput.value;
                
                if (val.length >= 8) {
                    ruleLen.className = "flex items-center gap-1.5 text-emerald-500 font-semibold";
                    ruleLen.querySelector('i').className = "fa-solid fa-circle-check text-[10px]";
                } else {
                    ruleLen.className = "flex items-center gap-1.5 text-slate-500";
                    ruleLen.querySelector('i').className = "fa-solid fa-circle-notch text-[8px]";
                }

                if (/[A-Z]/.test(val)) {
                    ruleUpper.className = "flex items-center gap-1.5 text-emerald-500 font-semibold";
                    ruleUpper.querySelector('i').className = "fa-solid fa-circle-check text-[10px]";
                } else {
                    ruleUpper.className = "flex items-center gap-1.5 text-slate-500";
                    ruleUpper.querySelector('i').className = "fa-solid fa-circle-notch text-[8px]";
                }

                if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) {
                    ruleSpec.className = "flex items-center gap-1.5 text-emerald-500 font-semibold";
                    ruleSpec.querySelector('i').className = "fa-solid fa-circle-check text-[10px]";
                } else {
                    ruleSpec.className = "flex items-center gap-1.5 text-slate-500";
                    ruleSpec.querySelector('i').className = "fa-solid fa-circle-notch text-[8px]";
                }
            };

            document.getElementById('apply-form').onsubmit = async (e) => {
                e.preventDefault();

                const username = document.getElementById('reg-username').value.trim();
                const usernameConfirm = document.getElementById('reg-username-confirm').value.trim();
                const password = document.getElementById('reg-password').value;
                const passwordConfirm = document.getElementById('reg-password-confirm').value;
                const nickname = document.getElementById('reg-nickname').value.trim();
                const email = emailInput.value.trim();
                const year = yearSelect.value;
                const month = monthSelect.value;
                const day = daySelect.value;
                const height = document.getElementById('reg-height').value;
                const weight = document.getElementById('reg-weight').value;
                const length = document.getElementById('reg-length').value;
                const girth = document.getElementById('reg-girth').value;

                const selectedKinks = [];
                document.querySelectorAll('input[name="reg-kink"]:checked').forEach((cb) => {
                    selectedKinks.push(cb.value);
                });

                if (username !== usernameConfirm) {
                    showToast('兩次輸入的帳號不一致！', 'error');
                    return;
                }
                if (password !== passwordConfirm) {
                    showToast('兩次輸入的密碼不一致！', 'error');
                    return;
                }

                const isLenMet = password.length >= 8;
                const isUpperMet = /[A-Z]/.test(password);
                const isSpecMet = /[!@#$%^&*(),.?":{}|<>]/.test(password);
                if (!isLenMet || !isUpperMet || !isSpecMet) {
                    showToast('密碼未滿足強度條件設定！', 'error');
                    return;
                }

                if (!base64Avatar) {
                    showToast('請上傳個人頭像供審核查驗。', 'error');
                    return;
                }

                if (!window.state.emailVerified) {
                    showToast('請務必完成信箱安全性驗證！', 'error');
                    return;
                }

                if (selectedKinks.length === 0) {
                    showToast('請至少勾選一項主題偏好！', 'error');
                    return;
                }

                if (!db) {
                    showToast('伺服器連線超時，暫時無法提交。', 'error');
                    return;
                }

                showLoading();
                try {
                    const checkRef = doc(db, 'secretg_apps', appId, 'applications', username);
                    const checkSnap = await getDoc(checkRef);
                    if (checkSnap.exists()) {
                        showToast('該帳號已存在！請更換其他設定帳號。', 'error');
                        hideLoading();
                        return;
                    }

                    const appPayload = {
                        status: 'pending',
                        password,
                        nickname,
                        email,
                        birthYear: year,
                        birthMonth: month,
                        birthDay: day,
                        height,
                        weight,
                        length,
                        girth,
                        kinks: selectedKinks,
                        avatar: base64Avatar,
                        avatarStatus: 'approved', 
                        createdAt: serverTimestamp()
                    };

                    await setDoc(checkRef, appPayload);

                    window.state.userData = appPayload;
                    window.state.applicationId = username;
                    localStorage.setItem('sr_username', username);

                    showToast('申請資料提交成功！審核結果將發送至您的信箱。', 'success');
                    navigate('pending');
                } catch (err) {
                    console.error("資料寫入錯誤:", err);
                    showToast('寫入失敗: ' + err.message, 'error');
                } finally {
                    hideLoading();
                }
            };
        }

        function renderPending(container) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen w-full px-6 bg-[#030307]">
                    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl text-center space-y-6">

                        <div class="pt-2">
                            <button id="btn-pending-refresh" class="w-full bg-slate-800 hover:bg-slate-750 text-slate-300 font-semibold text-xs py-3 rounded-xl border border-slate-700/60 transition">

        function renderRejected(container) {
            const reason = window.state.userData.rejectionReason || "未遵守安全上傳規範（例如頭像模糊、非本人等）。";
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen w-full px-6 bg-[#030307]">
                    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl text-center space-y-6">
                        <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center text-red-500 text-3xl mx-auto shadow-[0_0_20px_rgba(239,68,68,0.15)]">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>

                        <div class="bg-red-500/5 border border-red-500/10 p-4 rounded-2xl text-left space-y-2">

            document.getElementById('btn-reapply-logout').onclick = () => {
                localStorage.removeItem('sr_username');
                window.state.userData = {};
                window.state.applicationId = null;
                navigate('landing');
            };

            document.getElementById('btn-reapply-edit').onclick = () => {
                const draft = { ...window.state.userData };
                navigate('register');
                
                // 預填先前填寫的資料
                setTimeout(() => {
                    const uInput = document.getElementById('reg-username');
                    const uConf = document.getElementById('reg-username-confirm');
                    const nInput = document.getElementById('reg-nickname');
                    const eInput = document.getElementById('reg-email');
                    const hInput = document.getElementById('reg-height');
                    const wInput = document.getElementById('reg-weight');
                    const lInput = document.getElementById('reg-length');
                    const gInput = document.getElementById('reg-girth');

                    if (uInput) { uInput.value = window.state.applicationId; uInput.disabled = true; }
                    if (uConf) { uConf.value = window.state.applicationId; uConf.disabled = true; }
                    if (nInput) nInput.value = draft.nickname || '';
                    if (eInput) eInput.value = draft.email || '';
                    if (hInput) hInput.value = draft.height || '';
                    if (wInput) wInput.value = draft.weight || '';
                    if (lInput) lInput.value = draft.length || '';
                    if (gInput) gInput.value = draft.girth || '';

                    if (draft.birthYear) document.getElementById('reg-year').value = draft.birthYear;
                    if (draft.birthMonth) document.getElementById('reg-month').value = draft.birthMonth;
                    if (draft.birthDay) document.getElementById('reg-day').value = draft.birthDay;

                    if (draft.kinks && draft.kinks.length > 0) {
                        draft.kinks.forEach(k => {
                            const cb = document.querySelector(`input[name="reg-kink"][value="${k}"]`);
                            if (cb) cb.checked = true;
                        });
                    }
                }, 100);
            };

            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen w-full px-6 bg-[#030307]">

        async function addVisitorRecord(targetUserId) {
            if (!db || targetUserId === window.state.applicationId) return;
            try {
                const vId = `${window.state.applicationId}_to_${targetUserId}`;
                const visitorRef = doc(db, 'secretg_apps', appId, 'visitors', vId);
                await setDoc(visitorRef, {
                    from: window.state.applicationId,
                    to: targetUserId,
                    avatar: window.state.userData.avatar || '',
                    timestamp: serverTimestamp()
                });
            } catch (err) {
                console.error("訪客紀錄同步異常:", err);
            }
        }

        function listenToMyVisitors() {
            if (!db || window.state.unsubscribeVisitorsListener) return;
            const q = query(
                collection(db, 'secretg_apps', appId, 'visitors'), 
                where('to', '==', window.state.applicationId)
            );
            window.state.unsubscribeVisitorsListener = onSnapshot(q, (snapshot) => {
                const list = [];
                snapshot.forEach((docSnap) => {
                    list.push(docSnap.data());
                });
                window.state.visitors = list.slice(0, 10);
                
                const scrollContainer = document.getElementById('dashboard-tab-content');
                if (window.state.currentTab === 'profile') {
                    renderProfileTab(scrollContainer, window.state.applicationId);
                }
            });
        }

            if (targetUserId === window.state.applicationId) {
                window.state.currentTab = 'profile';
            } else {
                window.state.currentTab = 'other-profile';
                window.state.viewTargetUserId = targetUserId;
            }
            renderDashboard(appContainer);
        };

            if (!db) return;
            const post = window.state.posts.find(p => p.id === postId);
            if (!post) return;

            const myId = window.state.applicationId;
            const likes = post.likes || {};
            const liked = likes[myId];

            if (liked) {
                delete likes[myId];
            } else {
                likes[myId] = true;
            }

            const likeCount = Object.keys(likes).length;

            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                await updateDoc(postRef, {
                    likes: likes,
                    likeCount: likeCount
                });
            } catch (err) {
                console.error("按讚同步失敗:", err);
            }
        };

            }
            if (user.isPioneer) {
                badges.push({ icon: 'fa-shield-halved', color: 'from-amber-600 to-orange-700 text-white shadow-orange-500/10' });
            }
            
            // 升級 Spec Elite 黃金認證徽章：全新極光皇家金牌樣式
            if (user.isSpecElite) {
                badges.push({ icon: 'fa-medal', color: 'from-amber-400 via-yellow-500 to-amber-600 text-slate-950 shadow-yellow-500/25 animate-pulse' });
            }

            const userPosts = window.state.posts.filter(p => p.userId === user.id);
            const totalLikes = userPosts.reduce((sum, p) => sum + (p.likeCount || 0), 0);

            if (totalLikes >= 1000) {
                badges.push({ icon: 'fa-fire', color: 'from-orange-500 to-rose-600 text-white shadow-orange-500/20' });
            }

            const perfectPosts = userPosts.filter(p => {
                const ratings = p.ratings ? Object.values(p.ratings) : [];
                const avg = ratings.length > 0 ? (ratings.reduce((a,b)=>a+b, 0) / ratings.length) : 0;
                return avg === 5.0 && ratings.length >= 500;
            });
            if (userPosts.length >= 50 && perfectPosts.length === userPosts.length) {
                badges.push({ icon: 'fa-star', color: 'from-amber-400 via-yellow-500 to-amber-600 text-slate-950 shadow-yellow-500/25' });
            }

            if (userPosts.length >= 100) {
                badges.push({ icon: 'fa-camera', color: 'from-violet-500 to-purple-700 text-white shadow-violet-500/15' });
            }

            const gymPosts = userPosts.filter(p => p.kinks && p.kinks.some(k => k.includes('健身')));
            const gymLikes = gymPosts.reduce((sum, p) => sum + (p.likeCount || 0), 0);
            if (gymPosts.length >= 50 && gymLikes >= 5000) {
                badges.push({ icon: 'fa-dumbbell', color: 'from-slate-500 to-slate-700 text-white shadow-slate-500/10' });
            }

            let otherCommentsCount = 0;
            window.state.posts.forEach(p => {
                if (p.userId !== user.id && p.comments) {
                    Object.values(p.comments).forEach(c => {
                        if (c.userId === user.id) otherCommentsCount++;
                    });
                }
            });
            if (otherCommentsCount >= 500) {
                badges.push({ icon: 'fa-heart-circle-check', color: 'from-pink-500 to-rose-600 text-white shadow-pink-500/15' });
            }

            // 所有徽章僅保留圖示，且徹底取消 hover title 懸停提示說明
            return badges.map(b => `
                <span class="inline-flex items-center justify-center ${isBig ? 'w-11 h-11 text-base' : 'w-5.5 h-5.5 text-[10px]'} rounded-full bg-gradient-to-r ${b.color} shadow-sm select-none">
                    <i class="fa-solid ${b.icon}"></i>
                </span>
            `).join('');
        }

        function getUserBadgeHTMLForPost(post) {
            const author = window.state.activeUsers.find(u => u.id === post.userId);
            if (!author) return '';
            return getBadgeHTML(author);
        }

        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            const bgColors = {
                error: 'bg-red-500/95 border-red-400',
                success: 'bg-emerald-500/95 border-emerald-400',
                info: 'bg-indigo-600/95 border-indigo-500/40'
            };
            toast.className = `${bgColors[type] || bgColors.info} text-white px-5 py-3.5 rounded-2xl shadow-xl border text-xs font-semibold transition-all duration-300 opacity-0 transform -translate-y-4 backdrop-blur-xl flex items-center gap-3`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fa-solid ${icon} text-base"></i> <span class="tracking-wide">${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', '-translate-y-4');
            });

            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.showEditProfileModal = showEditProfileModal;
        window.showSpecApplyModal = showSpecApplyModal;

        window.onload = function() {
            initApp();
        };
    </script>
</body>
</html>
