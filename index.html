            constructor() {
                // 使用外部優質音訊，不再採用 Web Audio API 震盪器合成

                    mysterious: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3", // 奢華神秘、大氣緩慢的高層次環境鋪底音

                };
                this.audio = null;
                this.currentTrack = null;
                this.isPlaying = false;
                this.fadeTimer = null;
            }

            init() {
                if (this.audio) return;
                this.audio = new Audio();
                this.audio.loop = true;
                this.audio.volume = 0; // 啟動預設音量為0以利淡入
            }

            start(trackName) {
                this.init();
                const targetUrl = this.tracks[trackName];
                if (!targetUrl) return;

                // 若切換新音訊，啟動優雅的交互淡出切換
                if (this.currentTrack && this.currentTrack !== trackName) {
                    this.fadeSwitch(targetUrl, trackName);
                    return;
                }

                this.currentTrack = trackName;
                this.isPlaying = true;

                if (this.audio.src !== targetUrl) {
                    this.audio.src = targetUrl;
                    this.audio.load();
                }

                this.audio.play()
                    .then(() => {
                        this.fadeIn();
                    })
                    .catch(err => {
                        console.warn("Autoplay blocked or user gesture required:", err);
                    });
            }

            stop() {
                this.isPlaying = false;
                if (this.audio) {
                    this.fadeOut(() => {
                        this.audio.pause();
                    });
                }
            }

            fadeIn() {
                if (!this.audio) return;
                clearInterval(this.fadeTimer);
                
                let vol = this.audio.volume;
                this.fadeTimer = setInterval(() => {
                    if (!this.isPlaying) {
                        clearInterval(this.fadeTimer);
                        return;
                    }
                    vol += 0.02;
                    if (vol >= 0.35) { // 限制奢華舒適音量閾值
                        this.audio.volume = 0.35;
                        clearInterval(this.fadeTimer);
                    } else {
                        this.audio.volume = vol;
                    }
                }, 40);
            }

            fadeOut(callback) {
                if (!this.audio) {
                    if (callback) callback();
                    return;
                }
                clearInterval(this.fadeTimer);
                
                let vol = this.audio.volume;
                this.fadeTimer = setInterval(() => {
                    vol -= 0.02;
                    if (vol <= 0.01) {
                        this.audio.volume = 0;
                        clearInterval(this.fadeTimer);
                        if (callback) callback();
                    } else {
                        this.audio.volume = vol;
                    }
                }, 40);
            }

            fadeSwitch(newUrl, trackName) {
                this.fadeOut(() => {
                    this.currentTrack = trackName;
                    this.audio.src = newUrl;
                    this.audio.load();
                    if (this.isPlaying) {
                        this.audio.play()
                            .then(() => {
                                this.fadeIn();
                            })
                            .catch(err => console.log(err));
                    }
                });
            }
        }

                    return;
                }
  
                const generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                window.state.emailVerificationCode = generatedCode;
  
                btnSendCode.disabled = true;
                btnSendCode.classList.add('opacity-50', 'cursor-not-allowed');
  
                if (emailjsConfig.publicKey && emailjsConfig.publicKey !== "YOUR_EMAILJS_PUBLIC_KEY") {
                    try {
                        await emailjs.send(emailjsConfig.serviceId, emailjsConfig.templateId, {
                            to_email: email,
                            to_name: "SecretRoom 俱樂部",
                            status_text: "新帳號信箱安全驗證",
                            message: `歡迎申請加入 SecretRoom！您的註冊信箱驗證碼為：【${generatedCode}】。請於 10 分鐘內將此碼填回申請頁面以完成安全查核。`
                        });
                        showToast('信箱驗證郵件已發送，請立即查收信箱！', 'success');
                    } catch (err) {
                        console.error(err);
                        showToast('驗證信送出失敗，請確認信箱無誤後重試。', 'error');
                        btnSendCode.disabled = false;
                        btnSendCode.classList.remove('opacity-50', 'cursor-not-allowed');
                        return;

                } else {

                    showToast(`[系統通訊調試] 驗證碼為：${generatedCode}`, 'info');

                let countdown = 60;
                const timer = setInterval(() => {
                    countdown--;
                    btnSendCode.textContent = `${countdown}s 後重發`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btnSendCode.disabled = false;
                        btnSendCode.classList.remove('opacity-50', 'cursor-not-allowed');
                        btnSendCode.textContent = '發送驗證碼';

            const ruleSpec = document.getElementById('pwd-rule-spec');
  
            pwdInput.oninput = () => {
                const val = pwdInput.value;
                
                if (val.length >= 8) {
                    ruleLen.className = "flex items-center gap-1.5 text-emerald-500 font-semibold";

                }
  
                if (/[A-Z]/.test(val)) {
                    ruleUpper.className = "flex items-center gap-1.5 text-emerald-500 font-semibold";

                if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) {
                    ruleSpec.className = "flex items-center gap-1.5 text-emerald-500 font-semibold";
                    ruleSpec.querySelector('i').className = "fa-solid fa-circle-check text-xs";

                const password = document.getElementById('reg-password').value;

                const selectedKinks = [];

                if (username !== usernameConfirm) {
                    showToast('兩次輸入的帳號不一致！', 'error');
                    return;
                }
                if (password !== passwordConfirm) {
                    showToast('兩次輸入的密碼不一致！', 'error');
                    return;
                }
  
                const isLenMet = password.length >= 8;
                const isUpperMet = /[A-Z]/.test(password);
                const isSpecMet = /[!@#$%^&*(),.?":{}|<>].*/.test(password);
                if (!isLenMet || !isUpperMet || !isSpecMet) {
                    showToast('密碼未滿足強度條件設定！', 'error');
                    return;
                }
  
                if (!base64Avatar) {

                if (!window.state.emailVerified) {

                    return;

                if (selectedKinks.length === 0) {

                    return;

                        return;

                        password,
                        nickname,
                        email,

                        birthMonth: month,
                        birthDay: day,
                        height,
                        weight,
                        length,
                        girth,
                        kinks: selectedKinks,
                        avatar: base64Avatar,
                        avatarStatus: 'approved', 
                        createdAt: serverTimestamp()
                    };
  
                    await setDoc(checkRef, appPayload);
  
                    window.state.userData = appPayload;
                    window.state.applicationId = username;
                    localStorage.setItem('sr_username', username);
  
                    showToast('申請資料提交成功！審核結果將發送至您的信箱。', 'success');
                    navigate('pending');
                } catch (err) {
                    console.error("資料寫入錯誤:", err);

                    hideLoading();
                }

                    from: window.state.applicationId,
                    to: targetUserId,
                    avatar: window.state.userData.avatar || '',

                });

        function listenToMyVisitors() {
            if (!db || window.state.unsubscribeVisitorsListener) return;
            const q = query(
                collection(db, 'secretg_apps', appId, 'visitors'), 
                where('to', '==', window.state.applicationId)
            );
            window.state.unsubscribeVisitorsListener = onSnapshot(q, (snapshot) => {
                const list = [];
                snapshot.forEach((docSnap) => {
                    list.push(docSnap.data());
                });
                window.state.visitors = list.slice(0, 10);
                
                const scrollContainer = document.getElementById('dashboard-tab-content');
                if (window.state.currentTab === 'profile') {
                    renderProfileTab(scrollContainer, window.state.applicationId);
                }
            });

            if (!db) return;

                const comments = post.comments || {};

                comments[cId] = {

                    userId: window.state.applicationId,
                    text: text,
                    time: Date.now()

                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);

                input.value = '';
                showToast('回覆發布完成！已寫入安全備忘', 'success');

            const modalTitle = modal.querySelector('h3');

            const originalTitle = modalTitle.textContent;

                modalTitle.textContent = originalTitle;
                modalDesc.textContent = originalDesc;
            };

                modal.classList.add('hidden');
                modalTitle.textContent = originalTitle;
                modalDesc.textContent = originalDesc;

                    if (pendingBase64) {
                        updates.avatarPending = pendingBase64;
                        updates.avatarStatus = 'pending';
                    }

                    await updateDoc(userRef, updates);

                    window.state.userData = { ...window.state.userData, ...updates };
                    if (pendingBase64) {
                        window.state.userData.avatarPending = pendingBase64;
                        window.state.userData.avatarStatus = 'pending';
                    }

                    modal.remove();
                    showToast('個人資料已成功更新！', 'success');
                    renderDashboard(appContainer);
                } catch (err) {
                    console.error("更新檔案失敗:", err);
                    showToast('更新失敗，請稍後重試', 'error');
                } finally {
                    hideLoading();
                }
            };
        }

        window.showSpecApplyModal = () => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md';
            modal.innerHTML = `
                <div class="bg-[#080810] border border-amber-500/15 rounded-3xl p-6 max-w-sm w-full shadow-2xl relative">
                    <button id="close-spec" class="absolute top-4 right-4 text-slate-500 hover:text-white text-2xl transition">&times;</button>
                    <h3 class="text-sm font-bold text-white mb-1.5 flex items-center gap-2 font-luxury">
                        <i class="fa-solid fa-medal text-amber-500"></i> GOLD SPEC ELITE
                    </h3>
                    <p class="text-xs text-slate-400 mb-5 leading-relaxed">請上傳帶有清楚尺規參考物（如捲尺、直尺）的實物測量證明照片，管理團隊將嚴格查驗核准。</p>
                    <div class="space-y-4">
                        <div class="border border-slate-850 rounded-2xl p-4 flex flex-col items-center justify-center bg-slate-900/20 text-center">
                            <div id="spec-img-trigger" class="relative w-full h-40 rounded-xl border border-dashed border-slate-800 hover:border-amber-500 flex flex-col items-center justify-center cursor-pointer overflow-hidden bg-slate-950 transition">
                                <img id="spec-preview" class="absolute inset-0 w-full h-full object-contain hidden">
                                <div id="spec-placeholder" class="text-slate-650 flex flex-col items-center gap-1.5 transition">
                                    <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                                    <span class="text-xs font-bold">點擊選取證明照片</span>
                                </div>
                            </div>
                            <input type="file" id="spec-file" accept="image/*" class="hidden">
                        </div>
                        <button id="btn-submit-spec" class="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-950 font-bold text-sm py-3 rounded-xl transition tracking-wider active:scale-[0.98]">
                            提交規格核查申請
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('close-spec').onclick = () => modal.remove();

            const fileInput = document.getElementById('spec-file');
            const previewImg = document.getElementById('spec-preview');
            const placeholder = document.getElementById('spec-placeholder');
            let specBase64 = '';

            document.getElementById('spec-img-trigger').onclick = () => fileInput.click();

            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        specBase64 = evt.target.result;
                        previewImg.src = specBase64;
                        previewImg.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            };

            document.getElementById('btn-submit-spec').onclick = async () => {
                if (!specBase64) {
                    showToast('請先上傳實物證明照片！', 'error');
                    return;
                }

                if (!db) return;
                showLoading();

                try {
                    const userRef = doc(db, 'secretg_apps', appId, 'applications', window.state.applicationId);
                    await updateDoc(userRef, {
                        specEliteStatus: 'pending',
                        specImage: specBase64
                    });

                    window.state.userData.specEliteStatus = 'pending';
                    modal.remove();
                    showToast('規格核查照片已送出，請耐心等待審查結果！', 'success');
                    renderDashboard(appContainer);
                } catch (err) {
                    console.error("提交規格審核錯誤:", err);
                    showToast('提交失敗，請重試', 'error');
                } finally {
                    hideLoading();
                }
            };
        };
  
        window.getBadgeHTML = function(user, isBig = false) {
            const badges = [];
  
            if (user.role === 'admin' || user.isAdmin) {
                badges.push({ 
                    icon: 'fa-crown', 
                    color: 'from-amber-400 via-yellow-500 to-amber-600 shadow-yellow-500/20', 
                    tooltip: '官方最高權限治理者'
                });
            }
            const createdSecs = user.createdAt ? user.createdAt.seconds : 0;
            const nowSecs = Date.now() / 1000;
            if (createdSecs && (nowSecs - createdSecs) <= (168 * 3600)) {
                badges.push({ 
                    icon: 'fa-seedling', 
                    color: 'from-emerald-500 via-green-500 to-teal-600 shadow-emerald-500/20', 
                    tooltip: '本週新進之尊貴仕紳'
                });
            }
            if (user.isPioneer) {
                badges.push({ 
                    icon: 'fa-shield-halved', 
                    color: 'from-amber-600 to-orange-700 shadow-orange-500/10 border-orange-500/10', 
                    tooltip: '創始階段即入駐的終身元老'
                });
            }
            if (user.isSpecElite) {
                badges.push({ 
                    icon: 'fa-medal', 
                    color: 'from-amber-300 via-amber-500 to-yellow-650 shadow-amber-500/35 animate-pulse', 
                    tooltip: '通過官方物理生殖規格實證認證'
                });
            }
  
            const userPosts = window.state.posts.filter(p => p.userId === user.id);
            const totalLikes = userPosts.reduce((sum, p) => sum + (p.likeCount || 0), 0);
  
            if (totalLikes >= 1000) {
                badges.push({ 
                    icon: 'fa-fire', 
                    color: 'from-orange-500 to-rose-600 shadow-orange-500/20', 
                    tooltip: '獲得超過千次按讚之社群人氣王'
                });
            }
  
            const perfectPosts = userPosts.filter(p => {
                const ratings = p.ratings ? Object.values(p.ratings) : [];
                const avg = ratings.length > 0 ? (ratings.reduce((a,b)=>a+b, 0) / ratings.length) : 0;
                return avg === 5.0 && ratings.length >= 500;
            });
            if (userPosts.length >= 50 && perfectPosts.length === userPosts.length) {
                badges.push({ 
                    icon: 'fa-star', 
                    color: 'from-amber-400 to-yellow-500 shadow-amber-400/20', 
                    tooltip: '多篇作品榮獲無瑕滿分評價'
                });
            }
  
            if (userPosts.length >= 100) {
                badges.push({ 
                    icon: 'fa-camera', 
                    color: 'from-violet-500 to-purple-700 shadow-violet-500/20', 
                    tooltip: '累計發布上百篇秘密作品'
                });
            }
  
            // 遵照規範：不出現任何實體說明文字、僅保留奢華圓形霓虹徽章圖示，並支援懸停 tooltip 顯示說明
            return badges.map(b => {
                const sizeClass = isBig ? 'w-8.5 h-8.5 text-sm' : 'w-6 h-6 text-xs';
                return `
                    <span class="inline-flex items-center justify-center ${sizeClass} rounded-full bg-gradient-to-r ${b.color} text-slate-950 shadow-md badge-glow pointer-events-auto select-none brass-badge" title="${b.tooltip}">
                        <i class="fa-solid ${b.icon}"></i>
                    </span>
                `;
            }).join('');
        };
  
        window.getUserBadgeHTMLForPost = function(post) {
            let authorUser = window.state.activeUsers.find(u => u.id === post.userId);
            if (!authorUser && post.userId === window.state.applicationId) {
                authorUser = window.state.userData;
            }
            if (authorUser) {
                return getBadgeHTML(authorUser, false);
            }
            const simulatedUser = {
                id: post.userId,
                createdAt: post.createdAt || { seconds: Date.now() / 1000 },
                role: post.userId === 'gentleman_alpha' ? 'admin' : 'user',
                isSpecElite: post.isSpecElite || false
            };
            return getBadgeHTML(simulatedUser, false);
        };
  
        window.deleteMyPost = function(postId) {
            const modal = document.getElementById('custom-confirm-modal');
            if (!modal) return;
            modal.classList.remove('hidden');

            document.getElementById('confirm-modal-cancel').onclick = () => {
                modal.classList.add('hidden');
            };

            document.getElementById('confirm-modal-ok').onclick = async () => {
                modal.classList.add('hidden');
                if (!db) return;
                showLoading();
                try {
                    await deleteDoc(doc(db, 'secretg_apps', appId, 'posts', postId));
                    showToast('該條分享秘密已安全徹底永久銷毀 🔒', 'success');
                } catch (err) {
                    console.error("刪除失敗:", err);
                    showToast('銷毀失敗', 'error');
                } finally {
                    hideLoading();
                }
            };
        };

        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const bgColors = {
                error: 'bg-red-500/95 border-red-400',
                success: 'bg-emerald-555/95 border-emerald-400',
                info: 'bg-amber-600/95 border-amber-500'
            };
            toast.className = `${bgColors[type]} text-white px-5 py-3.5 rounded-xl shadow-lg border text-sm font-semibold transition-all duration-300 opacity-0 transform -translate-y-4 backdrop-blur-xl flex items-center gap-3 pointer-events-auto`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('opacity-0', '-translate-y-4'));
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        };
  
        window.onload = function() {
            initApp();
            if (typeof initBGMController === 'function') {
                initBGMController();
            }
        };
    </script>
</body>
</html>
