                            checkExistingApplication();
                        }
                    });

        async function checkExistingApplication() {
            if(!db) { hideLoading(); navigate('landing'); return; }
            try {
                const cachedUser = localStorage.getItem('sr_username');
                if (cachedUser) {
                    const appRef = doc(db, 'secretg_apps', appId, 'applications', cachedUser);
                    const docSnap = await getDoc(appRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        window.state.userData = data;
                        window.state.applicationId = cachedUser;
                        
                        if (data.status === 'pending') navigate('pending');
                        else if (data.status === 'rejected') navigate('pending'); // 跳至退件詳情畫面
                        else if (data.status === 'approved') navigate('telegram');
                        else if (data.status === 'active') {
                            listenToVisitors();
                            navigate('dashboard');
                        }
                        else navigate('landing');
                        hideLoading();
                        return;
                    }
                }
                navigate('landing');
            } catch (e) {
                console.error("檢查狀態出錯:", e);
                navigate('landing');
            }
            hideLoading();
        }

        function hideLoading() {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';

                case 'telegram': content = viewTelegram(); break;
                case 'dashboard': content = viewDashboard(); break;
            }

            appContainer.innerHTML = content;

            if (window.state.currentView === 'pending') listenToApplicationStatus();

        function initRegisterForm() {
            const u = window.state.userData || {};
            const yearSelect = document.getElementById('reg-year');
            const monthSelect = document.getElementById('reg-month');
            const daySelect = document.getElementById('reg-day');
            
            const currentYear = new Date().getFullYear();
            const maxYear = currentYear - 18;
            const minYear = currentYear - 80;

            yearSelect.innerHTML = '<option value="">年</option>';
            monthSelect.innerHTML = '<option value="">月</option>';

            for (let y = maxYear; y >= minYear; y--) {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = `${y} 年`;
                if(u.birthYear && parseInt(u.birthYear) === y) opt.selected = true;
                yearSelect.appendChild(opt);
            }
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = `${m} 月`;
                if(u.birthMonth && parseInt(u.birthMonth) === m) opt.selected = true;
                monthSelect.appendChild(opt);
            }

            const updateDays = () => {
                const y = parseInt(yearSelect.value);
                const m = parseInt(monthSelect.value);
                daySelect.innerHTML = '<option value="">日</option>';
                if (!y || !m) return;
                const daysInMonth = new Date(y, m, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = `${d} 日`;
                    if(u.birthDay && parseInt(u.birthDay) === d) opt.selected = true;
                    daySelect.appendChild(opt);
                }
            };

            yearSelect.addEventListener('change', updateDays);
            monthSelect.addEventListener('change', updateDays);
            updateDays();

            const avatarInput = document.getElementById('avatar-input');
            const avatarPreview = document.getElementById('avatar-preview');
            const avatarPlaceholder = document.getElementById('avatar-placeholder');

            avatarInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300; 
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        window.state.userData.avatar = compressedBase64;

                        avatarPreview.src = compressedBase64;
                        avatarPreview.classList.remove('hidden');
                        avatarPlaceholder.classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });

            // 如果原本就有預填頭像，則保持預填
            if (u.avatar) {
                window.state.userData.avatar = u.avatar;
            }

            // 如果是重新送審，強制免除二次信箱驗證
            if (u.status === 'rejected') {
                window.state.emailVerified = true;
                const vStatus = document.getElementById('email-verified-status');
                if (vStatus) vStatus.classList.remove('hidden');
                const otpBtn = document.getElementById('send-otp-btn');
                if (otpBtn) otpBtn.classList.add('hidden');
                const emailInp = document.getElementById('reg-email');
                if (emailInp) emailInp.disabled = true;
            }

            const otherCheckbox = document.getElementById('kink-other-checkbox');
            const otherContainer = document.getElementById('kink-other-container');
            otherCheckbox.addEventListener('change', (e) => {
                if(e.target.checked) {
                    otherContainer.classList.remove('hidden');
                    document.getElementById('reg-kink-other').setAttribute('required', 'true');
                } else {
                    otherContainer.classList.add('hidden');
                    document.getElementById('reg-kink-other').removeAttribute('required');
                    document.getElementById('reg-kink-other').value = '';
                }
            });

            const form = document.getElementById('registerForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!window.state.userData.avatar) {
                    showToast('請上傳您的個人大頭照！', 'error');
                    return;
                }

                if (!window.state.emailVerified) {
                    showToast('請先完成信箱驗證碼驗證！', 'error');
                    return;
                }

                const uName = document.getElementById('reg-username').value.trim();
                const uNameConf = document.getElementById('reg-username-confirm').value.trim();
                const pass = document.getElementById('reg-password').value;
                const passConf = document.getElementById('reg-password-confirm').value;

                if (uName !== uNameConf) { showToast('兩次輸入的使用者帳號不一致', 'error'); return; }
                if (pass !== passConf) { showToast('兩次輸入的密碼不一致', 'error'); return; }

                // 只有在全新申請時才需要排重
                if (db && (!u.status || u.status !== 'rejected')) {
                    try {
                        const testRef = doc(db, 'secretg_apps', appId, 'applications', uName);
                        const testSnap = await getDoc(testRef);
                        if (testSnap.exists()) {
                            showToast('此使用者帳號已被註冊，請換一個', 'error');
                            return;
                        }
                    } catch (err) {
                        console.error("查重出錯:", err);
                    }
                }

                const selectedKinks = Array.from(document.querySelectorAll('input[name="kinks"]:checked')).map(el => el.value);
                if (selectedKinks.length === 0 && !otherCheckbox.checked) {
                    showToast('請至少選擇一項您感興趣的主題', 'error');
                    return;
                }

                const otherValue = otherCheckbox.checked ? document.getElementById('reg-kink-other').value.trim() : '';

                window.state.userData = {
                    ...window.state.userData,
                    username: uName,
                    password: pass,
                    nickname: document.getElementById('reg-nickname').value.trim(),
                    birthYear: document.getElementById('reg-year').value,
                    birthMonth: document.getElementById('reg-month').value,
                    birthDay: document.getElementById('reg-day').value,
                    height: document.getElementById('reg-height').value,
                    weight: document.getElementById('reg-weight').value,
                    length: document.getElementById('reg-length').value,
                    girth: document.getElementById('reg-girth').value,
                    kinks: selectedKinks,
                    otherKink: otherValue,
                    email: document.getElementById('reg-email').value.trim(),
                    status: 'pending', 
                    avatarStatus: 'approved' 
                };

                window.state.applicationId = uName;
                navigate('confirm');
            });
        }

        window.sendVerificationOTP = async function() {
            const emailInput = document.getElementById('reg-email');
            const email = emailInput.value.trim();
            if (!email || !emailInput.checkValidity()) {
                showToast('請先輸入正確的信箱地址', 'error');
                return;
            }

            const sendBtn = document.getElementById('send-otp-btn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 發送中';

            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            window.state.generatedOTP = otp;

            if (!emailjsConfig.publicKey || emailjsConfig.publicKey === "YOUR_EMAILJS_PUBLIC_KEY") {
                console.info(`[Email 模擬] 驗證信箱：${email}，驗證碼為：${otp}`);
                showToast(`[模擬信件] 驗證碼：${otp} (請查閱主機 Console)`, 'info');
                document.getElementById('otp-input-container').classList.remove('hidden');
                sendBtn.disabled = false;
                sendBtn.textContent = '重新發送';
                return;
            }

            try {
                await emailjs.send(emailjsConfig.serviceId, emailjsConfig.templateId, {
                    to_email: email,
                    to_name: "新申請用戶",
                    status_text: "信箱綁定驗證碼",
                    message: `您好！感謝您申請加入 SecretRoom 私密社群。\n\n您的電子信箱驗證碼為：【 ${otp} 】\n\n請於網頁中輸入此驗證碼以完成信箱綁定認證。若非本人操作請忽略此信。`
                });
                showToast('驗證碼已寄送到您的信箱，請查看！', 'success');
                document.getElementById('otp-input-container').classList.remove('hidden');
            } catch (err) {
                console.error("驗證信發送失敗:", err);
                showToast('驗證碼寄送失敗，請重試或聯絡管理員', 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '重新發送';
            }
        }

        window.verifyOTP = function() {
            const entered = document.getElementById('reg-otp').value.trim();
            if (entered === window.state.generatedOTP) {
                window.state.emailVerified = true;
                showToast('電子信箱驗證通過！', 'success');
                document.getElementById('otp-input-container').classList.add('hidden');
                document.getElementById('send-otp-btn').classList.add('hidden');
                document.getElementById('reg-email').disabled = true;
                document.getElementById('email-verified-status').classList.remove('hidden');
            } else {
                showToast('驗證碼不正確，請重新輸入', 'error');
            }
        }

        function listenToApplicationStatus() {
            if(!db || !window.state.applicationId) return;

            window.state.unsubscribeListener = onSnapshot(docRef, (docSnap) => {

                    window.state.userData = data;
                    if(data.status === 'approved' && window.state.currentView === 'pending') {
                        showToast('🎉 人工審核通過！請綁定您的 Telegram 帳號', 'success');
                        setTimeout(() => navigate('telegram'), 1500);
                    } else if (data.status === 'rejected' && window.state.currentView === 'pending') {
                        renderView();
                    }
                }
            }, (error) => {
                console.error("狀態監聽錯誤:", error);
            });
        }

        // Setup real-time visitor tracks listener
        function listenToVisitors() {
            if (!db || !window.state.userData.username) return;
            if (window.state.unsubscribeVisitorsListener) window.state.unsubscribeVisitorsListener();

            const q = query(
                collection(db, 'secretg_apps', appId, 'visits'),
                where('visitedId', '==', window.state.userData.username)
            );
            window.state.unsubscribeVisitorsListener = onSnapshot(q, (snap) => {
                window.state.visitors = [];
                snap.forEach(docSnap => {
                    window.state.visitors.push(docSnap.data());
                });
                
                // 依據時間降序排列最新訪客
                window.state.visitors.sort((a,b) => {
                    const tA = a.timestamp?.seconds ? a.timestamp.seconds * 1000 : new Date(a.timestamp).getTime();
                    const tB = b.timestamp?.seconds ? b.timestamp.seconds * 1000 : new Date(b.timestamp).getTime();
                    return tB - tA;
                });

                if (window.state.currentView === 'dashboard' && window.state.currentTab === 'profile') {
                    renderView();
                }
            });
        }

        window.onTelegramAuth = async function(user) {
            if (!db || !window.state.applicationId) return;

            try {
                const ref = collection(db, 'secretg_apps', appId, 'applications');
                const q = query(ref, where('telegramInfo.id', '==', user.id));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    let isRebound = false;
                    snap.forEach((docSnap) => {
                        if (docSnap.id !== window.state.applicationId) {
                            isRebound = true;
                        }
                    });

                    if (isRebound) {
                        showToast('❌ 此 Telegram 帳號已被其他 SecretRoom 用戶綁定！無法重複使用。', 'error');
                        return;
                    }
                }

                const docRef = doc(db, 'secretg_apps', appId, 'applications', window.state.applicationId);
                const tgData = {
                    id: user.id,
                    username: user.username || '',
                    first_name: user.first_name || '',
                    photo_url: user.photo_url || '',
                    auth_date: user.auth_date,
                    hash: user.hash 
                };

                await updateDoc(docRef, {
                    status: 'active',
                    tgLinked: true,
                    telegramInfo: tgData
                });

                showToast('🎉 帳號成功啟用，歡迎來到 SecretRoom！', 'success');
                window.state.userData.status = 'active';
                listenToVisitors();
                navigate('dashboard');

                showToast('綁定出錯，請重新嘗試', 'error');

            // 🎚️ 貼文篩選器排序及過濾

            if (activeFilter === 'recommended') {
                filteredPosts.sort((a, b) => getRecommendationScore(b) - getRecommendationScore(a));

                // 評分高於 4.5

                    const ratingCount = p.ratings ? Object.keys(p.ratings).length : 0;
                    if (ratingCount === 0) return false;
                    const avg = Object.values(p.ratings).reduce((a,b)=>a+b, 0) / ratingCount;

        window.openSpecApplyModal = function() {
            const modal = document.getElementById('spec-apply-modal');
            const preview = document.getElementById('spec-upload-preview');
            const placeholder = document.getElementById('spec-upload-placeholder');
            const input = document.getElementById('spec-upload-input');

            if (preview && placeholder && input) {
                preview.classList.add('hidden');
                placeholder.classList.remove('hidden');
                input.value = '';
                window.state.newSpecImage = null;
            }

            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 50);

            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; 
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 烘焙前端防漏浮水印 (Watermark Baking)
                        ctx.save();
                        ctx.font = 'bold 24px "Inter", sans-serif';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
                        ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
                        ctx.lineWidth = 1;
                        ctx.textAlign = 'center';
                        ctx.translate(width / 2, height / 2);
                        ctx.rotate(-Math.PI / 6); 

                        ctx.fillText('僅限SecretRoom黃金 Spec 認證使用', 0, 0);
                        ctx.strokeText('僅限SecretRoom黃金 Spec 認證使用', 0, 0);

                        ctx.font = '14px sans-serif';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                        ctx.fillText('SecretRoom Proof Only', 0, 45);

                        ctx.restore();

                        const watermarkedBase64 = canvas.toDataURL('image/jpeg', 0.85);
                        window.state.newSpecImage = watermarkedBase64;

                        preview.src = watermarkedBase64;
                        preview.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };
        }

            const weight = document.getElementById('edit-weight').value;
            const length = document.getElementById('edit-length').value;

                return;
            }

            const selectedKinks = Array.from(document.querySelectorAll('input[name="edit-kinks"]:checked')).map(el => el.value);
            const otherCheckbox = document.getElementById('edit-kink-other-checkbox');
            const otherValue = otherCheckbox && otherCheckbox.checked ? document.getElementById('edit-kink-other').value.trim() : '';

            if (selectedKinks.length === 0 && !otherValue) {
                showToast('請至少選擇一項您感興趣的主題標籤！', 'error');
                return;
            }

            if (!db || !window.state.applicationId) return;

            try {
                const docRef = doc(db, 'secretg_apps', appId, 'applications', window.state.applicationId);
                const updates = {
                    nickname: nickname,
                    height: height,
                    weight: weight,
                    length: length,
                    girth: girth,
                    kinks: selectedKinks,
                    otherKink: otherValue
                };

                if (window.state.editedAvatar) {

                window.state.userData = {
                    ...window.state.userData,
                    ...updates
                };

                        <img src="${p.image}" class="w-full h-full object-cover" draggable="false" oncontextmenu="return false;">
                    </div>
                `).join('')
                : `<div class="col-span-3 text-center py-12 text-slate-600 text-xs italic">對方目前尚未發布生活動態照片。</div>`;

            return `
                <div class="flex-1 overflow-y-auto bg-[#05050a] p-5 pb-24 scroll-smooth">
                    <div class="max-w-md mx-auto space-y-6">
                        
                        <button onclick="switchTab('feed')" class="flex items-center gap-1.5 text-slate-400 hover:text-white text-xs transition font-semibold">
                            <i class="fa-solid fa-arrow-left"></i> 返回社群動態牆
                        </button>

                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-5 relative overflow-hidden">
                            <div class="flex flex-col items-center md:items-start gap-4">
                                <div class="flex items-center gap-4 w-full">
                                    <img src="${u.avatar}" class="w-16 h-16 rounded-full object-cover border border-slate-700 shrink-0">
                                    <div class="text-left flex-1 min-w-0">
                                        <h3 class="text-base font-bold text-slate-100 truncate">${u.nickname}</h3>
                                        <p class="text-xs text-slate-400 font-mono truncate">@${u.username}</p>
                                    </div>
                                </div>
                                ${renderUserBadgesHTML(u)}
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-slate-950/50 p-3 rounded-xl text-center border border-slate-800">
                                    <span class="text-[10px] text-slate-500 block mb-0.5">身高/體重</span>
                                    <span class="text-xs font-semibold text-slate-200">${u.height}cm / ${u.weight}kg</span>
                                </div>
                                <div class="bg-slate-950/50 p-3 rounded-xl text-center border border-slate-800">
                                    <span class="text-[10px] text-slate-500 block mb-0.5">身體密碼 (長/粗)</span>
                                    <span class="text-xs font-semibold text-slate-200">長 ${u.length}cm / 粗 ${u.girth}cm</span>
                                </div>
                            </div>

                            <div class="text-left">
                                <span class="text-[10px] text-slate-500 block mb-2 font-medium">興趣主題</span>
                                <div class="flex flex-wrap gap-1.5">
                                    ${displayKinks.map(k => `<span class="px-2.5 py-1 bg-slate-950/80 border border-slate-800 text-slate-300 rounded-lg text-[10px] font-medium">${k}</span>`).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="space-y-3 text-left">
                            <h4 class="text-xs font-bold text-slate-400 flex items-center gap-1.5"><i class="fa-solid fa-images text-indigo-500"></i> ${u.nickname} 的生活動態 (${otherPosts.length})</h4>
                            <div class="grid grid-cols-3 gap-2.5">
                                ${otherGridHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function initDashboardFeatures() {
            if (window.state.dashboardInitialized) {
                initDashboardScroll();
                return;
            }

            if (!db) return;

            const q = collection(db, 'secretg_apps', appId, 'posts');
            onSnapshot(q, (querySnapshot) => {
                window.state.posts = [];
                querySnapshot.forEach((docSnap) => {
                    window.state.posts.push({ id: docSnap.id, ...docSnap.data() });
                });
                updateSearchAndFeedUI();
            }, (error) => {
                console.error("載入貼文錯誤:", error);
            });

            const usersQ = collection(db, 'secretg_apps', appId, 'applications');
            onSnapshot(usersQ, (snap) => {
                window.state.activeUsers = [];
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.status === 'active') {
                        window.state.activeUsers.push({ username: docSnap.id, ...data });
                    }
                });
                updateSearchAndFeedUI();
            }, (error) => {
                console.error("載入用戶資料錯誤:", error);
            });

            window.state.dashboardInitialized = true;
            initDashboardScroll();
        }

        window.switchTab = function(tab) {
            window.state.currentTab = tab;
            renderView();
        }

        // 貼文權重計算演算法
        function getRecommendationScore(post) {
            let score = 0;
            const myKinks = window.state.userData.kinks || [];

            // 1. 主題契合度符合 (極高權重)
            if (post.tags && myKinks.some(k => post.tags.includes(k))) {
                score += 150;
            }

            // 2. 累計按讚數加權
            const likesCount = post.likes ? post.likes.length : 0;
            score += likesCount * 15;

            // 3. 星級評等加權
            const ratingCount = post.ratings ? Object.keys(post.ratings).length : 0;
            if (ratingCount > 0) {
                const averageRating = Object.values(post.ratings).reduce((a, b) => a + b, 0) / ratingCount;
                score += averageRating * 25; // 5星可得125分
            }

            // 4. 時效性評分 (新發布享優勢)
            const ageInHours = post.createdAt 
                ? (Date.now() - (post.createdAt.seconds * 1000)) / (1000 * 60 * 60)
                : 0;
            if (ageInHours < 24) {
                score += (24 - ageInHours) * 3; 
            }

            return score;
        }

        window.toggleLike = async function(postId) {
            if(!db) return;
            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                const post = window.state.posts.find(p => p.id === postId);
                if (!post) return;

                let updatedLikes = post.likes ? [...post.likes] : [];
                const idx = updatedLikes.indexOf(window.state.userId);

                if (idx > -1) {
                    updatedLikes.splice(idx, 1); 
                } else {
                    updatedLikes.push(window.state.userId); 
                }

                await updateDoc(postRef, { likes: updatedLikes });
            } catch (err) {
                console.error("按讚失敗:", err);
            }
        }

        window.ratePost = async function(postId, star) {
            if(!db) return;
            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                const post = window.state.posts.find(p => p.id === postId);
                if (!post) return;

                let updatedRatings = post.ratings ? { ...post.ratings } : {};
                updatedRatings[window.state.userId] = star; 

                await updateDoc(postRef, { ratings: updatedRatings });
                showToast(`評分成功，您評了 ${star} 顆星！`, 'success');
            } catch (err) {
                console.error("評分出錯:", err);
            }
        }

        window.viewUserProfile = async function(targetUserId) {
            if (targetUserId === window.state.userData.username) {
                switchTab('profile');
                return;
            }

            if(!db) return;
            try {
                const userRef = doc(db, 'secretg_apps', appId, 'applications', targetUserId);
                const docSnap = await getDoc(userRef);
                if (docSnap.exists()) {
                    window.state.otherUserData = docSnap.data();
                    recordVisit(targetUserId); // 寫入觀看足跡
                    switchTab('other-profile');
                } else {
                    showToast('找不到該用戶資料', 'error');
                }
            } catch (err) {
                console.error("獲取他人資料失敗:", err);
            }
        }

        window.openPublishModal = function() {
            const m = document.getElementById('publish-modal');
            const c = document.getElementById('publish-modal-content');
            
            const imgInput = document.getElementById('post-image-input');
            const imgPreview = document.getElementById('post-image-preview');
            const imgPlaceholder = document.getElementById('post-image-placeholder');

            imgInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        window.state.newPostImage = compressedBase64;

                        imgPreview.src = compressedBase64;
                        imgPreview.classList.remove('hidden');
                        imgPlaceholder.classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            m.classList.remove('hidden');
            setTimeout(() => {
                m.classList.remove('opacity-0');
                c.classList.remove('translate-y-10');
            }, 50);
        }

        window.closePublishModal = function() {
            const m = document.getElementById('publish-modal');
            const c = document.getElementById('publish-modal-content');
            m.classList.add('opacity-0');
            c.classList.add('translate-y-10');
            setTimeout(() => {
                m.classList.add('hidden');
                document.getElementById('post-image-preview').classList.add('hidden');
                document.getElementById('post-image-placeholder').classList.remove('hidden');
                document.getElementById('post-image-input').value = '';
                document.getElementById('post-text-input').value = '';
                document.getElementById('post-tags-input').value = '';
                document.getElementById('post-sensitive-input').checked = false;
                window.state.newPostImage = null;
            }, 300);
        }

        window.submitNewPost = async function() {
            const text = document.getElementById('post-text-input').value.trim();
            const tagsText = document.getElementById('post-tags-input').value.trim();
            const image = window.state.newPostImage;
            const isSensitive = document.getElementById('post-sensitive-input').checked;

            if (!image) { showToast('發布貼文必須上傳生活照片！', 'error'); return; }
            if (!text) { showToast('請撰寫您的貼文內容', 'error'); return; }

            const submitBtn = document.getElementById('post-submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 上傳中...';

            if (!db) return;
            try {
                const postsRef = collection(db, 'secretg_apps', appId, 'posts');
                const parsedTags = tagsText ? tagsText.split(/\s+/).filter(Boolean) : [];
                const newPostId = 'post_' + Math.floor(Math.random() * 1000000);

                await setDoc(doc(postsRef, newPostId), {
                    userId: window.state.userData.username,
                    authorName: window.state.userData.nickname,
                    authorAvatar: window.state.userData.avatar,
                    text: text,
                    image: image,
                    tags: parsedTags,
                    likes: [],
                    ratings: {},
                    comments: [],
                    isSensitive: isSensitive, // 🔞 標記為私密尺度敏感照
                    createdAt: serverTimestamp ? serverTimestamp() : new Date(),
                    id: newPostId
                });

                showToast('貼文發布成功！', 'success');
                closePublishModal();
            } catch (err) {
                console.error("發貼出錯:", err);
                showToast('發布失敗，請重新再試', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '發布此則貼文';
            }
        }

        window.toggleCommentsSection = function(postId) {
            window.state.openComments[postId] = !window.state.openComments[postId];
            updateSearchAndFeedUI();
        }

        window.submitComment = async function(postId) {
            const inputEl = document.getElementById(`comment-input-${postId}`);
            const text = inputEl ? inputEl.value.trim() : '';
            if (!text) return;

            if (!db) {
                showToast("連線異常下無法發表評論", "error");
                return;
            }

            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                const docSnap = await getDoc(postRef);
                if (docSnap.exists()) {
                    const postData = docSnap.data();
                    const newComment = {
                        userId: window.state.userId,
                        authorName: window.state.userData.nickname,
                        text: text,
                        createdAt: new Date()
                    };
                    const updatedComments = postData.comments ? [...postData.comments, newComment] : [newComment];
                    
                    await updateDoc(postRef, { comments: updatedComments });
                    showToast("評論發布成功！", "success");
                    inputEl.value = '';
                }
            } catch (err) {
                console.error("評論發表出錯:", err);
                showToast("評論失敗，請重試", "error");
            }
        }

        window.openReportModal = function(postId) {
            window.state.reportingPostId = postId;
            const modal = document.getElementById('report-modal');
            const content = document.getElementById('report-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 50);
        }

        window.closeReportModal = function() {
            const modal = document.getElementById('report-modal');
            const content = document.getElementById('report-modal-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                window.state.reportingPostId = null;
            }, 300);
        }

        window.submitReport = async function() {
            const reasonEl = document.querySelector('input[name="report-reason"]:checked');
            if (!reasonEl) {
                showToast("請選擇檢舉原因", "error");
                return;
            }
            const reason = reasonEl.value;
            const postId = window.state.reportingPostId;

            if (!db) {
                showToast("檢舉成功 (模擬)", "success");
                closeReportModal();
                return;
            }

            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                const docSnap = await getDoc(postRef);
                if (docSnap.exists()) {
                    const postData = docSnap.data();
                    const newReport = {
                        reporterId: window.state.userId,
                        reason: reason,
                        timestamp: new Date()
                    };
                    const updatedReports = postData.reports ? [...postData.reports, newReport] : [newReport];
                    const reportCount = updatedReports.length;

                    await updateDoc(postRef, {
                        reports: updatedReports,
                        reportCount: reportCount
                    });
                    
                    showToast("我們已收到您的檢舉，管理員會立即審查！", "success");
                    closeReportModal();
                }
            } catch (err) {
                console.error("提交檢舉失敗:", err);
                showToast("操作失敗，請重試", "error");
            }
        }

        function initDashboardScroll() {
            const container = document.getElementById('feed-scroll-container');
            if (container) {
                container.addEventListener('scroll', () => {
                    const threshold = 100; 
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - threshold) {
                        const totalPosts = window.state.posts.length;
                        if (totalPosts > window.state.visiblePostsCount) {
                            window.state.visiblePostsCount += 5; 
                            updateSearchAndFeedUI();
                        }
                    }
                });
            }
        }

        let pressTimer = null;
        window.handlePostTouchStart = function(postId) {
            pressTimer = setTimeout(() => openDeletePostModal(postId), 1000);
        }
        window.handlePostTouchEnd = function() {
            clearTimeout(pressTimer);
        }
        window.handlePostMouseDown = function(postId) {
            pressTimer = setTimeout(() => openDeletePostModal(postId), 1000);
        }
        window.handlePostMouseUp = function() {
            clearTimeout(pressTimer);
        }

        function openDeletePostModal(postId) {
            window.state.postIdToDelete = postId;
            const m = document.getElementById('delete-post-modal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 50);
        }

        window.closeDeletePostModal = function() {
            const m = document.getElementById('delete-post-modal');
            m.classList.add('opacity-0');
            setTimeout(() => {
                m.classList.add('hidden');
                window.state.postIdToDelete = null;
            }, 300);
        }

        window.executePostDelete = async function() {
            const postId = window.state.postIdToDelete;
            if (!postId || !db) return;

            try {
                const postRef = doc(db, 'secretg_apps', appId, 'posts', postId);
                await deleteDoc(postRef);
                showToast('貼文已成功下架銷毀！', 'success');
                closeDeletePostModal();
            } catch (err) {
                console.error("貼文下架失敗:", err);
                showToast('下架失敗，請重試', 'error');
            }
        }

        window.logoutPlatform = function() {
            localStorage.removeItem('sr_username');
            window.state.userData = {};
            window.state.applicationId = null;
            window.state.dashboardInitialized = false;
            if(window.state.unsubscribeListener) window.state.unsubscribeListener();
            if(window.state.unsubscribeVisitorsListener) window.state.unsubscribeVisitorsListener();
            navigate('landing');
            showToast('您已成功安全登出本裝置！', 'info');
        }

        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const toast = document.createElement('div');
            const bgColors = {
                error: 'bg-red-500/95 border-red-400',
                success: 'bg-emerald-500/95 border-emerald-400',
                info: 'bg-indigo-600/95 border-indigo-500/40' 
            };
            
            toast.className = `${bgColors[type] || bgColors.info} text-white px-5 py-3.5 rounded-2xl shadow-lg border border-white/5 text-xs font-semibold transition-all duration-300 opacity-0 transform -translate-y-4 backdrop-blur-xl flex items-center gap-3`;
            
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fa-solid ${icon} text-sm"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', '-translate-y-4');
            });
            
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };
        
        const showToast = window.showToast;

        initApp();
    </script>
</body>
</html>
