name = "secretroom-telegram-webhook"
main = ".generated-worker.js"
compatibility_date = "2026-07-17"
workers_dev = true

[build]
command = "node build-worker.mjs && node normalize-pbkdf2.mjs && node normalize-telegram-webhook-secret.mjs"

[triggers]
crons = ["*/5 * * * *"]

[vars]
FIREBASE_PROJECT_ID = "secretroom-ef728"
SECRETROOM_URL = "https://5j1u35k6.github.io/SecretRoom/"
BOT_USERNAME = "SecretRoomtwBot"
ALLOWED_ORIGINS = "https://5j1u35k6.github.io"

