name = "secretroom-telegram-webhook"
main = ".generated-worker.js"
compatibility_date = "2026-07-17"
workers_dev = true

[build]
command = "node build-worker.mjs && node upgrade-telegram-menu-phase1.mjs && node upgrade-telegram-account-phase2.mjs && node upgrade-telegram-preferences-status-phase3.mjs && node upgrade-telegram-reset-phase4.mjs && node upgrade-telegram-help-phase5.mjs && node upgrade-telegram-support-phase6.mjs && node upgrade-telegram-claim-guard-phase7.mjs && node normalize-pbkdf2.mjs && node normalize-telegram-webhook-secret.mjs && node verify-telegram-worker.mjs"

[triggers]
crons = ["*/5 * * * *"]

[vars]
FIREBASE_PROJECT_ID = "secretroom-ef728"
SECRETROOM_URL = "https://5j1u35k6.github.io/SecretRoom/"
BOT_USERNAME = "SecretRoomtwBot"
ALLOWED_ORIGINS = "https://5j1u35k6.github.io"

# 下列敏感資料只設定於 Cloudflare Secrets，不可提交至 GitHub：
# TELEGRAM_BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# FIREBASE_WEB_API_KEY
# FIREBASE_SERVICE_ACCOUNT_JSON
